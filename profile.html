<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY PROFILE | RACKSTAT</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --rackstat-black: #0a0a0a;
            --rackstat-gray: #111111;
            --rackstat-border: #262626;
            --rackstat-red: #b91c1c;
        }

        body { background-color: var(--rackstat-black); color: white; font-family: sans-serif; }

        .profile-card {
            background: var(--rackstat-gray);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--rackstat-border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .goal-progress { background: #000; border-radius: 10px; height: 12px; width: 100%; overflow: hidden; margin-top: 8px; border: 1px solid #333; }
        .progress-fill {
            background: linear-gradient(90deg, #b91c1c 0%, #ef4444 100%);
            height: 100%;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(185, 28, 28, 0.4);
        }

        input, select, textarea {
            background: #000 !important;
            border: 1px solid var(--rackstat-border) !important;
            color: white !important;
            padding: 0.6rem !important;
            border-radius: 4px !important;
            width: 100%;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus { border-color: var(--rackstat-red) !important; outline: none; }

        label {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            color: #94a3b8;
            margin-left: 2px;
            margin-bottom: 4px;
            display: block;
            letter-spacing: 0.05em;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        .btn-primary {
            background: var(--rackstat-red);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            padding: 1rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: #dc2626; transform: scale(1.01); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        #school-logo {
            max-height: 40px;
            width: auto;
            object-fit: contain;
        }
        .rackstat-logo-header {
            max-height: 35px;
            width: auto;
            object-fit: contain;
        }
    </style>
</head>
<body class="pb-24">
<header class="bg-black border-b-2 border-red-700 p-4 sticky top-0 z-50">
    <div class="flex justify-between items-center max-w-6xl mx-auto">
        <div class="w-1/4 flex justify-start">
            <button onclick="location.href='index.html'" class="text-[10px] font-black uppercase bg-gray-800 px-3 py-1.5 rounded text-gray-400 hover:text-white transition-all">
                ← Lobby
            </button>
        </div>

        <div class="flex items-center gap-6 justify-center flex-1">
            <div class="header-logo-container">
                <img id="school-logo" src="images/rackstat-logo.png" alt="School Logo" onerror="this.src='images/rackstat-logo.png'">
            </div>
            <div class="h-10 w-[1px] bg-gray-700"></div>
            <div class="flex flex-col items-center text-center min-w-[180px]">
                <span id="school-name" class="text-sm md:text-base font-black italic uppercase tracking-widest text-white leading-tight">LOADING...</span>
                <span class="text-[10px] md:text-[11px] font-black italic uppercase tracking-[0.2em] text-red-600 mt-1">ATHLETE PROFILE</span>
            </div>
            <div class="h-10 w-[1px] bg-gray-700"></div>
            <div class="header-logo-container">
                <img src="images/rackstat-logo.png" alt="RACKSTAT" class="rackstat-logo-header">
            </div>
        </div>
        <div class="w-1/4"></div>
    </div>
</header>

<div class="max-w-md mx-auto px-4 py-6 space-y-6">
    <section class="profile-card border-l-4 border-green-600">
        <h2 class="text-green-500 font-black uppercase italic mb-4 flex justify-between items-center">
            Club Goal Tracker
            <span id="last-updated-date" class="text-[10px] text-gray-400 not-italic uppercase font-bold"></span>
        </h2>
        <div class="space-y-4">
            <select id="goal-selector">
                <option value="0">Select Target Weight Club...</option>
                <option value="100">100 Club</option>
                <option value="200">200 Club</option>
                <option value="300">300 Club</option>
                <option value="400">400 Club</option>
                <option value="500">500 Club</option>
                <option value="600">600 Club</option>
                <option value="700">700 Club</option>
                <option value="800">800 Club</option>
            </select>
            <div class="relative w-full bg-gray-900 h-4 rounded-full overflow-hidden border border-gray-800">
                <div id="goal-progress-bar" class="bg-green-600 h-full transition-all duration-1000" style="width: 0%"></div>
            </div>
            <p id="goal-message" class="text-[9px] text-center text-gray-400 font-bold uppercase italic tracking-wider">
                Update stats in the RACK to see progress
            </p>
            <button id="save-goal-btn" class="w-full mt-2 bg-gray-800 hover:bg-green-700 text-white text-[9px] font-black p-2 rounded-lg transition-all uppercase italic">
                Set Target Club
            </button>
        </div>
    </section>

    <section class="profile-card">
        <h2 class="text-red-600 font-black uppercase italic mb-6">Recruiting Essentials</h2>
        <div class="mb-6">
            <label>Athlete Full Name</label>
            <input id="full-name" type="text" placeholder="First & Last Name" class="!bg-transparent !border-0 !border-b-2 !border-gray-800 !rounded-none !px-0 py-2 focus:!border-red-600 font-black uppercase italic text-lg transition-all">
        </div>
        <div class="grid grid-cols-2 gap-6 mb-6">
            <div>
                <div class="flex justify-between items-end">
                    <label>Height (INCHES)</label>
                    <span id="height-display" class="text-[10px] font-black text-red-600 uppercase italic mb-1"></span>
                </div>
                <input id="height" type="number" placeholder="72" class="!bg-transparent !border-0 !border-b !border-gray-800 !rounded-none !px-0">
            </div>

            <div>
                <label>Weight (LBS)</label>
                <input id="weight" type="number" placeholder="215" class="!bg-transparent !border-0 !border-b !border-gray-800 !rounded-none !px-0">
            </div>
        </div>
        <div class="grid grid-cols-2 gap-6 mb-6">
            <div>
                <label class="!text-red-900/50">Offense (Prim / Sec)</label>
                <div class="flex gap-2">
                    <input id="off-primary" placeholder="-" class="!bg-transparent !border-0 !border-b !border-gray-800 !rounded-none !px-0 text-sm font-bold uppercase">
                    <input id="off-secondary" placeholder="-" class="!bg-transparent !border-0 !border-b !border-gray-800 !rounded-none !px-0 text-sm font-bold uppercase">
                </div>
            </div>
            <div>
                <label class="!text-red-900/50">Defense (Prim / Sec)</label>
                <div class="flex gap-2">
                    <input id="def-primary" placeholder="-" class="!bg-transparent !border-0 !border-b !border-gray-800 !rounded-none !px-0 text-sm font-bold uppercase">
                    <input id="def-secondary" placeholder="-" class="!bg-transparent !border-0 !border-b !border-gray-800 !rounded-none !px-0 text-sm font-bold uppercase">
                </div>
            </div>
        </div>
        <div class="grid grid-cols-3 gap-6 mb-6">
            <div><label>GPA</label><input id="gpa" type="number" step="0.01" placeholder="4.0" class="!bg-transparent !border-0 !border-b !border-gray-800 !rounded-none !px-0"></div>
            <div><label>SAT</label><input id="sat" type="number" placeholder="Total" class="!bg-transparent !border-0 !border-b !border-gray-800 !rounded-none !px-0"></div>
            <div><label>ACT</label><input id="act" type="number" placeholder="Comp" class="!bg-transparent !border-0 !border-b !border-gray-800 !rounded-none !px-0"></div>
        </div>
        <div>
            <label>Character Statement / Quote</label>
            <textarea id="character-statement" rows="3" placeholder="I am a leader in the weightroom..." class="bg-black/40 border border-gray-800 rounded p-3 mt-2 text-sm italic focus:border-red-600 outline-none text-gray-300"></textarea>
        </div>
    </section>

    <div id="goals-container" class="space-y-4"></div>

    <div class="space-y-3">
        <button id="save-btn" class="btn-primary w-full shadow-lg shadow-red-900/20">Save Profile</button>
        <button id="btn-view-card" class="w-full py-4 font-black italic uppercase bg-gray-900 border border-gray-700 rounded-lg hover:bg-gray-800 transition-all text-gray-300">
            View My Recruiting Card →
        </button>
    </div>
</div>

<nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-red-900/30 px-6 py-4 flex justify-between items-center z-50">
    <button onclick="location.href='board.html'" class="text-gray-500 flex flex-col items-center"><span class="text-[9px] font-black uppercase italic">Board</span></button>
    <button onclick="location.href='rack.html'" class="text-gray-500 flex flex-col items-center"><span class="text-[9px] font-black uppercase italic">The Rack</span></button>
    <button onclick="location.href='kitchen.html'" class="text-gray-500 flex flex-col items-center"><span class="text-[9px] font-black uppercase italic">Kitchen</span></button>
    <button onclick="location.href='profile.html'" class="text-red-600 flex flex-col items-center"><span class="text-[9px] font-black uppercase italic">Profile</span></button>
</nav>

<script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { applyTheme } from './js/theme.js';
    import { buildBoardScoreSettings, calculateBoardScore } from './js/board-score.js';

    let currentGoals = [];
    let viewedUid = null;
    let currentUserRole = null;
    let recruitingFeatureEnabled = true;
    let currentBoardSettings = null;
    let latestMergedProfileData = {};
    let latestMaxesData = {};

    const getSchoolIdFromData = (data = {}) => data.schoolId || data.school_id || "";

    function formatHeight(totalInches) {
        const numeric = Number(totalInches);
        if (!numeric || numeric <= 0) return "";
        const feet = Math.floor(numeric / 12);
        const inches = numeric % 12;
        return `${feet}'${inches}"`;
    }

    function renderGoals(uid, goals) {
        const container = document.getElementById('goals-container');
        if (!container || !goals) return;

        container.innerHTML = goals.map(goal => `
            <div class="animate-fade-in profile-card mb-4">
                <p class="text-[10px] font-black text-gray-500 uppercase">${goal.type || 'Goal'}</p>
                <p class="text-lg font-black italic uppercase">${goal.target || 0} LBS</p>
            </div>
        `).join('');
    }

    function getResolvedWeight(data = {}, maxes = {}) {
        return Number(
            maxes.weight ??
            maxes.bodyWeight ??
            maxes.body_weight ??
            data.weight ??
            data.bodyWeight ??
            0
        ) || 0;
    }

    function getLiveBoardScore(profileData = {}, maxesData = {}, boardSettings = null) {
        if (!boardSettings) {
            return Math.max(0, Number(profileData.boardScore || 0));
        }

        const resolvedWeight = getResolvedWeight(profileData, maxesData);

        const result = calculateBoardScore({
            data: {
                ...profileData,
                ...maxesData,
                weight: resolvedWeight,
                bodyWeight: resolvedWeight,
                body_weight: resolvedWeight
            },
            formulaType: boardSettings.formula_type,
            scoringLifts: boardSettings.scoring_lifts
        });

        return Math.max(0, Number(result.score) || 0);
    }

    function syncGoalDisplay(profileData = {}, maxesData = {}, boardSettings = null) {
        const currentScore = getLiveBoardScore(profileData, maxesData, boardSettings);
        const targetGoal = Number(profileData.clubGoal || 0);
        const progressBar = document.getElementById('goal-progress-bar');
        const goalMsg = document.getElementById('goal-message');
        const lastUpdatedDate = document.getElementById('last-updated-date');

        if (lastUpdatedDate && profileData.lastUpdated) {
            const d = new Date(profileData.lastUpdated);
            if (!Number.isNaN(d.getTime())) {
                lastUpdatedDate.innerText = d.toLocaleDateString();
            }
        }

        if (targetGoal > 0 && progressBar) {
            const percent = Math.min(Math.max((currentScore / targetGoal) * 100, 0), 100);
            progressBar.style.width = `${percent}%`;

            if (goalMsg) {
                goalMsg.innerText = `${Math.round(percent)}% to ${targetGoal} Club (${currentScore} / ${targetGoal})`;
            }
        } else if (progressBar) {
            progressBar.style.width = "0%";
            if (goalMsg) {
                goalMsg.innerText = "Update stats in the RACK to see progress";
            }
        }
    }

    function applyRecruitingButtonVisibility() {
        const btn = document.getElementById('btn-view-card');
        if (!btn) return;

        const currentAuthUid = auth.currentUser?.uid || null;
        const isAthleteRole = currentUserRole === 'player' || currentUserRole === 'athlete';
        const isAthleteSelfView = viewedUid === currentAuthUid && isAthleteRole;

        if (!recruitingFeatureEnabled && isAthleteSelfView) {
            btn.classList.add('hidden');
            return;
        }

        btn.classList.remove('hidden');
    }

    const safeSet = (id, val) => {
        const el = document.getElementById(id);
        if (el) el.value = val ?? "";
    };

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const targetUID = urlParams.get('id') || user.uid;
        viewedUid = targetUID;

        const currentUserRef = doc(db, "users", user.uid);
        const targetUserRef = doc(db, "users", targetUID);
        const targetProfileRef = doc(db, "recruiting_profiles", targetUID);
        const targetMaxesRef = doc(db, "recruiting_profiles", targetUID, "maxes", "latest");

        try {
            const [currentUserSnap, targetUserSnap, profileSnap, maxesSnap] = await Promise.all([
                getDoc(currentUserRef),
                getDoc(targetUserRef),
                getDoc(targetProfileRef),
                getDoc(targetMaxesRef)
            ]);

            if (!currentUserSnap.exists()) {
                window.location.href = 'index.html';
                return;
            }

            const currentUserData = currentUserSnap.data();
            currentUserRole = (currentUserData.role || "").toLowerCase();

            if (targetUID !== user.uid && currentUserRole !== 'coach' && currentUserRole !== 'admin') {
                window.location.href = 'profile.html';
                return;
            }

            const targetUserData = targetUserSnap.exists() ? targetUserSnap.data() : {};
            const profileData = profileSnap.exists() ? profileSnap.data() : {};
            const maxesData = maxesSnap.exists() ? maxesSnap.data() : {};
            const mergedData = { ...targetUserData, ...profileData };

            latestMergedProfileData = mergedData;
            latestMaxesData = maxesData;

            const schoolId = getSchoolIdFromData(mergedData) || getSchoolIdFromData(currentUserData);

            if (schoolId) {
                const themeData = await applyTheme(db, schoolId);

                recruitingFeatureEnabled = themeData?.hasRecruitingCard !== false;
                currentBoardSettings = buildBoardScoreSettings(themeData || {});

                if (themeData?.logo_primary) {
                    const logoEl = document.getElementById('school-logo');
                    logoEl.src = themeData.logo_primary;
                    logoEl.onerror = () => {
                        logoEl.src = 'images/rackstat-logo.png';
                    };
                } else if (themeData?.logo_url || themeData?.logo) {
                    const logoEl = document.getElementById('school-logo');
                    logoEl.src = themeData.logo_url || themeData.logo;
                    logoEl.onerror = () => {
                        logoEl.src = 'images/rackstat-logo.png';
                    };
                }

                if (themeData?.name) {
                    document.getElementById('school-name').innerText = themeData.name;
                }
            }

            safeSet('full-name', mergedData.fullName);
            safeSet('height', mergedData.height);
            safeSet('weight', getResolvedWeight(mergedData, maxesData));
            safeSet('off-primary', mergedData.offPrimary);
            safeSet('off-secondary', mergedData.offSecondary);
            safeSet('def-primary', mergedData.defPrimary);
            safeSet('def-secondary', mergedData.defSecondary);
            safeSet('gpa', mergedData.gpa);
            safeSet('sat', mergedData.sat);
            safeSet('act', mergedData.act);
            safeSet('character-statement', mergedData.statement);

            const heightDisplay = document.getElementById('height-display');
            if (heightDisplay) {
                heightDisplay.innerText = formatHeight(mergedData.height);
            }

            if (mergedData.clubGoal) {
                document.getElementById('goal-selector').value = mergedData.clubGoal;
            }

            currentGoals = mergedData.goals || [];
            renderGoals(targetUID, currentGoals);
            syncGoalDisplay(latestMergedProfileData, latestMaxesData, currentBoardSettings);
            applyRecruitingButtonVisibility();

        } catch (err) {
            console.error("❌ Profile Loading Error:", err);
        }
    });

    window.saveClubGoal = async () => {
        const user = auth.currentUser;
        if (!user || !viewedUid) return;

        const goalValue = document.getElementById('goal-selector').value;
        const btn = document.getElementById('save-goal-btn');
        btn.innerText = "SAVING...";
        btn.disabled = true;

        try {
            await setDoc(doc(db, "recruiting_profiles", viewedUid), {
                clubGoal: Number(goalValue)
            }, { merge: true });

            latestMergedProfileData.clubGoal = Number(goalValue);

            btn.innerText = "GOAL SET!";
            btn.style.backgroundColor = "#059669";

            syncGoalDisplay(latestMergedProfileData, latestMaxesData, currentBoardSettings);

            setTimeout(() => {
                btn.innerText = "Set Target Club";
                btn.style.backgroundColor = "";
                btn.disabled = false;
            }, 2000);

        } catch (err) {
            console.error("Club goal save error:", err);
            btn.innerText = "SAVE ERROR";
            btn.disabled = false;
        }
    };

    window.saveProfile = async () => {
        const user = auth.currentUser;
        if (!user || !viewedUid) return;

        const btn = document.getElementById('save-btn');
        btn.innerText = "UPDATING...";
        btn.disabled = true;

        const getVal = (id, isNumber = false) => {
            const el = document.getElementById(id);
            if (!el) return isNumber ? 0 : "";
            return isNumber ? Number(el.value) || 0 : el.value;
        };

        try {
            const fullName = getVal('full-name');
            const weight = getVal('weight', true);

            const profilePayload = {
                fullName,
                height: getVal('height', true),
                weight,
                bodyWeight: weight,
                offPrimary: getVal('off-primary'),
                offSecondary: getVal('off-secondary'),
                defPrimary: getVal('def-primary'),
                defSecondary: getVal('def-secondary'),
                gpa: getVal('gpa', true),
                sat: getVal('sat'),
                act: getVal('act'),
                statement: getVal('character-statement'),
                lastUpdated: new Date().toISOString()
            };

            const recalculatedBoardScore = getLiveBoardScore(
                { ...latestMergedProfileData, ...profilePayload },
                { ...latestMaxesData, weight, bodyWeight: weight, body_weight: weight },
                currentBoardSettings
            );

            await Promise.all([
                setDoc(doc(db, "recruiting_profiles", viewedUid), {
                    ...profilePayload,
                    boardScore: recalculatedBoardScore
                }, { merge: true }),
                setDoc(doc(db, "users", viewedUid), {
                    fullName,
                    weight,
                    lastSync: serverTimestamp()
                }, { merge: true }),
                setDoc(doc(db, "recruiting_profiles", viewedUid, "maxes", "latest"), {
                    weight,
                    bodyWeight: weight,
                    body_weight: weight,
                    lastUpdated: serverTimestamp()
                }, { merge: true })
            ]);

            latestMergedProfileData = {
                ...latestMergedProfileData,
                ...profilePayload,
                boardScore: recalculatedBoardScore
            };

            latestMaxesData = {
                ...latestMaxesData,
                weight,
                bodyWeight: weight,
                body_weight: weight
            };

            syncGoalDisplay(latestMergedProfileData, latestMaxesData, currentBoardSettings);

            btn.innerText = "PROFILE SAVED!";
            btn.style.backgroundColor = "#059669";
        } catch (e) {
            console.error("Profile save error:", e);
            btn.innerText = "ERROR SAVING";
        } finally {
            setTimeout(() => {
                btn.innerText = "Save Profile";
                btn.disabled = false;
                btn.style.backgroundColor = "";
            }, 2000);
        }
    };

    const heightInput = document.getElementById('height');
    const heightDisplay = document.getElementById('height-display');

    if (heightInput && heightDisplay) {
        heightInput.addEventListener('input', (e) => {
            heightDisplay.innerText = formatHeight(e.target.value);
        });
    }

    document.getElementById('save-btn').onclick = window.saveProfile;
    document.getElementById('save-goal-btn').onclick = window.saveClubGoal;
    document.getElementById('btn-view-card').onclick = () => {
        if (viewedUid) window.location.href = `recruiting-card.html?uid=${viewedUid}`;
    };
</script>
</body>
</html>
