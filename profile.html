<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY PROFILE | RACKSTAT</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: var(--rackstat-black); color: white; }
        .profile-card { background: var(--rackstat-gray); border-radius: 12px; padding: 1.5rem; border: 1px solid var(--rackstat-border); }
        .goal-progress { background: #1a1a1a; border-radius: 10px; height: 12px; width: 100%; overflow: hidden; margin-top: 8px; border: 1px solid #333; }
        .progress-fill { 
            background: linear-gradient(90deg, #b91c1c 0%, #ef4444 100%); 
            height: 100%; 
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 0 10px rgba(185, 28, 28, 0.4);
        }
        input, select { 
            background: #000 !important; border: 1px solid var(--rackstat-border) !important; 
            color: white !important; padding: 0.6rem !important; border-radius: 4px !important; width: 100%; font-size: 14px;
        }
        label { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #94a3b8; margin-left: 2px; margin-bottom: 4px; display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-black border-b-2 border-red-700 p-4 sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-5xl mx-auto">
            <button onclick="location.href='index.html'" class="text-[10px] font-black uppercase bg-gray-800 px-3 py-1.5 rounded text-gray-400 hover:text-white transition-all">
                ← Lobby
            </button>
            
            <div class="flex items-center gap-5">
                <img id="school-logo" src="images/panther-logo1.png" alt="School" class="h-10 w-auto">
                <div class="h-6 w-[1px] bg-gray-800"></div>
                <span class="text-sm font-black italic uppercase tracking-[0.15em] text-white">FAIRBANKS</span>
                <div class="h-6 w-[1px] bg-gray-800"></div>
                <img src="images/rackstat-logo.png" alt="RACKSTAT" class="h-10 w-auto">
            </div>

            <div class="w-[65px]"></div>
        </div>
    </header>

    <div class="max-w-md mx-auto px-4 py-6 space-y-6">

        <section class="profile-card border-l-4 border-green-600">
            <h2 class="text-green-500 font-black uppercase italic mb-4 flex justify-between items-center">
                Goal Tracker
                <span class="text-[8px] text-gray-500 not-italic">Weightroom Progress</span>
            </h2>
            <div id="goals-container" class="space-y-6">
                <p class="text-center text-[10px] text-gray-600 uppercase font-bold py-4 italic">No goals active</p>
            </div>
            <button onclick="openGoalModal()" class="w-full mt-6 border-2 border-dashed border-gray-700 py-3 rounded-lg text-[10px] font-bold uppercase text-gray-400 hover:border-red-600 transition-colors">+ Set New Performance Goal</button>
        </section>

        <section class="profile-card">
            <h2 class="text-red-600 font-black uppercase italic mb-6">Recruiting Essentials</h2>
            
            <div class="mb-6">
                <label class="text-[10px] font-black uppercase tracking-widest text-gray-500">Athlete Full Name</label>
                <input id="full-name" type="text" placeholder="First & Last Name" 
                       class="w-full bg-transparent border-b-2 border-gray-800 py-2 focus:border-red-600 outline-none font-black uppercase italic text-lg transition-all">
            </div>

            <div class="grid grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-gray-500">Height</label>
                    <input id="height" placeholder="6'2" class="w-full bg-transparent border-b border-gray-800 py-1 focus:border-red-600 outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-gray-500">Weight (LBS)</label>
                    <input id="weight" type="number" placeholder="215" class="w-full bg-transparent border-b border-gray-800 py-1 focus:border-red-600 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-red-900/50">Offense (Prim / Sec)</label>
                    <div class="flex gap-2">
                        <input id="off-primary" placeholder="QB" class="w-1/2 bg-transparent border-b border-gray-800 py-1 focus:border-red-600 outline-none text-sm font-bold uppercase">
                        <input id="off-secondary" placeholder="WR" class="w-1/2 bg-transparent border-b border-gray-800 py-1 focus:border-red-600 outline-none text-sm font-bold uppercase">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-red-900/50">Defense (Prim / Sec)</label>
                    <div class="flex gap-2">
                        <input id="def-primary" placeholder="LB" class="w-1/2 bg-transparent border-b border-gray-800 py-1 focus:border-red-600 outline-none text-sm font-bold uppercase">
                        <input id="def-secondary" placeholder="S" class="w-1/2 bg-transparent border-b border-gray-800 py-1 focus:border-red-600 outline-none text-sm font-bold uppercase">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-6 mb-6">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-gray-500">GPA</label>
                    <input id="gpa" type="number" step="0.01" placeholder="4.0" class="w-full bg-transparent border-b border-gray-800 py-1 focus:border-red-600 outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-gray-500">SAT</label>
                    <input id="sat" type="number" placeholder="Total" class="w-full bg-transparent border-b border-gray-800 py-1 focus:border-red-600 outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-gray-500">ACT</label>
                    <input id="act" type="number" placeholder="Comp" class="w-full bg-transparent border-b border-gray-800 py-1 focus:border-red-600 outline-none">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-black uppercase tracking-widest text-gray-500">Character Statement / Quote</label>
                <textarea id="character-statement" rows="3" placeholder="I am a leader in the weightroom and a student of the game..." 
                          class="w-full bg-black/40 border border-gray-800 rounded p-3 mt-2 text-sm italic focus:border-red-600 outline-none text-gray-300"></textarea>
            </div>
        </section>

        <section class="profile-card">
            <h2 class="text-blue-500 font-black uppercase italic mb-4">Film & Socials</h2>
            <div class="space-y-3">
                <div><label>Hudl Link</label><input id="hudl-link" placeholder="hudl.com/video/..."></div>
                <div><label>Twitter / X Handle</label><input id="twitter-link" placeholder="@Username"></div>
                <div><label>YouTube Highlight</label><input id="youtube-link" placeholder="youtube.com/watch?v=..."></div>
                <div><label>Other (Linktree/Instagram)</label><input id="other-link" placeholder="https://..."></div>
            </div>
        </section>

        <div class="space-y-3">
            <button onclick="saveProfile()" id="save-btn" class="w-full py-4 font-black italic uppercase bg-red-700 rounded-lg hover:bg-red-600 transition-all shadow-lg shadow-red-900/20">
                Save Recruiting Card
            </button>
            <button onclick="viewCard()" class="w-full py-4 font-black italic uppercase bg-gray-900 border border-gray-700 rounded-lg hover:bg-gray-800 transition-all text-gray-300">
                View My Recruiting Card →
            </button>
        </div>
    </div>

    <div id="goal-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center p-6 z-50">
        <div class="bg-[#111] border border-red-700 p-8 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 class="font-black italic uppercase text-white mb-6">New Goal</h3>
            <label>Category</label>
            <select id="goal-category" class="mb-4">
                <option value="bodyWeight">Body Weight</option>
            </select>
            <label>Target Weight (LBS)</label>
            <input id="goal-target" type="number" class="mb-6">
            <div class="flex gap-2">
                <button onclick="closeGoalModal()" class="flex-1 bg-gray-800 py-3 rounded-lg font-bold text-[10px] uppercase">Cancel</button>
                <button onclick="addGoal()" class="flex-1 bg-red-700 py-3 rounded-lg font-bold text-[10px] uppercase">Set Goal</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBOQFeokKaNQKwaUhXMCA0oEm4W9G0qafE", 
            authDomain: "rackstat-production.firebaseapp.com", 
            projectId: "rackstat-production",
            storageBucket: "rackstat-production.firebasestorage.app",
            messagingSenderId: "345003825117",
            appId: "1:345003825117:web:2ad86b1902dfdebe0c8834"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentGoals = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "recruiting_profiles", user.uid));
                if(snap.exists()) {
                    const data = snap.data();
                    
                    // 1. Identity & Positions
                    document.getElementById('full-name').value = data.fullName || '';
                    document.getElementById('off-primary').value = data.offPrimary || '';
                    document.getElementById('off-secondary').value = data.offSecondary || '';
                    document.getElementById('def-primary').value = data.defPrimary || '';
                    document.getElementById('def-secondary').value = data.defSecondary || '';
                    
                    // 2. Physical & Academic Stats
                    document.getElementById('height').value = data.height || '';
                    document.getElementById('weight').value = data.weight || '';
                    document.getElementById('gpa').value = data.gpa || '';
                    document.getElementById('sat').value = data.sat || '';
                    document.getElementById('act').value = data.act || '';
                    
                    // 3. Character Statement
                    document.getElementById('character-statement').value = data.statement || '';
                    
                    // 4. Recruiting Links
                    document.getElementById('hudl-link').value = data.hudlLink || '';
                    document.getElementById('twitter-link').value = data.twitterLink || '';
                    document.getElementById('youtube-link').value = data.youtubeLink || '';
                    document.getElementById('other-link').value = data.otherLink || '';
                    
                    // 5. Load School-Specific Lifts for the Goal Modal
                    currentGoals = data.goals || [];
                    
                    const schoolId = data.schoolId || data.school_id; 
                    if(schoolId) {
                        const schoolSnap = await getDoc(doc(db, "schools", schoolId));
                        if(schoolSnap.exists()){
                            const sData = schoolSnap.data();
                            const select = document.getElementById('goal-category');
                            
                            // Uses the trackedLifts array you created in the console
                            const lifts = sData.trackedLifts || ['bench', 'squat', 'clean'];
                            
                            select.innerHTML = lifts.map(l => {
                                const display = l.replace('_', ' ').toUpperCase();
                                return `<option value="${l}">${display}</option>`;
                            }).join('');
                        }
                    }

                    // 6. Final Render of Goal Progress Bars
                    renderGoals(user.uid, currentGoals);
                }
            } else { 
                location.href = 'index.html'; 
            }
        });

    async function renderGoals(uid, goals) {
        const container = document.getElementById('goals-container');
        
        // Check if goals exist in the array
        if (!goals || goals.length === 0) {
            container.innerHTML = '<p class="text-center text-[10px] text-gray-600 uppercase font-bold py-4 italic">No goals active</p>';
            return;
        }
        
        // Clear container to prepare for rendering
        container.innerHTML = '';
        
        try {
            // Fetch latest maxes to calculate progress
            const q = query(collection(db, "recruiting_profiles", uid, "maxes"), orderBy("timestamp", "desc"), limit(1));
            const maxSnap = await getDocs(q);
            
            // If the collection is empty, latestStats becomes an empty object {}
            const latestStats = !maxSnap.empty ? maxSnap.docs[0].data() : {};

            goals.forEach((goal, index) => {
                // If goal.type doesn't exist in latestStats, it defaults to 0
                const currentVal = Number(latestStats[goal.type]) || 0;
                const targetVal = Number(goal.target) || 0;
                
                // Calculate progress; handle division by zero just in case
                const progress = targetVal > 0 ? Math.min((currentVal / targetVal) * 100, 100) : 0;
                
                // Format display name (e.g., bodyWeight -> Body Weight)
                const displayName = goal.type.replace('_', ' ').replace(/([A-Z])/g, ' $1').trim();
                
                container.innerHTML += `
                    <div class="animate-fade-in group mb-6 last:mb-0">
                        <div class="flex justify-between items-end mb-1">
                            <div>
                                <div class="flex items-center gap-2">
                                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-wider">${displayName}</p>
                                    <button onclick="removeGoal(${index})" class="text-[9px] text-red-900 opacity-0 group-hover:opacity-100 transition-opacity font-bold uppercase">[Remove]</button>
                                </div>
                                <p class="text-lg font-black italic uppercase leading-none">${targetVal} LBS</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] font-bold text-gray-400 uppercase">Current: ${currentVal}</p>
                                <p class="text-xs font-black ${progress >= 100 ? 'text-green-500' : 'text-red-600'}">${Math.round(progress)}%</p>
                            </div>
                        </div>
                        <div class="goal-progress">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>
                `;
            });
        } catch (error) {
            console.error("Error rendering goals:", error);
            // Fallback: Still try to render the goals with 0 progress if the database fetch fails
            renderFallbackGoals(container, goals);
        }
    }

    // Helper function to show goals at 0% if the Maxes query fails or is blocked
    function renderFallbackGoals(container, goals) {
        container.innerHTML = '';
        goals.forEach((goal, index) => {
            const displayName = goal.type.replace('_', ' ').replace(/([A-Z])/g, ' $1').trim();
            container.innerHTML += `
                <div class="animate-fade-in group mb-6">
                    <div class="flex justify-between items-end mb-1">
                        <div>
                            <p class="text-[10px] font-black text-gray-500 uppercase tracking-wider">${displayName}</p>
                            <p class="text-lg font-black italic uppercase leading-none">${goal.target} LBS</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-bold text-gray-400 uppercase">Current: 0</p>
                            <p class="text-xs font-black text-red-600">0%</p>
                        </div>
                    </div>
                    <div class="goal-progress"><div class="progress-fill" style="width: 0%"></div></div>
                </div>
            `;
        });
    }

    async function loadSchoolLifts(schoolId) {
        const schoolRef = doc(db, "schools", schoolId);
        const schoolSnap = await getDoc(schoolRef);

        if (schoolSnap.exists()) {
            const data = schoolSnap.data();
            const lifts = data.trackedLifts || [];
            const select = document.getElementById('goal-category');
            
            // Clear the existing dropdown and map the new lifts
            select.innerHTML = lifts.map(lift => {
                // Pretty format: "push_press" -> "PUSH PRESS"
                const display = lift.replace('_', ' ').toUpperCase();
                return `<option value="${lift}">${display}</option>`;
            }).join('');
        }
    }
        window.viewCard = () => {
            const user = auth.currentUser;
            if(user) {
                window.location.href = `recruiting-card.html?uid=${user.uid}`;
            }
        };

        window.removeGoal = async (index) => {
            if(!confirm("Remove this goal?")) return;
            currentGoals.splice(index, 1);
            await updateDoc(doc(db, "recruiting_profiles", auth.currentUser.uid), { goals: currentGoals });
            renderGoals(auth.currentUser.uid, currentGoals);
        };

        window.saveProfile = async () => {
            const user = auth.currentUser;
            const btn = document.getElementById('save-btn');
            const originalText = btn.innerText;
            btn.innerText = "UPDATING...";
            
            try {
                await updateDoc(doc(db, "recruiting_profiles", user.uid), {
                    // New Identity and Position Fields
                    fullName: document.getElementById('full-name').value,
                    offPrimary: document.getElementById('off-primary').value,
                    offSecondary: document.getElementById('off-secondary').value,
                    defPrimary: document.getElementById('def-primary').value,
                    defSecondary: document.getElementById('def-secondary').value,
                    
                    // Stats and Academics
                    height: document.getElementById('height').value,
                    weight: Number(document.getElementById('weight').value),
                    gpa: Number(document.getElementById('gpa').value),
                    sat: document.getElementById('sat').value,
                    act: document.getElementById('act').value,
                    
                    // Character Statement
                    statement: document.getElementById('character-statement').value,
                    
                    // Social Media Links
                    hudlLink: document.getElementById('hudl-link').value,
                    twitterLink: document.getElementById('twitter-link').value,
                    youtubeLink: document.getElementById('youtube-link').value,
                    otherLink: document.getElementById('other-link').value
                });
                
                btn.innerText = "PROFILE SAVED!";
            } catch (e) {
                console.error("Save Error:", e);
                btn.innerText = "ERROR SAVING";
            }
            
            setTimeout(() => { btn.innerText = originalText; }, 2000);
        };

        window.openGoalModal = () => document.getElementById('goal-modal').classList.remove('hidden');
        window.closeGoalModal = () => document.getElementById('goal-modal').classList.add('hidden');

        window.addGoal = async () => {
            const categorySelect = document.getElementById('goal-category');
            const targetInput = document.getElementById('goal-target');
            
            const type = categorySelect.value;
            const target = Number(targetInput.value);
            
            if(!target || target <= 0) {
                alert("Please enter a valid target weight.");
                return;
            }

            // 1. Update local state: remove existing goal of same type, add new one
            const updatedGoals = currentGoals.filter(g => g.type !== type);
            updatedGoals.push({ type, target });

            try {
                // 2. Sync with Firebase
                await updateDoc(doc(db, "recruiting_profiles", auth.currentUser.uid), { 
                    goals: updatedGoals 
                });

                // 3. Update local reference and UI
                currentGoals = updatedGoals;
                renderGoals(auth.currentUser.uid, currentGoals);
                
                // 4. Cleanup UI
                targetInput.value = ''; // Clear input for next time
                closeGoalModal();
                
            } catch (error) {
                console.error("Error saving goal:", error);
                alert("Failed to save goal. Please check your connection.");
            }
        };
    </script>
</body>
</html>
