<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY PROFILE | RACKSTAT</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: var(--rackstat-black); color: white; }
        .profile-card { background: var(--rackstat-gray); border-radius: 12px; padding: 1.5rem; border: 1px solid var(--rackstat-border); }
        .goal-progress { background: #334155; border-radius: 10px; height: 10px; width: 100%; overflow: hidden; margin-top: 8px; }
        .progress-fill { background: var(--rackstat-red); height: 100%; transition: width 0.8s ease-in-out; }
        input, select { 
            background: #000 !important; border: 1px solid var(--rackstat-border) !important; 
            color: white !important; padding: 0.6rem !important; border-radius: 4px !important; width: 100%; font-size: 14px;
        }
        label { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #94a3b8; margin-left: 2px; margin-bottom: 4px; display: block; }
    </style>
</head>
<body class="pb-24">

    <header class="brand-header flex justify-between items-center p-4 border-b border-red-900/30">
        <button onclick="location.href='index.html'" class="text-[10px] font-black uppercase bg-gray-800 px-3 py-1 rounded">← Lobby</button>
        <img id="school-logo" src="images/rackstat-logo.png" alt="Logo" class="h-8">
        <div class="w-12"></div> </header>

    <div class="max-w-md mx-auto px-4 py-6 space-y-6">

        <section class="profile-card">
            <h2 class="text-red-600 font-black uppercase italic mb-4">Recruiting Essentials</h2>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div><label>Height</label><input id="height" placeholder="6'2"></div>
                <div><label>Weight (LBS)</label><input id="weight" type="number"></div>
                <div><label>GPA</label><input id="gpa" type="number" step="0.01"></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label>SAT Score</label><input id="sat" type="number" placeholder="Total"></div>
                <div><label>ACT Score</label><input id="act" type="number" placeholder="Composite"></div>
            </div>
        </section>

        <section class="profile-card">
            <h2 class="text-blue-500 font-black uppercase italic mb-4">Film & Socials</h2>
            <div class="space-y-3">
                <div><label>Hudl Link</label><input id="hudl-link" placeholder="hudl.com/video/..."></div>
                <div><label>Twitter / X Handle</label><input id="twitter-link" placeholder="@Username"></div>
                <div><label>YouTube Highlight</label><input id="youtube-link" placeholder="youtube.com/watch?v=..."></div>
                <div><label>Other (Linktree/Instagram)</label><input id="other-link" placeholder="https://..."></div>
            </div>
        </section>

        <section class="profile-card">
            <h2 class="text-green-500 font-black uppercase italic mb-4">Goal Tracker</h2>
            <div id="goals-container" class="space-y-6">
                </div>
            <button onclick="openGoalModal()" class="w-full mt-6 border-2 border-dashed border-gray-600 py-3 rounded-lg text-[10px] font-bold uppercase text-gray-400 hover:border-red-600">+ Set New Performance Goal</button>
        </section>

        <button onclick="saveProfile()" id="save-btn" class="btn-primary w-full py-4 font-black italic uppercase">Save Recruiting Card</button>
    </div>

    <div id="goal-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center p-6 z-50">
        <div class="bg-[#111] border border-red-700 p-8 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 class="font-black italic uppercase text-white mb-6">New Goal</h3>
            <label>Category</label>
            <select id="goal-category" class="mb-4">
                <option value="bodyWeight">Body Weight</option>
            </select>
            <label>Target Weight (LBS)</label>
            <input id="goal-target" type="number" class="mb-6">
            <div class="flex gap-2">
                <button onclick="closeGoalModal()" class="flex-1 bg-gray-800 py-3 rounded-lg font-bold text-[10px] uppercase">Cancel</button>
                <button onclick="addGoal()" class="flex-1 bg-red-700 py-3 rounded-lg font-bold text-[10px] uppercase">Set Goal</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIG (Same as yours)
        const firebaseConfig = { 
            apiKey: "AIzaSyBOQFeokKaNQKwaUhXMCA0oEm4W9G0qafE", 
            authDomain: "rackstat-production.firebaseapp.com", 
            projectId: "rackstat-production",
            storageBucket: "rackstat-production.firebasestorage.app",
            messagingSenderId: "345003825117",
            appId: "1:345003825117:web:2ad86b1902dfdebe0c8834"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentGoals = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "recruiting_profiles", user.uid));
                if(snap.exists()) {
                    const data = snap.data();
                    // Load Data into fields
                    document.getElementById('height').value = data.height || '';
                    document.getElementById('weight').value = data.weight || '';
                    document.getElementById('gpa').value = data.gpa || '';
                    document.getElementById('sat').value = data.sat || '';
                    document.getElementById('act').value = data.act || '';
                    document.getElementById('hudl-link').value = data.hudlLink || '';
                    document.getElementById('twitter-link').value = data.twitterLink || '';
                    document.getElementById('youtube-link').value = data.youtubeLink || '';
                    document.getElementById('other-link').value = data.otherLink || '';
                    
                    currentGoals = data.goals || [];
                    
                    // Fetch school info for lifts
                    if(data.school_id) {
                        const schoolSnap = await getDoc(doc(db, "schools", data.school_id));
                        if(schoolSnap.exists()){
                            const sData = schoolSnap.data();
                            const select = document.getElementById('goal-category');
                            const lifts = sData.preferences?.tracked_lifts || ['bench', 'squat', 'clean'];
                            lifts.forEach(l => {
                                select.innerHTML += `<option value="${l}">${l.toUpperCase()}</option>`;
                            });
                        }
                    }
                    renderGoals(user.uid, currentGoals);
                }
            } else { location.href = 'index.html'; }
        });

        async function renderGoals(uid, goals) {
            const container = document.getElementById('goals-container');
            container.innerHTML = '';
            
            // Get latest maxes to calculate progress
            const q = query(collection(db, "recruiting_profiles", uid, "maxes"), orderBy("timestamp", "desc"), limit(1));
            const maxSnap = await getDocs(q);
            const latestStats = !maxSnap.empty ? maxSnap.docs[0].data() : {};

            goals.forEach(goal => {
                const currentVal = latestStats[goal.type] || 0;
                const progress = Math.min((currentVal / goal.target) * 100, 100);
                
                container.innerHTML += `
                    <div class="animate-fade-in">
                        <div class="flex justify-between items-end mb-1">
                            <div>
                                <p class="text-[9px] font-black text-gray-500 uppercase">${goal.type.replace('_', ' ')}</p>
                                <p class="text-lg font-black italic uppercase">${goal.target} LBS</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] font-bold text-gray-400 uppercase">Current: ${currentVal}</p>
                                <p class="text-xs font-black ${progress >= 100 ? 'text-green-500' : 'text-red-600'}">${Math.round(progress)}%</p>
                            </div>
                        </div>
                        <div class="goal-progress"><div class="progress-fill" style="width: ${progress}%"></div></div>
                    </div>
                `;
            });
        }

        window.saveProfile = async () => {
            const user = auth.currentUser;
            const btn = document.getElementById('save-btn');
            btn.innerText = "UPDATING...";
            
            await updateDoc(doc(db, "recruiting_profiles", user.uid), {
                height: document.getElementById('height').value,
                weight: Number(document.getElementById('weight').value),
                gpa: Number(document.getElementById('gpa').value),
                sat: document.getElementById('sat').value,
                act: document.getElementById('act').value,
                hudlLink: document.getElementById('hudl-link').value,
                twitterLink: document.getElementById('twitter-link').value,
                youtubeLink: document.getElementById('youtube-link').value,
                otherLink: document.getElementById('other-link').value
            });

            btn.innerText = "SAVED!";
            setTimeout(() => { btn.innerText = "Save Recruiting Card"; }, 2000);
        };

        window.openGoalModal = () => document.getElementById('goal-modal').classList.remove('hidden');
        window.closeGoalModal = () => document.getElementById('goal-modal').classList.add('hidden');

        window.addGoal = async () => {
            const type = document.getElementById('goal-category').value;
            const target = Number(document.getElementById('goal-target').value);
            if(!target) return;

            const updatedGoals = currentGoals.filter(g => g.type !== type);
            updatedGoals.push({ type, target });

            await updateDoc(doc(db, "recruiting_profiles", auth.currentUser.uid), { goals: updatedGoals });
            location.reload();
        };
    </script>
</body>
</html>
