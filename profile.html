<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY PROFILE | RACKSTAT</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: var(--rackstat-black); color: white; }
        .profile-card { background: var(--rackstat-gray); border-radius: 12px; padding: 1.5rem; border: 1px solid var(--rackstat-border); }
        .goal-progress { background: #334155; border-radius: 10px; height: 8px; width: 100%; overflow: hidden; margin-top: 8px; }
        .progress-fill { background: var(--rackstat-red); height: 100%; transition: width 0.5s ease; }
        input, select { 
            background: #000 !important; border: 1px solid var(--rackstat-border) !important; 
            color: white !important; padding: 0.5rem !important; border-radius: 4px !important; width: 100%;
        }
        label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #94a3b8; margin-left: 2px; }
    </style>
</head>
<body class="pb-20">

    <header class="brand-header">
        <img id="school-logo" src="images/rackstat-logo.png" alt="Logo" class="rackstat-logo">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">PLAYER <span class="text-red-600">PROFILE</span></h1>
        <button onclick="location.href='board.html'" class="btn-primary text-[10px] py-2 w-auto px-6">← Board</button>
    </header>

    <div class="max-w-md mx-auto px-4 py-6 space-y-6">

        <section class="profile-card">
            <h2 class="text-red-600 font-black uppercase italic mb-4">Recruiting Essentials</h2>
            <div class="grid grid-cols-2 gap-4">
                <div><label>Height</label><input id="height" placeholder="e.g. 6'2"></div>
                <div><label>Weight (LBS)</label><input id="weight" type="number"></div>
                <div><label>GPA</label><input id="gpa" type="number" step="0.01"></div>
                <div><label>SAT/ACT</label><input id="test-score" placeholder="Score"></div>
            </div>
            <div class="mt-4">
                <label>Hudl / Highlight Link</label>
                <input id="highlight-link" placeholder="https://hudl.com/video/...">
            </div>
        </section>

        <section class="profile-card">
            <h2 class="text-blue-500 font-black uppercase italic mb-4">Performance Goals</h2>
            <div id="goals-container" class="space-y-6">
                </div>
            <button onclick="openGoalModal()" class="w-full mt-6 border-2 border-dashed border-gray-600 py-3 rounded-lg text-[10px] font-bold uppercase text-gray-400">+ Set New Goal</button>
        </section>

        <button onclick="saveProfile()" id="save-btn" class="btn-primary">Save Recruiting Card</button>
    </div>

    <div id="goal-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden flex items-center justify-center p-6 z-50">
        <div class="bg-[#1a1a1c] border border-red-700 p-8 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 class="font-black italic uppercase text-white mb-6">Set Performance Goal</h3>
            
            <label>Select Lift / Category</label>
            <select id="goal-category" class="mb-4">
                <option value="bodyWeight">Body Weight</option>
                </select>

            <label>Target Weight (LBS)</label>
            <input id="goal-target" type="number" placeholder="Enter target" class="mb-6">

            <div class="flex gap-2">
                <button onclick="closeGoalModal()" class="flex-1 bg-gray-800 py-3 rounded-lg font-bold text-[10px] uppercase">Cancel</button>
                <button onclick="addGoal()" class="flex-1 bg-red-700 py-3 rounded-lg font-bold text-[10px] uppercase">Save Goal</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBOQFeokKaNQKwaUhXMCA0oEm4W9G0qafE", 
            authDomain: "rackstat-production.firebaseapp.com", 
            projectId: "rackstat-production",
            storageBucket: "rackstat-production.firebasestorage.app",
            messagingSenderId: "345003825117",
            appId: "1:345003825117:web:2ad86b1902dfdebe0c8834"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentGoals = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "recruiting_profiles", user.uid));
                if(snap.exists()) {
                    const data = snap.data();
                    document.getElementById('height').value = data.height || '';
                    document.getElementById('weight').value = data.weight || '';
                    document.getElementById('gpa').value = data.gpa || '';
                    document.getElementById('test-score').value = data.testScore || '';
                    document.getElementById('highlight-link').value = data.highlightLink || '';
                    
                    currentGoals = data.goals || [];
                    
                    // 1. Fetch school logo and lift preferences
                    if(data.school_id) {
                        const schoolSnap = await getDoc(doc(db, "schools", data.school_id));
                        if(schoolSnap.exists()){
                            const schoolData = schoolSnap.data();
                            if(schoolData.logo_primary) document.getElementById('school-logo').src = schoolData.logo_primary;
                            
                            // Populate Dropdown with School's preferred lifts
                            const select = document.getElementById('goal-category');
                            const lifts = schoolData.preferences?.tracked_lifts || ['bench', 'squat', 'clean'];
                            lifts.forEach(lift => {
                                const option = document.createElement('option');
                                option.value = lift;
                                option.textContent = lift.replace('_', ' ').toUpperCase();
                                select.appendChild(option);
                            });
                        }
                    }

                    renderGoals(user.uid, currentGoals);
                }
            } else { location.href = 'index.html'; }
        });

        async function renderGoals(uid, goals) {
            const container = document.getElementById('goals-container');
            container.innerHTML = '';
            
            const q = query(collection(db, "recruiting_profiles", uid, "maxes"), orderBy("timestamp", "desc"), limit(1));
            const maxSnap = await getDocs(q);
            const currentMaxes = !maxSnap.empty ? maxSnap.docs[0].data() : {};

            goals.forEach(goal => {
                const current = currentMaxes[goal.type] || 0;
                const progress = Math.min((current / goal.target) * 100, 100);
                
                container.innerHTML += `
                    <div>
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-[10px] font-bold text-gray-400 uppercase">${goal.type.replace('_', ' ')} Goal</p>
                                <p class="text-lg font-black italic uppercase">${goal.target} LBS</p>
                            </div>
                            <p class="text-[10px] font-black ${progress >= 100 ? 'text-green-500' : 'text-red-600'}">${Math.round(progress)}%</p>
                        </div>
                        <div class="goal-progress"><div class="progress-fill" style="width: ${progress}%"></div></div>
                    </div>
                `;
            });
        }

        window.saveProfile = async () => {
            const user = auth.currentUser;
            const btn = document.getElementById('save-btn');
            btn.innerText = "UPDATING...";
            
            try {
                await updateDoc(doc(db, "recruiting_profiles", user.uid), {
                    height: document.getElementById('height').value,
                    weight: Number(document.getElementById('weight').value),
                    gpa: Number(document.getElementById('gpa').value),
                    testScore: document.getElementById('test-score').value,
                    highlightLink: document.getElementById('highlight-link').value
                });
                alert("Profile Updated!");
            } catch (e) { alert("Error: " + e.message); }
            btn.innerText = "Save Recruiting Card";
        };

        // Modal Logic
        window.openGoalModal = () => document.getElementById('goal-modal').classList.remove('hidden');
        window.closeGoalModal = () => document.getElementById('goal-modal').classList.add('hidden');

        window.addGoal = async () => {
            const type = document.getElementById('goal-category').value;
            const target = Number(document.getElementById('goal-target').value);
            if(!target) return alert("Enter a target weight");

            const updatedGoals = currentGoals.filter(g => g.type !== type);
            updatedGoals.push({ type, target });

            await updateDoc(doc(db, "recruiting_profiles", auth.currentUser.uid), {
                goals: updatedGoals
            });

            location.reload();
        };
    </script>
</body>
</html>
