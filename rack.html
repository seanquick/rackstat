<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE RACK | RACKSTAT</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; }
        .max-card { 
            background: #1e293b; 
            border-radius: 1rem; 
            padding: 1rem; 
            text-align: center; 
            border-bottom: 4px solid #b91c1c; 
        }
        input { 
            background-color: #000 !important; 
            color: white !important; 
            border: 1px solid #334155 !important; 
            padding: 0.75rem !important; 
            border-radius: 8px !important; 
            width: 100%; 
            margin-bottom: 0.75rem; 
        }
        .btn-primary {
            width: 100%;
            background-color: #b91c1c;
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            padding: 1rem;
            border-radius: 0.75rem;
            transition: all 0.2s;
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="font-sans pb-20">

    <header class="bg-black border-b-2 border-red-700 p-4 sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-5xl mx-auto">
            <button onclick="location.href='index.html'" class="text-[10px] font-black uppercase bg-gray-800 px-3 py-1.5 rounded text-gray-400 hover:text-white transition-all">
                ← Lobby
            </button>
            
            <div class="flex items-center gap-5">
                <img id="school-logo" src="images/rackstat-logo-placeholder.png" alt="School" class="h-10 w-auto object-contain">
                <div class="h-6 w-[1px] bg-gray-800"></div>
                <span id="school-tag" class="text-sm font-black italic uppercase tracking-[0.15em] text-white">
                    RACKSTAT
                </span>
                <div class="h-6 w-[1px] bg-gray-800"></div>
                <img src="images/rackstat-logo.png" alt="RACKSTAT" class="h-10 w-auto object-contain">
            </div>

            <div class="w-[65px]"></div>
        </div>
    </header>

    <div class="max-w-md mx-auto px-4 space-y-6 mt-8">
        
        <section>
            <p class="text-[10px] font-black uppercase text-gray-500 mb-3 italic tracking-widest text-center">Your Personal Records</p>
            <div class="grid grid-cols-3 gap-2 mb-2" id="maxes-display">
                </div>
            
            <div class="max-card border-blue-600 w-full flex flex-col justify-center items-center py-4 px-6 relative overflow-hidden group">
                <div class="flex justify-between items-center w-full">
                    <p class="text-[10px] font-black uppercase text-blue-400 tracking-tighter">Board Score</p>
                    <p id="view-total" class="text-3xl font-black text-blue-400">0</p>
                </div>
                
                <div id="formula-detail" class="w-full mt-2 pt-2 border-t border-blue-900/50 text-[9px] font-bold text-gray-500 uppercase tracking-tighter text-center">
                    Calculating Index...
                </div>
            </div>
        </section>

        <section class="bg-[#111827] p-6 rounded-2xl border border-[#1f2937] shadow-2xl">
            <h2 class="text-center font-black uppercase italic text-red-600 mb-6 tracking-tight tracking-widest">Update Performance</h2>
            
            <div class="form-group">
                <label class="text-[9px] uppercase font-bold text-gray-400 ml-1">Current Bodyweight</label>
                <input id="bodyWeight" type="number" placeholder="Enter Weight">
            </div>

            <div id="dynamic-inputs" class="grid grid-cols-2 gap-2">
                </div>

            <button id="save-btn" onclick="saveMaxes()" class="btn-primary mt-4">
                Sync Stats to Profile
            </button>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBOQFeokKaNQKwaUhXMCA0oEm4W9G0qafE", 
            authDomain: "rackstat-production.firebaseapp.com", 
            projectId: "rackstat-production",
            storageBucket: "rackstat-production.firebasestorage.app",
            messagingSenderId: "345003825117",
            appId: "1:345003825117:web:2ad86b1902dfdebe0c8834"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let schoolPrefs = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const profileSnap = await getDoc(doc(db, "recruiting_profiles", user.uid));
                if (profileSnap.exists()) {
                    const pData = profileSnap.data();
                    // SCALABLE: Pull the specific school assigned to the user
                    const schoolId = pData.schoolId || pData.school_id;
                    
                    if (schoolId) {
                        await fetchSchoolData(schoolId);
                        loadCurrentMaxes(user.uid);
                    } else {
                        document.getElementById('school-tag').innerText = "Assign School";
                    }
                }
            } else { location.href = 'index.html'; }
        });

        async function fetchSchoolData(schoolId) {
            const schoolSnap = await getDoc(doc(db, "schools", schoolId));
            if (schoolSnap.exists()) {
                const data = schoolSnap.data();
                schoolPrefs = data.preferences || {};
                
                // Tracked lifts are now specific to the school's configuration
                const lifts = data.trackedLifts || schoolPrefs.tracked_lifts || ['bench', 'squat', 'clean'];
                schoolPrefs.tracked_lifts = lifts;
                schoolPrefs.formula_type = data.formula_type || schoolPrefs.formula_type || "standard";
                
                document.getElementById('school-tag').innerText = data.name.toUpperCase();
                if(data.logo_primary) document.getElementById('school-logo').src = data.logo_primary;

                const container = document.getElementById('dynamic-inputs');
                container.innerHTML = ""; 
                lifts.forEach(lift => {
                    const display = lift.replace('_', ' ').toUpperCase();
                    container.innerHTML += `
                        <div>
                            <label class="text-[9px] uppercase font-bold text-gray-400 ml-1">${display}</label>
                            <input id="input-${lift}" type="number" placeholder="Lbs" class="lift-entry">
                        </div>`;
                });
            }
        }

        async function loadCurrentMaxes(uid) {
            const q = query(collection(db, "recruiting_profiles", uid, "maxes"), orderBy("timestamp", "desc"), limit(1));
            const snap = await getDocs(q);
            const display = document.getElementById('maxes-display');
            const formulaDisplay = document.getElementById('formula-detail');
            display.innerHTML = '';

            if(!snap.empty) {
                const data = snap.docs[0].data();
                let scoringSum = 0;

                // Use school-specific scoring lifts, or default to all tracked if missing
                const scoringList = schoolPrefs.scoring_lifts || schoolPrefs.tracked_lifts || [];

                schoolPrefs.tracked_lifts.forEach(lift => {
                    const val = data[lift] || 0;
                    const displayLabel = lift.replace('_', ' ').toUpperCase();
                    
                    // Add to the sum ONLY if the lift is in the scoring_lifts array
                    if (scoringList.includes(lift)) {
                        scoringSum += val;
                    }

                    // Always display the PR card for all tracked lifts (including Push Press)
                    display.innerHTML += `
                        <div class="max-card">
                            <p class="text-[8px] uppercase text-gray-400">${displayLabel}</p>
                            <p class="text-xl font-black italic text-white">${val}</p>
                        </div>`;
                });

                // Calculate Final Board Score & Formula Breakdown
                let finalScore = scoringSum; 
                let formulaText = "";

                if (schoolPrefs.formula_type === "power_index") {
                    const bw = data.bodyWeight || 0;
                    const bwCap = Math.min(bw, 200);
                    const deduction = bwCap * 4;
                    
                    finalScore = scoringSum - deduction;
                    
                    // Visual breakdown for Fairbanks style
                    formulaText = `Lifts: ${scoringSum} — (BW: ${bwCap} × 4) = ${Math.round(finalScore)}`;
                } else {
                    // Standard total breakdown
                    formulaText = `Total of scoring lifts: ${scoringSum}`;
                }

                // Update UI Elements
                document.getElementById('view-total').innerText = Math.round(finalScore);
                if (formulaDisplay) formulaDisplay.innerText = formulaText;
                document.getElementById('bodyWeight').value = data.bodyWeight || '';
            } else {
                // Fallback if no history exists yet
                if (formulaDisplay) formulaDisplay.innerText = "No data recorded yet";
            }
        }

        async function checkGoalAchievement(newStats) {
            const user = auth.currentUser;
            const profileSnap = await getDoc(doc(db, "recruiting_profiles", user.uid));
            if (!profileSnap.exists()) return;

            const goals = profileSnap.data().goals || [];
            let achieved = [];

            goals.forEach(goal => {
                const currentVal = newStats[goal.type];
                if (currentVal && currentVal >= goal.target) {
                    achieved.push(goal.type.replace('_', ' ').toUpperCase());
                }
            });

            if (achieved.length > 0) {
                alert(`🔥 GOAL CRUSHED: ${achieved.join(', ')}! \n\nCheck your profile to set a new target.`);
            }
        }

        window.saveMaxes = async () => {
            const user = auth.currentUser;
            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.innerText = "UPDATING...";

            try {
                // 1. Fetch current profile to get "Last Known" values
                const profileRef = doc(db, "recruiting_profiles", user.uid);
                const profileSnap = await getDoc(profileRef);
                const currentData = profileSnap.exists() ? profileSnap.data() : {};

                // 2. Handle Body Weight (Use input OR fallback to DB)
                const weightInput = document.getElementById('bodyWeight').value;
                const bodyWeight = weightInput ? Number(weightInput) : (currentData.weight || 0);

                // 3. Prepare the New Max object with merged data
                const newMax = {
                    timestamp: Date.now(),
                    bodyWeight: bodyWeight
                };

                // Loop through school-specific lifts
                schoolPrefs.tracked_lifts.forEach(lift => {
                    const inputField = document.getElementById(`input-${lift}`);
                    const val = inputField ? inputField.value : "";
                    
                    // If input is empty, use database value; otherwise use new input
                    if (val !== "") {
                        newMax[lift] = Number(val);
                    } else {
                        newMax[lift] = currentData[lift] || 0;
                    }
                });

                // 4. RE-CALCULATE SCORE using the merged data
                // This ensures the Board Score doesn't drop to 0 if they skip a lift input
                let totalLifted = 0;
                schoolPrefs.tracked_lifts.forEach(lift => {
                    totalLifted += (newMax[lift] || 0);
                });

                // Your formula: (Total Lifts / Body Weight) * 100
                const calculatedScore = bodyWeight > 0 ? (totalLifted / bodyWeight) * 100 : 0;

                // 5. Save History Entry
                await addDoc(collection(db, "recruiting_profiles", user.uid, "maxes"), newMax);

                // 6. Propagate to Main Profile
                await updateDoc(profileRef, {
                    ...newMax,
                    weight: bodyWeight,
                    boardScore: Math.round(calculatedScore),
                    lastUpdated: Date.now() // Adds the current timestamp
                });

                // 7. Goal check (if exists)
                if (typeof checkGoalAchievement === "function") {
                    await checkGoalAchievement(newMax);
                }

                alert("Stats Synchronized Successfully!");
                location.reload();

            } catch (e) {
                console.error("Save Error:", e);
                alert("Error saving: " + e.message);
                saveBtn.disabled = false;
                saveBtn.innerText = "LOG NEW MAXES";
            }
        };
    </script>
</body>
</html>
