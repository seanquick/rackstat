<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE RACK | RACKSTAT</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --rackstat-black: #020617;
            --rackstat-card: #1e293b;
            --rackstat-red: #b91c1c;
            --rackstat-blue: #3b82f6;
            --rackstat-border: #334155;
            --school-primary: #b91c1c;
        }

        body { background-color: var(--rackstat-black); color: white; }

        .max-card {
            background: var(--rackstat-card);
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            border: 1px solid var(--rackstat-border);
            border-bottom: 4px solid var(--school-primary);
            transition: transform 0.2s;
        }

        .board-score-card {
            border-bottom-color: var(--rackstat-blue);
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
        }

        input {
            background-color: #000 !important;
            color: white !important;
            border: 1px solid var(--rackstat-border) !important;
            padding: 0.75rem !important;
            border-radius: 8px !important;
            width: 100%;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--school-primary) !important;
            outline: none;
        }

        .btn-primary {
            width: 100%;
            background-color: var(--school-primary);
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            padding: 1rem;
            border-radius: 0.75rem;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(185, 28, 28, 0.3);
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        label {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            color: #94a3b8;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="font-sans pb-32">

    <header class="bg-black border-b-2 border-red-700 p-4 sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-5xl mx-auto gap-4">
            <button onclick="location.href='index.html'" class="text-[10px] font-black uppercase bg-gray-800 px-3 py-1.5 rounded text-gray-400 hover:text-white transition-all shrink-0">
                ← Lobby
            </button>

            <div class="flex items-center gap-5 min-w-0">
                <img id="school-logo" src="images/rackstat-logo.png" alt="School" class="h-10 w-auto object-contain" onerror="this.src='images/rackstat-logo.png'">
                <div class="min-w-0 text-center">
                    <span id="school-tag" class="block text-sm font-black italic uppercase tracking-widest text-white">THE RACK</span>
                    <span id="rack-status" class="block text-[8px] font-bold uppercase tracking-widest text-gray-500 mt-1">Loading Weightroom Data...</span>
                </div>
            </div>

            <div class="w-[65px] shrink-0"></div>
        </div>
    </header>

    <div id="page-message" class="hidden max-w-md mx-auto px-4 mt-6">
        <div id="page-message-box" class="rounded-xl border p-4 text-xs font-bold uppercase tracking-wider"></div>
    </div>

    <div class="max-w-md mx-auto px-4 mt-8 space-y-8">

        <section class="animate-fade-in">
            <div class="max-card board-score-card w-full flex flex-col justify-center items-center py-6 px-6 shadow-2xl">
                <p class="text-[10px] font-black uppercase text-blue-400 tracking-[0.2em] mb-1">Official Board Score</p>
                <div id="view-total" class="text-7xl font-black italic tracking-tighter text-white">--</div>
                <div id="formula-detail" class="w-full mt-4 pt-2 border-t border-blue-900/50 text-[9px] font-bold text-gray-500 uppercase tracking-widest text-center">
                    Loading Team Formula...
                </div>
            </div>
        </section>

        <section class="bg-[#0f172a]/50 p-6 rounded-3xl border border-zinc-800 shadow-xl">
            <h2 class="text-center font-black uppercase italic text-gray-400 text-xs mb-6 tracking-widest">Max Tracking</h2>

            <div class="space-y-4">
                <div>
                    <label>Current Bodyweight (LBS)</label>
                    <input id="bodyWeight" type="number" placeholder="Enter Weight">
                </div>

                <div id="dynamic-inputs" class="grid grid-cols-2 gap-4">
                    <p id="dynamic-inputs-placeholder" class="col-span-2 text-center text-[10px] font-black uppercase tracking-widest text-gray-500 py-4">
                        Loading Team Lifts...
                    </p>
                </div>

                <button id="save-btn" class="btn-primary mt-4">Update My Stats</button>
                <p id="sync-timestamp" class="text-[8px] font-bold text-gray-600 uppercase text-center italic mt-2">Last Sync: --</p>
            </div>
        </section>

        <section class="pt-4 border-t border-zinc-900">
            <button onclick="location.href='athlete-workout.html'" class="w-full py-6 bg-white text-black rounded-2xl flex items-center justify-center gap-3 group transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)] active:scale-95">
                <span class="text-2xl font-black italic uppercase">Start Workout</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:translate-x-2 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                </svg>
            </button>
        </section>

    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-md border-t border-red-900/30 px-6 py-4 flex justify-between items-center z-50">
        <button onclick="location.href='board.html'" class="text-gray-500 hover:text-white flex flex-col items-center"><span class="text-[9px] font-black uppercase">Board</span></button>
        <button onclick="location.href='rack.html'" class="text-[var(--school-primary)] flex flex-col items-center"><span class="text-[9px] font-black uppercase">The Rack</span></button>
        <button onclick="location.href='kitchen.html'" class="text-gray-500 hover:text-white flex flex-col items-center"><span class="text-[9px] font-black uppercase">Kitchen</span></button>
        <button onclick="location.href='profile.html'" class="text-gray-500 hover:text-white flex flex-col items-center"><span class="text-[9px] font-black uppercase">Profile</span></button>
    </nav>

    <script type="module">
        import { db, auth } from './js/firebase-config.js';
        import {
            doc,
            setDoc,
            getDoc,
            getDocs,
            addDoc,
            onSnapshot,
            serverTimestamp,
            collection,
            query,
            where
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { applyTheme } from './js/theme.js';
        import {
            buildBoardScoreSettings,
            calculateBoardScore,
            getLiftValue,
            buildLiftWritebacks
        } from './js/board-score.js';

        let teamSettings = null;
        let unsubscribeMaxes = null;
        let unsubscribeProfile = null;
        let unsubscribeUser = null;

        let latestMaxesData = {};
        let latestProfileData = {};
        let latestUserData = {};

        const slugify = (text) => String(text || "").toLowerCase().replace(/\s+/g, '_').replace(/[^\w-]+/g, '');
        const getSchoolIdFromData = (data = {}) => data.schoolId || data.school_id || "";

        const schoolTag = document.getElementById('school-tag');
        const rackStatus = document.getElementById('rack-status');
        const pageMessage = document.getElementById('page-message');
        const pageMessageBox = document.getElementById('page-message-box');
        const saveBtn = document.getElementById('save-btn');
        const dynamicInputs = document.getElementById('dynamic-inputs');

        function setRackStatus(text, tone = 'default') {
            if (!rackStatus) return;
            rackStatus.innerText = text;
            rackStatus.className = 'block text-[8px] font-bold uppercase tracking-widest mt-1';

            if (tone === 'error') rackStatus.classList.add('text-red-400');
            else if (tone === 'success') rackStatus.classList.add('text-green-400');
            else if (tone === 'warn') rackStatus.classList.add('text-yellow-300');
            else rackStatus.classList.add('text-gray-500');
        }

        function showPageMessage(message, tone = 'warn') {
            if (!pageMessage || !pageMessageBox) return;
            pageMessage.classList.remove('hidden');
            pageMessageBox.innerText = message;
            pageMessageBox.className = 'rounded-xl border p-4 text-xs font-bold uppercase tracking-wider';

            if (tone === 'error') {
                pageMessageBox.classList.add('bg-red-500/10', 'border-red-500/20', 'text-red-300');
            } else if (tone === 'success') {
                pageMessageBox.classList.add('bg-green-500/10', 'border-green-500/20', 'text-green-300');
            } else {
                pageMessageBox.classList.add('bg-yellow-500/10', 'border-yellow-500/20', 'text-yellow-300');
            }
        }

        function hidePageMessage() {
            if (!pageMessage || !pageMessageBox) return;
            pageMessage.classList.add('hidden');
            pageMessageBox.innerText = '';
        }

        function resetRackUi() {
            teamSettings = null;
            latestMaxesData = {};
            latestProfileData = {};
            latestUserData = {};

            document.getElementById('view-total').innerText = '--';
            document.getElementById('formula-detail').innerText = 'Loading Team Formula...';
            document.getElementById('sync-timestamp').innerText = 'Last Sync: --';
            document.getElementById('bodyWeight').value = '';

            if (schoolTag) schoolTag.innerText = 'THE RACK';

            if (dynamicInputs) {
                dynamicInputs.innerHTML = `
                    <p id="dynamic-inputs-placeholder" class="col-span-2 text-center text-[10px] font-black uppercase tracking-widest text-gray-500 py-4">
                        Loading Team Lifts...
                    </p>
                `;
            }
        }

        function getMergedRackData() {
            return {
                ...latestUserData,
                ...latestProfileData,
                ...latestMaxesData
            };
        }

        function parsePossibleDate(value) {
            if (!value) return 0;

            try {
                if (typeof value.toDate === 'function') {
                    const ts = value.toDate().getTime();
                    return Number.isFinite(ts) ? ts : 0;
                }

                const parsed = new Date(value).getTime();
                return Number.isFinite(parsed) ? parsed : 0;
            } catch {
                return 0;
            }
        }

        function getResolvedBodyweight() {
            const profileTimestamp = parsePossibleDate(latestProfileData.lastUpdated);
            const userTimestamp = parsePossibleDate(latestUserData.lastSync);
            const maxesTimestamp = parsePossibleDate(
                latestMaxesData.lastUpdated ||
                latestMaxesData.updatedAt ||
                latestMaxesData.createdAt
            );

            const weightCandidates = [
                {
                    weight: Number(latestUserData.weight ?? 0) || 0,
                    ts: userTimestamp
                },
                {
                    weight: Number(latestProfileData.weight ?? latestProfileData.bodyWeight ?? 0) || 0,
                    ts: profileTimestamp
                },
                {
                    weight: Number(latestMaxesData.weight ?? latestMaxesData.bodyWeight ?? latestMaxesData.body_weight ?? 0) || 0,
                    ts: maxesTimestamp
                }
            ].filter(item => item.weight > 0);

            if (!weightCandidates.length) return 0;

            weightCandidates.sort((a, b) => b.ts - a.ts);
            return weightCandidates[0].weight;
        }

        function getDisplayName(data = {}) {
            if (data.fullName && String(data.fullName).trim()) {
                return String(data.fullName).trim();
            }

            const first = String(data.firstName || "").trim();
            const last = String(data.lastName || "").trim();
            const combined = `${first} ${last}`.trim();

            return combined || "Athlete";
        }

        function getWeightClass(bw) {
            const numericBw = Number(bw) || 0;
            if (!numericBw || numericBw > 250) return "UNLIMITED";

            const weightClasses = [125, 135, 145, 155, 165, 175, 185, 195, 210, 225, 250];
            return weightClasses.find(c => numericBw <= c) || "UNLIMITED";
        }

        function prettifyLiftName(liftKey = "") {
            return String(liftKey || "").replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        async function pendingReviewAlreadyExists({ athleteId, exerciseKey, attemptedWeight }) {
            try {
                const q = query(
                    collection(db, "pending_max_reviews"),
                    where("athleteId", "==", athleteId),
                    where("exerciseKey", "==", exerciseKey),
                    where("attemptedWeight", "==", Number(attemptedWeight) || 0),
                    where("status", "==", "pending")
                );

                const snap = await getDocs(q);
                return !snap.empty;
            } catch (err) {
                console.warn("Pending review lookup failed; continuing without dedupe.", err);
                return false;
            }
        }

        function setupDynamicRack(settings) {
            teamSettings = buildBoardScoreSettings(settings || {});
            const lifts = Array.isArray(teamSettings.tracked_lifts) ? teamSettings.tracked_lifts : [];

            if (!lifts.length) {
                dynamicInputs.innerHTML = `
                    <p class="col-span-2 text-center text-[10px] font-black uppercase tracking-widest text-yellow-300 py-4">
                        No Team Lifts Configured Yet
                    </p>
                `;
                document.getElementById('formula-detail').innerText = 'Team Settings Need Tracked Lifts';
                setRackStatus('No Team Lifts Configured', 'warn');
                return;
            }

            dynamicInputs.innerHTML = lifts.map((liftKey, index) => {
                const normalizedLiftKey = slugify(liftKey);
                const labelName = teamSettings.display_names[index] || normalizedLiftKey.replace(/_/g, ' ');
                return `
                    <div class="animate-fade-in">
                        <label>${labelName}</label>
                        <input id="input-${normalizedLiftKey}" type="number" placeholder="Lbs" data-lift-key="${normalizedLiftKey}">
                    </div>`;
            }).join('');
        }

        function startRealtimeSync(uid) {
            if (unsubscribeMaxes) unsubscribeMaxes();
            if (unsubscribeProfile) unsubscribeProfile();
            if (unsubscribeUser) unsubscribeUser();

            const latestDocRef = doc(db, "recruiting_profiles", uid, "maxes", "latest");
            const profileRef = doc(db, "recruiting_profiles", uid);
            const userRef = doc(db, "users", uid);

            unsubscribeMaxes = onSnapshot(latestDocRef, (snap) => {
                latestMaxesData = snap.exists() ? snap.data() : {};
                renderValues();
            }, (err) => {
                console.error("Maxes sync error:", err);
            });

            unsubscribeProfile = onSnapshot(profileRef, (snap) => {
                latestProfileData = snap.exists() ? snap.data() : {};
                renderValues();
            }, (err) => {
                console.error("Profile sync error:", err);
            });

            unsubscribeUser = onSnapshot(userRef, (snap) => {
                latestUserData = snap.exists() ? snap.data() : {};
                renderValues();
            }, (err) => {
                console.error("User sync error:", err);
            });
        }

        function renderValues() {
            if (!teamSettings) return;

            const data = getMergedRackData();
            const lifts = Array.isArray(teamSettings.tracked_lifts) ? teamSettings.tracked_lifts : [];

            lifts.forEach(liftKey => {
                const normalizedLiftKey = slugify(liftKey);
                const val = getLiftValue(data, normalizedLiftKey);

                const inputField = document.querySelector(`[data-lift-key="${normalizedLiftKey}"]`);
                if (inputField && !inputField.matches(':focus')) {
                    inputField.value = val === 0 ? "" : val;
                }
            });

            const bw = getResolvedBodyweight();
            const bwInput = document.getElementById('bodyWeight');
            if (bwInput && !bwInput.matches(':focus')) {
                bwInput.value = bw === 0 ? "" : bw;
            }

            const result = calculateBoardScore({
                data: {
                    ...data,
                    bodyWeight: bw,
                    body_weight: bw,
                    weight: bw
                },
                formulaType: teamSettings.formula_type,
                scoringLifts: teamSettings.scoring_lifts
            });

            document.getElementById('view-total').innerText = Number.isFinite(Number(result.score)) ? result.score : '--';

            if (teamSettings.formula_type === "power_index") {
                document.getElementById('formula-detail').innerText =
                    `TOTAL: ${result.total} — (${result.bwAdj} × ${result.liftCount}) = ${result.score}`;
            } else {
                document.getElementById('formula-detail').innerText =
                    `TOTAL STRENGTH: ${result.total}`;
            }

            const lastSyncSource =
                latestMaxesData.lastUpdated ||
                latestMaxesData.updatedAt ||
                latestMaxesData.createdAt ||
                latestProfileData.lastUpdated ||
                latestUserData.lastSync ||
                null;

            if (lastSyncSource) {
                const d = lastSyncSource.toDate ? lastSyncSource.toDate() : new Date(lastSyncSource);
                if (!Number.isNaN(d.getTime())) {
                    document.getElementById('sync-timestamp').innerText =
                        `Last Sync: ${d.toLocaleDateString()} @ ${d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
                } else {
                    document.getElementById('sync-timestamp').innerText = 'Last Sync: --';
                }
            } else {
                document.getElementById('sync-timestamp').innerText = 'Last Sync: --';
            }
        }

        document.getElementById('save-btn').onclick = async () => {
            const user = auth.currentUser;

            if (!user || !teamSettings) {
                showPageMessage("The Rack is not ready yet. Please wait a moment and try again.", "warn");
                return;
            }

            saveBtn.disabled = true;
            saveBtn.innerText = "SAVING...";
            hidePageMessage();
            setRackStatus("Saving Stats...");

            try {
                const bw = Number(document.getElementById('bodyWeight').value) || 0;
                const athleteName = getDisplayName({ ...latestUserData, ...latestProfileData });
                const schoolId = getSchoolIdFromData({ ...latestUserData, ...latestProfileData });

                const updateObj = {
                    lastUpdated: serverTimestamp(),
                    bodyWeight: bw,
                    body_weight: bw,
                    weight: bw
                };

                const lifts = Array.isArray(teamSettings.tracked_lifts) ? teamSettings.tracked_lifts : [];
                const higherLiftSubmissions = [];

                for (const liftKey of lifts) {
                    const normalizedLiftKey = slugify(liftKey);
                    const input = document.querySelector(`[data-lift-key="${normalizedLiftKey}"]`);
                    const enteredVal = Number(input?.value) || 0;
                    const previousVal = Number(getLiftValue(latestMaxesData, normalizedLiftKey)) || 0;

                    Object.assign(updateObj, buildLiftWritebacks(normalizedLiftKey, enteredVal));

                    if (enteredVal > previousVal) {
                        higherLiftSubmissions.push({
                            exerciseKey: normalizedLiftKey,
                            exerciseName: prettifyLiftName(normalizedLiftKey),
                            attemptedWeight: enteredVal,
                            previousWeight: previousVal
                        });
                    }
                }

                const previewResult = calculateBoardScore({
                    data: updateObj,
                    formulaType: teamSettings.formula_type,
                    scoringLifts: teamSettings.scoring_lifts
                });

                await Promise.all([
                    setDoc(doc(db, "recruiting_profiles", user.uid, "maxes", "latest"), updateObj, { merge: true }),
                    setDoc(doc(db, "recruiting_profiles", user.uid), {
                        boardScore: previewResult.score,
                        bodyWeight: bw,
                        weight: bw,
                        lastUpdated: serverTimestamp()
                    }, { merge: true }),
                    setDoc(doc(db, "users", user.uid), {
                        weight: bw,
                        lastSync: serverTimestamp()
                    }, { merge: true })
                ]);

                let createdPendingCount = 0;
                let skippedPendingCount = 0;

                if (schoolId && higherLiftSubmissions.length) {
                    for (const submission of higherLiftSubmissions) {
                        if (bw <= 0) {
                            skippedPendingCount += 1;
                            continue;
                        }

                        const alreadyExists = await pendingReviewAlreadyExists({
                            athleteId: user.uid,
                            exerciseKey: submission.exerciseKey,
                            attemptedWeight: submission.attemptedWeight
                        });

                        if (alreadyExists) {
                            continue;
                        }

                        await addDoc(collection(db, "pending_max_reviews"), {
                            athleteId: user.uid,
                            athleteName,
                            schoolId,
                            source: "rack",
                            exerciseKey: submission.exerciseKey,
                            exerciseName: submission.exerciseName,
                            attemptedWeight: Number(submission.attemptedWeight) || 0,
                            previousWeight: Number(submission.previousWeight) || 0,
                            weighInWeight: bw,
                            weightClass: getWeightClass(bw),
                            status: "pending",
                            createdAt: serverTimestamp(),
                            submittedAt: serverTimestamp(),
                            reviewedAt: null,
                            reviewedBy: null
                        });

                        createdPendingCount += 1;
                    }
                }

                saveBtn.innerText = "SUCCESS ✓";
                setRackStatus("Stats Updated", "success");

                if (createdPendingCount > 0 && skippedPendingCount > 0) {
                    showPageMessage(
                        `Stats saved. ${createdPendingCount} new lift review request(s) sent to your coach. Some higher lifts were not submitted because bodyweight is required.`,
                        "warn"
                    );
                } else if (createdPendingCount > 0) {
                    showPageMessage(
                        `Stats saved. ${createdPendingCount} new lift review request(s) sent to your coach.`,
                        "success"
                    );
                } else if (skippedPendingCount > 0) {
                    showPageMessage(
                        "Stats saved, but new board-review submissions were skipped because bodyweight is required.",
                        "warn"
                    );
                } else {
                    showPageMessage("Your lifts and bodyweight were synced successfully.", "success");
                }

                setTimeout(() => {
                    saveBtn.innerText = "Update My Stats";
                    saveBtn.disabled = false;
                }, 2000);

            } catch (e) {
                console.error("Save Error:", e);
                showPageMessage("Your stats could not be saved right now. Please try again.", "error");
                setRackStatus("Save Failed", "error");
                saveBtn.disabled = false;
                saveBtn.innerText = "Update My Stats";
            }
        };

        onAuthStateChanged(auth, async (user) => {
            resetRackUi();
            setRackStatus("Checking Athlete Access...");
            hidePageMessage();

            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if (!userSnap.exists()) {
                    showPageMessage("Your athlete profile could not be found. Please contact support.", "error");
                    setRackStatus("Profile Missing", "error");
                    return;
                }

                const userData = userSnap.data();
                const role = (userData.role || '').toLowerCase();

                if (role !== 'player' && role !== 'athlete') {
                    window.location.href = 'index.html';
                    return;
                }

                const schoolId = getSchoolIdFromData(userData);

                if (!schoolId) {
                    showPageMessage("Your athlete profile is missing a school link. Please contact your coach.", "error");
                    setRackStatus("Missing School", "error");
                    return;
                }

                try {
                    const schoolData = await applyTheme(db, schoolId);
                    if (schoolTag) {
                        schoolTag.innerText = (schoolData?.name || 'THE RACK').toUpperCase();
                    }
                    setupDynamicRack(schoolData || {});
                } catch (themeErr) {
                    console.error("Theme load error:", themeErr);
                    setupDynamicRack({});
                    showPageMessage("School branding could not be fully loaded, but your Rack is still available.", "warn");
                    setRackStatus("Theme Limited", "warn");
                }

                startRealtimeSync(user.uid);

                if (teamSettings && Array.isArray(teamSettings.tracked_lifts) && teamSettings.tracked_lifts.length) {
                    setRackStatus("Rack Ready", "success");
                }
            } catch (err) {
                console.error("Initialization error:", err);
                showPageMessage("The Rack could not be loaded right now. Please refresh and try again.", "error");
                setRackStatus("Load Failed", "error");
            }
        });
    </script>
</body>
</html>
