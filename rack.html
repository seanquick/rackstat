<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE RACK | RACKSTAT</title>
    
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --rackstat-black: #020617;
            --rackstat-card: #1e293b;
            --rackstat-red: #b91c1c;
            --rackstat-blue: #3b82f6;
            --rackstat-border: #334155;
            --school-primary: #b91c1c;
        }

        body { background-color: var(--rackstat-black); color: white; }
        
        .max-card { 
            background: var(--rackstat-card); 
            border-radius: 1rem; 
            padding: 1rem; 
            text-align: center; 
            border: 1px solid var(--rackstat-border);
            border-bottom: 4px solid var(--school-primary); 
            transition: transform 0.2s;
        }

        .board-score-card {
            border-bottom-color: var(--rackstat-blue);
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
        }

        input { 
            background-color: #000 !important; 
            color: white !important; 
            border: 1px solid var(--rackstat-border) !important; 
            padding: 0.75rem !important; 
            border-radius: 8px !important; 
            width: 100%; 
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--school-primary) !important; outline: none; }

        .btn-primary {
            width: 100%;
            background-color: var(--school-primary);
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            padding: 1rem;
            border-radius: 0.75rem;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(185, 28, 28, 0.3);
        }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }

        label { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.05em; margin-bottom: 4px; display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="font-sans pb-32">

    <header class="bg-black border-b-2 border-red-700 p-4 sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-5xl mx-auto">
            <button onclick="location.href='index.html'" class="text-[10px] font-black uppercase bg-gray-800 px-3 py-1.5 rounded text-gray-400 hover:text-white transition-all">
                ← Lobby
            </button>
            <div class="flex items-center gap-5">
                <img id="school-logo" src="images/rackstat-logo.png" alt="School" class="h-10 w-auto object-contain">
                <span id="school-tag" class="text-sm font-black italic uppercase tracking-widest text-white">RACKSTAT</span>
            </div>
            <div class="w-[65px]"></div>
        </div>
    </header>

    <div class="max-w-md mx-auto px-4 mt-8 space-y-8">
        
        <section class="animate-fade-in">
            <div class="max-card board-score-card w-full flex flex-col justify-center items-center py-6 px-6 shadow-2xl">
                <p class="text-[10px] font-black uppercase text-blue-400 tracking-[0.2em] mb-1">Official Board Score</p>
                <div id="view-total" class="text-7xl font-black italic tracking-tighter text-white">0</div>
                <div id="formula-detail" class="w-full mt-4 pt-2 border-t border-blue-900/50 text-[9px] font-bold text-gray-500 uppercase tracking-widest text-center">
                    Aligning with Team Settings...
                </div>
            </div>
        </section>

        <section class="bg-[#0f172a]/50 p-6 rounded-3xl border border-zinc-800 shadow-xl">
            <h2 class="text-center font-black uppercase italic text-gray-400 text-xs mb-6 tracking-widest">Max Tracking</h2>
            
            <div class="space-y-4">
                <div>
                    <label>Current Bodyweight (LBS)</label>
                    <input id="bodyWeight" type="number" placeholder="Enter Weight">
                </div>

                <div id="dynamic-inputs" class="grid grid-cols-2 gap-4"></div>

                <button id="save-btn" class="btn-primary mt-4">Update My Stats</button>
                <p id="sync-timestamp" class="text-[8px] font-bold text-gray-600 uppercase text-center italic mt-2">Last Sync: --</p>
            </div>
        </section>

        <section class="pt-4 border-t border-zinc-900">
            <button onclick="location.href='athlete-workout.html'" class="w-full py-6 bg-white text-black rounded-2xl flex items-center justify-center gap-3 group transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)] active:scale-95">
                <span class="text-2xl font-black italic uppercase">Start Workout</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:translate-x-2 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                </svg>
            </button>
        </section>

    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-md border-t border-red-900/30 px-6 py-4 flex justify-between items-center z-50">
        <button onclick="location.href='board.html'" class="text-gray-500 hover:text-white flex flex-col items-center"><span class="text-[9px] font-black uppercase">Board</span></button>
        <button onclick="location.href='rack.html'" class="text-[var(--school-primary)] flex flex-col items-center"><span class="text-[9px] font-black uppercase">The Rack</span></button>
        <button onclick="location.href='kitchen.html'" class="text-gray-500 hover:text-white flex flex-col items-center"><span class="text-[9px] font-black uppercase">Kitchen</span></button>
        <button onclick="location.href='profile.html'" class="text-gray-500 hover:text-white flex flex-col items-center"><span class="text-[9px] font-black uppercase">Profile</span></button>
    </nav>

    <script type="module">
        import { db, auth } from './js/firebase-config.js';
        import { doc, setDoc, getDoc, onSnapshot, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { applyTheme } from './js/theme.js';

        let teamSettings = null;
        let unsubscribe = null;

        const slugify = (text) => String(text || "").toLowerCase().replace(/\s+/g, '_').replace(/[^\w-]+/g, '');
        const getSchoolIdFromData = (data = {}) => data.schoolId || data.school_id || "";

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if (!userSnap.exists()) {
                    window.location.href = 'index.html';
                    return;
                }

                const userData = userSnap.data();
                const schoolId = getSchoolIdFromData(userData);

                if (!schoolId) {
                    throw new Error("User school ID not found.");
                }

                // Apply theme and get school-level settings from the shared schools document
                const schoolData = await applyTheme(db, schoolId);
                setupDynamicRack(schoolData || {});
                startRealtimeSync(user.uid);

            } catch (err) {
                console.error("Initialization error:", err);
            }
        });

        function setupDynamicRack(settings) {
            const liftsFromSettings = settings.trackedLifts || settings.activeLifts || ["bench", "squat", "clean"];

            teamSettings = {
                tracked_lifts: liftsFromSettings,
                display_names: liftsFromSettings.map(l => String(l).replace(/_/g, ' ').toUpperCase()),
                formula_type: settings.formula_type || "power_index",
                scoring_lifts: settings.scoring_lifts || liftsFromSettings
            };

            const container = document.getElementById('dynamic-inputs');
            container.innerHTML = teamSettings.tracked_lifts.map((liftKey, index) => {
                const labelName = teamSettings.display_names[index];
                return `
                    <div class="animate-fade-in">
                        <label>${labelName}</label>
                        <input id="input-${slugify(liftKey)}" type="number" placeholder="Lbs" data-lift-key="${liftKey}">
                    </div>`;
            }).join('');
        }

        function startRealtimeSync(uid) {
            if (unsubscribe) unsubscribe();

            const latestDocRef = doc(db, "recruiting_profiles", uid, "maxes", "latest");
            unsubscribe = onSnapshot(latestDocRef, (snap) => {
                if (snap.exists()) {
                    renderValues(snap.data());
                } else {
                    renderValues({});
                }
            });
        }

        function renderValues(data) {
            if (!teamSettings) return;

            let totalForBoard = 0;

            teamSettings.tracked_lifts.forEach(liftKey => {
                const slugKey = slugify(liftKey);
                const shortKey = String(liftKey).split('_')[0];
                const val = Number(data[liftKey] || data[slugKey] || data[shortKey] || 0);

                if (teamSettings.scoring_lifts.includes(liftKey)) {
                    totalForBoard += val;
                }

                const inputField = document.querySelector(`[data-lift-key="${liftKey}"]`);
                if (inputField && !inputField.matches(':focus')) {
                    inputField.value = val === 0 ? "" : val;
                }
            });

            const bw = Number(data.bodyWeight || data.weight || 0);
            const bwInput = document.getElementById('bodyWeight');
            if (bwInput && !bwInput.matches(':focus')) {
                bwInput.value = bw === 0 ? "" : bw;
            }

            let finalScore = totalForBoard;
            if (teamSettings.formula_type === "power_index") {
                finalScore = totalForBoard - (Math.min(bw, 200) * 4);
            }

            document.getElementById('view-total').innerText = Math.round(finalScore);
            document.getElementById('formula-detail').innerText =
                teamSettings.formula_type === "power_index"
                    ? `Total: ${totalForBoard} — (BW Adj) = ${Math.round(finalScore)}`
                    : `Total Strength: ${totalForBoard}`;

            if (data.lastUpdated) {
                const d = data.lastUpdated.toDate ? data.lastUpdated.toDate() : new Date(data.lastUpdated);
                document.getElementById('sync-timestamp').innerText =
                    `Last Sync: ${d.toLocaleDateString()} @ ${d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
            } else {
                document.getElementById('sync-timestamp').innerText = 'Last Sync: --';
            }
        }

        document.getElementById('save-btn').onclick = async () => {
            const user = auth.currentUser;
            const saveBtn = document.getElementById('save-btn');

            if (!user || !teamSettings) return;

            saveBtn.disabled = true;
            saveBtn.innerText = "SAVING...";

            try {
                const bw = Number(document.getElementById('bodyWeight').value) || 0;
                const updateObj = {
                    lastUpdated: serverTimestamp(),
                    bodyWeight: bw,
                    weight: bw
                };

                let scoringSum = 0;

                teamSettings.tracked_lifts.forEach(liftKey => {
                    const input = document.querySelector(`[data-lift-key="${liftKey}"]`);
                    const val = Number(input?.value) || 0;

                    // Dual-key syncing for compatibility across older/newer pages
                    updateObj[liftKey] = val;
                    updateObj[slugify(liftKey)] = val;

                    if (liftKey === "bench") updateObj.bench_press = val;
                    if (liftKey === "clean") updateObj.power_clean = val;
                    if (liftKey === "push_press") updateObj.pushPress = val;

                    if (teamSettings.scoring_lifts.includes(liftKey)) {
                        scoringSum += val;
                    }
                });

                let boardScore = scoringSum;
                if (teamSettings.formula_type === "power_index") {
                    boardScore = scoringSum - (Math.min(bw, 200) * 4);
                }

                const roundedScore = Math.round(boardScore);

                await Promise.all([
                    // Source of truth for max values used by workout/review pages
                    setDoc(doc(db, "recruiting_profiles", user.uid, "maxes", "latest"), updateObj, { merge: true }),

                    // Flat profile used by board/recruiting pages
                    setDoc(doc(db, "recruiting_profiles", user.uid), {
                        ...updateObj,
                        boardScore: roundedScore
                    }, { merge: true }),

                    // General user metadata sync
                    setDoc(doc(db, "users", user.uid), {
                        weight: bw
                    }, { merge: true })
                ]);

                saveBtn.innerText = "SUCCESS ✓";
                setTimeout(() => {
                    saveBtn.innerText = "Update My Stats";
                    saveBtn.disabled = false;
                }, 2000);

            } catch (e) {
                console.error("Save Error:", e);
                saveBtn.disabled = false;
                saveBtn.innerText = "Update My Stats";
            }
        };
    </script>
</body>
</html>
