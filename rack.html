<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE RACK | RACKSTAT</title>
    
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="theme.js" defer></script>

    <style>
        :root {
            --rackstat-black: #020617;
            --rackstat-card: #1e293b;
            --rackstat-red: #b91c1c;
            --rackstat-blue: #3b82f6;
            --rackstat-border: #334155;
        }

        body { background-color: var(--rackstat-black); color: white; }
        
        .max-card { 
            background: var(--rackstat-card); 
            border-radius: 1rem; 
            padding: 1rem; 
            text-align: center; 
            border: 1px solid var(--rackstat-border);
            border-bottom: 4px solid var(--rackstat-red); 
            transition: transform 0.2s;
        }

        .board-score-card {
            border-bottom-color: var(--rackstat-blue);
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
        }

        input { 
            background-color: #000 !important; 
            color: white !important; 
            border: 1px solid var(--rackstat-border) !important; 
            padding: 0.75rem !important; 
            border-radius: 8px !important; 
            width: 100%; 
            margin-bottom: 0.75rem;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--rackstat-red) !important; outline: none; }

        .btn-primary {
            width: 100%;
            background-color: var(--rackstat-red);
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            padding: 1rem;
            border-radius: 0.75rem;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(185, 28, 28, 0.3);
        }
        .btn-primary:hover { background-color: #dc2626; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        label { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.05em; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="font-sans pb-24">

    <header class="bg-black border-b-2 border-red-700 p-4 sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-5xl mx-auto">
            <button onclick="location.href='index.html'" class="text-[10px] font-black uppercase bg-gray-800 px-3 py-1.5 rounded text-gray-400 hover:text-white transition-all">
                ← Lobby
            </button>
            
            <div class="flex items-center gap-5">
                <img id="school-logo" src="images/rackstat-logo-placeholder.png" alt="School" class="h-10 w-auto object-contain">
                <div class="h-6 w-[1px] bg-gray-800"></div>
                <span id="school-tag" class="text-sm font-black italic uppercase tracking-[0.15em] text-white">RACKSTAT</span>
                <div class="h-6 w-[1px] bg-gray-800"></div>
                <img src="images/rackstat-logo.png" alt="RACKSTAT" class="h-10 w-auto object-contain">
            </div>
            <div class="w-[65px]"></div>
        </div>
    </header>

    <div class="max-w-md mx-auto px-4 space-y-6 mt-8">
        
        <section>
            <p class="text-[10px] font-black uppercase text-gray-500 mb-3 italic tracking-widest text-center">Your Personal Records</p>
            
            <div class="grid grid-cols-3 gap-2 mb-2" id="maxes-display">
                </div>
            
            <div class="max-card board-score-card w-full flex flex-col justify-center items-center py-4 px-6">
                <div class="flex justify-between items-center w-full">
                    <p class="text-[10px] font-black uppercase text-blue-400 tracking-tighter">Board Score (Power Index)</p>
                    <p id="view-total" class="text-3xl font-black text-blue-400">0</p>
                </div>
                
                <div id="formula-detail" class="w-full mt-2 pt-2 border-t border-blue-900/50 text-[9px] font-bold text-gray-500 uppercase tracking-tighter text-center">
                    Calculating Index...
                </div>
            </div>

            <div id="sync-timestamp" class="text-[8px] font-bold text-gray-500 uppercase mt-2 text-center italic">
                Last Sync: --
            </div>
        </section>

        <section class="bg-[#111827] p-6 rounded-2xl border border-[#1f2937] shadow-2xl">
            <h2 class="text-center font-black uppercase italic text-red-600 mb-6 tracking-widest">Update Performance</h2>
            
            <div class="mb-4">
                <label>Current Bodyweight (LBS)</label>
                <input id="bodyWeight" type="number" placeholder="Enter Weight">
                <p id="rack-body-weight-display" class="text-[8px] text-gray-600 uppercase font-bold mt-[-8px] ml-1">Currently: -- lbs</p>
            </div>

            <div id="dynamic-inputs" class="grid grid-cols-2 gap-3">
                </div>

            <button id="save-btn" class="btn-primary mt-6">
                Sync Stats to Profile
            </button>
        </section>
    </div>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let schoolPrefs = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Real-time bodyweight sync across master record
                onSnapshot(doc(db, "users", user.uid), (userDoc) => {
                    if (userDoc.exists() && userDoc.data().weight) {
                        const weight = userDoc.data().weight;
                        if (document.getElementById('bodyWeight')) document.getElementById('bodyWeight').value = weight;
                        if (document.getElementById('rack-body-weight-display')) {
                            document.getElementById('rack-body-weight-display').innerText = `Currently: ${weight} lbs`;
                        }
                    }
                });

                const profileSnap = await getDoc(doc(db, "recruiting_profiles", user.uid));
                if (profileSnap.exists()) {
                    const schoolId = profileSnap.data().schoolId || profileSnap.data().school_id;
                    if (schoolId) {
                        await fetchSchoolData(schoolId);
                        loadCurrentMaxes(user.uid);
                    }
                }
            } else { 
                window.location.href = 'index.html'; 
            }
        });

        async function fetchSchoolData(schoolId) {
            const schoolSnap = await getDoc(doc(db, "schools", schoolId));
            if (schoolSnap.exists()) {
                const data = schoolSnap.data();
                schoolPrefs = {
                    tracked_lifts: data.trackedLifts || ['bench', 'squat', 'clean'],
                    formula_type: data.formula_type || "standard",
                    scoring_lifts: data.scoring_lifts || (data.trackedLifts || ['bench', 'squat', 'clean'])
                };
                
                document.getElementById('school-tag').innerText = data.name.toUpperCase();
                if(data.logo_primary) document.getElementById('school-logo').src = data.logo_primary;

                const container = document.getElementById('dynamic-inputs');
                container.innerHTML = schoolPrefs.tracked_lifts.map(lift => `
                    <div class="animate-fade-in">
                        <label>${lift.replace('_', ' ')}</label>
                        <input id="input-${lift}" type="number" placeholder="Lbs">
                    </div>`).join('');
            }
        }

        async function loadCurrentMaxes(uid) {
            const latestDocRef = doc(db, "recruiting_profiles", uid, "maxes", "latest");
            const snap = await getDoc(latestDocRef);
            if(snap.exists() && schoolPrefs) {
                const data = snap.data();
                const display = document.getElementById('maxes-display');
                let scoringSum = 0;

                display.innerHTML = schoolPrefs.tracked_lifts.map(lift => {
                    const val = data[lift] || 0;
                    if (schoolPrefs.scoring_lifts.includes(lift)) scoringSum += val;
                    return `
                        <div class="max-card">
                            <p class="text-[8px] uppercase text-gray-500 font-bold">${lift.replace('_', ' ')}</p>
                            <p class="text-xl font-black italic">${val}</p>
                        </div>`;
                }).join('');

                // Power Index Formula: Sum - (BW capped at 200 * 4)
                let finalScore = scoringSum;
                if (schoolPrefs.formula_type === "power_index") {
                    const bw = data.bodyWeight || 0;
                    finalScore = scoringSum - (Math.min(bw, 200) * 4);
                }

                document.getElementById('view-total').innerText = Math.round(finalScore);
                document.getElementById('formula-detail').innerText = schoolPrefs.formula_type === "power_index" 
                    ? `Lifts: ${scoringSum} — (BW Cap Deduction) = ${Math.round(finalScore)}`
                    : `Total Score: ${scoringSum}`;
                
                if (data.timestamp) {
                    const d = new Date(data.timestamp);
                    document.getElementById('sync-timestamp').innerText = `Last Sync: ${d.toLocaleString()}`;
                }
            }
        }

        window.saveMaxes = async () => {
            const user = auth.currentUser;
            const saveBtn = document.getElementById('save-btn');
            if (!user || !schoolPrefs) return;

            saveBtn.disabled = true;
            saveBtn.innerText = "UPDATING...";

            try {
                const bodyWeight = Number(document.getElementById('bodyWeight').value);
                if (!bodyWeight || bodyWeight <= 0) throw new Error("Enter valid body weight");

                const newMax = { timestamp: Date.now(), bodyWeight };
                let scoringSum = 0;

                schoolPrefs.tracked_lifts.forEach(lift => {
                    const val = Number(document.getElementById(`input-${lift}`).value) || 0;
                    newMax[lift] = val;
                    if (schoolPrefs.scoring_lifts.includes(lift)) scoringSum += val;
                });

                let finalBoardScore = scoringSum;
                if (schoolPrefs.formula_type === "power_index") {
                    finalBoardScore = scoringSum - (Math.min(bodyWeight, 200) * 4);
                }

                const profileRef = doc(db, "recruiting_profiles", user.uid);
                await Promise.all([
                    setDoc(doc(db, "recruiting_profiles", user.uid, "maxes", "latest"), newMax, { merge: true }),
                    setDoc(profileRef, { 
                        ...newMax, 
                        boardScore: Math.round(finalBoardScore),
                        weight: bodyWeight 
                    }, { merge: true }),
                    setDoc(doc(db, "users", user.uid), { weight: bodyWeight }, { merge: true })
                ]);

                alert("Stats Synchronized!");
                location.reload();
            } catch (e) {
                alert(e.message);
                saveBtn.disabled = false;
                saveBtn.innerText = "Sync Stats to Profile";
            }
        };

        document.getElementById('save-btn').onclick = window.saveMaxes;
    </script>
</body>
</html>
