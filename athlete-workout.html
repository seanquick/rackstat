<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RackStat | Athlete Workout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
        body { background-color: #0a0a0b; color: white; }
    </style>
</head>
<body class="bg-[#0a0a0b] text-white antialiased min-h-screen">

    <div id="athlete-dashboard" class="max-w-md mx-auto p-4">
        <div class="mb-8 border-b border-[#2a2a2c] pb-4 mt-4">
            <h2 class="text-[10px] font-black text-[#b91c1c] uppercase tracking-widest mb-1">Athlete Portal</h2>
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter italic">Current Workouts</h1>
        </div>
        <div id="available-workouts" class="space-y-3">
            <div class="animate-pulse text-gray-500 text-xs uppercase font-bold text-center py-10 tracking-widest">
                Loading training session...
            </div>
        </div>
    </div>

    <div id="athlete-workout-container" class="max-w-md mx-auto p-4" style="display: none;">
        <button onclick="location.reload()" class="text-gray-500 text-[10px] uppercase font-bold mb-4 flex items-center gap-1 hover:text-white transition-colors">
            ← Back to Workouts
        </button>
        <div class="mb-6">
            <h1 id="display-title" class="text-3xl font-black text-white uppercase tracking-tighter italic">--</h1>
            <p id="display-week" class="text-[#b91c1c] font-black text-sm uppercase tracking-widest">WEEK --</p>
        </div>
        <div id="athlete-exercise-list" class="space-y-4"></div>
    </div>

    <div class="flex items-center mb-6">
        <button onclick="location.href='index.html'" class="flex items-center text-gray-500 hover:text-white transition-colors group">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
            </svg>
            <span class="text-xs font-black uppercase tracking-widest italic">Lobby</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { firebaseConfig } from "./firebase-config.js"; 
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 1. URL & Auth Setup ---
        const urlParams = new URLSearchParams(window.location.search);
        const directWorkoutId = urlParams.get('id'); // Looks for ?id=... in the URL

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentAthleteId = user.uid;
                const docSnap = await getDoc(doc(db, "recruiting_profiles", user.uid));
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    window.currentSchoolId = data.school_id || data.schoolId;
                    
                    if (window.currentSchoolId) {
                        // UPDATE: Check if we are coming from a direct link
                        if (directWorkoutId) {
                            // Load the specific workout from the link
                            window.loadAthleteWorkout(directWorkoutId, user.uid);
                        } else {
                            // Otherwise, just show the full list as usual
                            window.loadAvailableWorkouts(); 
                        }
                    }
                }
            } else {
                window.location.href = "index.html";
            }
        });

        // --- 2. Advanced Lift Mapping ---
        // This helps the code find the right data even if naming varies (e.g. "bench" vs "benchMax")
        const liftMap = {
            "clean": ["cleanMax", "clean", "clean_max"],
            "power clean": ["cleanMax", "power_clean", "clean"],
            "bench press": ["benchMax", "bench", "bench_press"],
            "bench": ["benchMax", "bench", "bench_press"],
            "back squat": ["squatMax", "squat", "back_squat"],
            "squat": ["squatMax", "squat", "back_squat"],
            "deadlift": ["deadliftMax", "deadlift", "dead_lift"],
            "push press": ["pushpressMax", "push_press"]
        };

        const calculateWeight = (max, percentage) => {
            const m = parseFloat(max);
            const p = parseFloat(percentage);
            if (!m || m === 0 || !p || p === 0) return "BW";
            return Math.round((m * (p / 100)) / 5) * 5; 
        };

        // --- 3. UI Functions ---
        window.toggleSetComplete = (setId) => {
            const container = document.getElementById(`container-${setId}`);
            const btn = document.getElementById(`btn-${setId}`);
            container.classList.toggle('border-[#b91c1c]');
            container.classList.toggle('bg-[#b91c1c]/10');
            btn.classList.toggle('text-green-500');
            btn.classList.toggle('text-gray-600');
            const isDone = container.getAttribute('data-completed') === 'true';
            container.setAttribute('data-completed', !isDone);
        };

        window.loadAvailableWorkouts = async () => {
            const workoutContainer = document.getElementById('available-workouts');
            const workoutRef = collection(db, "schools", window.currentSchoolId, "workouts");
            const q = query(workoutRef, orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            
            workoutContainer.innerHTML = ''; 
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const btn = document.createElement('button');
                btn.className = "w-full bg-[#1a1a1c] border border-[#2a2a2c] p-5 rounded-xl flex justify-between items-center group text-left mb-3";
                btn.onclick = () => window.loadAthleteWorkout(doc.id, window.currentAthleteId);
                btn.innerHTML = `<div><h3 class="text-white font-black uppercase text-lg mb-1 italic">${data.title}</h3><span class="text-[#b91c1c] font-bold text-[10px] uppercase">Week ${data.week}</span></div><span class="text-gray-600 group-hover:text-[#b91c1c]">→</span>`;
                workoutContainer.appendChild(btn);
            });
        };

        // --- 4. Main Workout Renderer ---
        window.loadAthleteWorkout = async (workoutId, athleteId) => {
            try {
                const workoutDocRef = doc(db, "schools", window.currentSchoolId, "workouts", workoutId);
                const athleteDocRef = doc(db, "recruiting_profiles", athleteId);
                const [workoutSnap, athleteSnap] = await Promise.all([getDoc(workoutDocRef), getDoc(athleteDocRef)]);

                if (!workoutSnap.exists()) return;
                const workout = workoutSnap.data();
                const athlete = athleteSnap.exists() ? athleteSnap.data() : {};

                document.getElementById('athlete-dashboard').style.display = 'none';
                document.getElementById('athlete-workout-container').style.display = 'block';
                
                // 1. Update the title and week
                document.getElementById('display-title').innerText = workout.title;
                document.getElementById('display-week').innerText = `WEEK ${workout.week}`;

                // 2. Make the Back Button return to the Workout List instead of the Lobby
                const backBtn = document.getElementById('back-to-lobby-btn'); 
                if (backBtn) {
                    backBtn.onclick = () => {
                        // Hide workout, show the dashboard list again
                        document.getElementById('athlete-workout-container').style.display = 'none';
                        document.getElementById('athlete-dashboard').style.display = 'block';
                        // Reset the button to go to index.html if clicked again from the list
                        backBtn.onclick = () => location.href = 'index.html';
                        backBtn.querySelector('span').innerText = 'Lobby';
                    };
                    backBtn.querySelector('span').innerText = 'Back to List';
                }
                
                // DEBUG: This will show you exactly what data we are pulling for this athlete
                console.log("--- DEBUG: Athlete Data Found ---", athlete);

                document.getElementById('athlete-dashboard').style.display = 'none';
                document.getElementById('athlete-workout-container').style.display = 'block';
                document.getElementById('display-title').innerText = workout.title;
                document.getElementById('display-week').innerText = `WEEK ${workout.week}`;

                const list = document.getElementById('athlete-exercise-list');
                list.innerHTML = '';

        // Switch to for...of to allow 'await' inside the loop
        for (const [exIndex, ex] of workout.exercises.entries()) {
            const cleanName = ex.name.toLowerCase().trim().replace(/_/g, ' ');

            // 1. FETCH PREVIOUS PERFORMANCE DATA
            const lastWeight = await getLastLift(athleteId, ex.name);
            const lastLiftBadge = lastWeight 
                ? `<span class="bg-[#2a2a2c] text-gray-400 text-[10px] font-black px-2 py-0.5 rounded ml-2 italic uppercase border border-[#3a3a3c]">
                    Last: ${lastWeight}${lastWeight === "BW" ? "" : " LBS"}
                </span>` 
                : '';

            // 2. CALCULATE MAX (Your existing logic)
            let athleteMax = 0;
            const keysToTry = liftMap[cleanName] || [cleanName];
            for (let key of keysToTry) {
                if (athlete[key]) {
                    athleteMax = athlete[key];
                    break;
                }
            }
            if (!athleteMax) athleteMax = athlete[ex.name] || 0;

            console.log(`Lift: ${ex.name} | Using Max: ${athleteMax}`);

            // 3. GENERATE SETS HTML
            let setsHtml = ex.setsData.map((s, i) => {
                const perc = s.percent || s.percentage || 0;
                const suggestedWeight = calculateWeight(athleteMax, perc);
                const setId = `set-${exIndex}-${i}`;
                
                const percString = perc > 0 
                    ? `<span class="text-[10px] text-gray-500 font-bold ml-1 italic">@ ${perc}%</span>` 
                    : '';

                const weightInputHTML = `<div class="flex flex-col">
                    <div class="flex items-center">
                        <input type="text" 
                            id="weight-${setId}" 
                            value="${suggestedWeight}" 
                            placeholder="BW"
                            onfocus="if(this.value==='BW') this.value=''" 
                            onblur="if(this.value==='') this.value='BW'"
                            class="bg-transparent text-[#b91c1c] font-black text-xl italic w-20 outline-none border-b border-transparent focus:border-[#b91c1c] transition-all"
                        >
                        <small class="text-[10px] ml-1 text-gray-500 font-bold not-italic">
                            ${suggestedWeight === "BW" ? "" : "LBS"}
                        </small>
                        ${percString}
                    </div>
                </div>`;

                return `
                    <div id="container-${setId}" data-completed="false" class="flex justify-between items-center bg-[#0a0a0b] p-3 rounded-lg mb-2 border border-[#2a2a2c]">
                        <div class="flex flex-col">
                            <span class="text-[9px] text-gray-500 font-bold uppercase mb-1">Set ${i+1}</span>
                            ${weightInputHTML}
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="flex flex-col items-center bg-[#1a1a1c] border border-[#2a2a2c] rounded px-4 py-1 min-w-[60px]">
                                <label class="text-[8px] text-gray-600 uppercase font-black mb-1">Reps</label>
                                <span id="reps-${setId}" class="text-white font-black text-lg">${s.reps}</span>
                            </div>
                            <button onclick="toggleSetComplete('${setId}')" id="btn-${setId}" class="bg-[#1a1a1c] p-3 rounded-full text-gray-600 border border-[#2a2a2c]">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7" /></svg>
                            </button>
                        </div>
                    </div>`;
            }).join('');

            // 4. ASSEMBLE CARD
            const card = document.createElement('div');
            card.className = "exercise-card bg-[#1a1a1c] border-l-4 border-[#b91c1c] p-5 rounded-r-lg mb-4 shadow-xl";
            
            // Title includes the new badge
            card.innerHTML = `
                <div class="flex items-center mb-4">
                    <h3 class="text-white font-black uppercase text-sm italic tracking-wider">
                        ${ex.name.replace(/_/g, ' ')}
                    </h3>
                    ${lastLiftBadge}
                </div>
                <div class="space-y-2">${setsHtml}</div>
            `;
            
            list.appendChild(card);
        }

                const finishBtn = document.createElement('button');
                finishBtn.className = "w-full bg-[#b91c1c] text-white font-black uppercase py-4 rounded-xl mt-6 mb-12"; 
                finishBtn.innerText = "Log Session & Finish";
                finishBtn.onclick = () => window.logFullWorkout(workoutId);
                list.appendChild(finishBtn);

            } catch (e) { console.error("Error loading workout:", e); }
        };

        // --- 5. Log & Save Workout ---
        window.logFullWorkout = async (workoutId) => {
            try {
                const btn = document.querySelector('button[onclick*="logFullWorkout"]');
                const originalText = btn.innerText;
                btn.innerText = "SAVING...";
                btn.disabled = true; // Prevent double-submitting
                
                const loggedExercises = [];
                
                document.querySelectorAll('.exercise-card').forEach(card => {
                // 1. Get the H3 element
                const h3 = card.querySelector('h3');
                if (!h3) return;

                // 2. CLEAN THE NAME: 
                // This looks for the text but ignores the <span> badge specifically
                let name = h3.innerText.split('Last:')[0].trim();

                const sets = Array.from(card.querySelectorAll('[id^="container-set-"]')).map(row => {
                    const setId = row.id.replace('container-', '');
                    
                    // 3. GRAB WEIGHT:
                    // Use a fallback to "BW" if the input is missing or empty
                    const weightInput = document.getElementById(`weight-${setId}`);
                    let weightUsed = weightInput ? weightInput.value.trim() : "BW";
                    if (weightUsed === "") weightUsed = "BW";

                    // 4. GRAB REPS:
                    const repsEl = document.getElementById(`reps-${setId}`);
                    const repsPerformed = repsEl ? repsEl.innerText : "0";

                    return {
                        weightUsed: weightUsed,
                        repsPerformed: repsPerformed,
                        completed: row.getAttribute('data-completed') === 'true'
                    };
                });
                
                loggedExercises.push({ name, sets });
            });

                // 2. Save to Firestore
                await addDoc(collection(db, "completed_workouts"), {
                    athleteId: window.currentAthleteId,
                    workoutId: workoutId,
                    schoolId: window.currentSchoolId,
                    timestamp: serverTimestamp(),
                    performance: loggedExercises
                });

                alert("Workout Logged Successfully!");
                // Instead of reload, taking them back to index might be smoother
                window.location.href = 'index.html'; 

            } catch (e) { 
                console.error("Error saving:", e); 
                alert("Error saving workout. Please check your connection.");
                const btn = document.querySelector('button[onclick*="logFullWorkout"]');
                if (btn) {
                    btn.innerText = "Log Session & Finish";
                    btn.disabled = false;
                }
            }
        };

        async function getLastLift(athleteId, exerciseName) {
            try {
                const completedRef = collection(db, "completed_workouts");
                // Query for this athlete's history, newest first
                const q = query(
                    completedRef, 
                    where("athleteId", "==", athleteId), 
                    orderBy("timestamp", "desc"), 
                    limit(10) // Check last 10 workouts to find a match
                );
                
                const querySnapshot = await getDocs(q);
                for (const doc of querySnapshot.docs) {
                    const workout = doc.data();
                    const exercise = workout.performance.find(ex => ex.name === exerciseName);
                    
                    if (exercise && exercise.sets && exercise.sets.length > 0) {
                        // Return the weight used in the first completed set
                        const firstSet = exercise.sets.find(s => s.completed);
                        if (firstSet) return firstSet.weightUsed;
                    }
                }
                return null; // No history found
            } catch (e) {
                console.error("Error fetching last lift:", e);
                return null;
            }
        }
    </script>
</body>
</html>
