<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RackStat | Athlete Workout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
        body { background-color: #0a0a0b; color: white; }
    </style>
</head>
<body class="bg-[#0a0a0b] text-white antialiased min-h-screen">

    <div id="athlete-dashboard" class="max-w-md mx-auto p-4">
        <div class="mb-8 border-b border-[#2a2a2c] pb-4 mt-4">
            <h2 class="text-[10px] font-black text-[#b91c1c] uppercase tracking-widest mb-1">Athlete Portal</h2>
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter italic">Current Workouts</h1>
        </div>
        <div id="available-workouts" class="space-y-3">
            <div class="animate-pulse text-gray-500 text-xs uppercase font-bold text-center py-10 tracking-widest">
                Loading training session...
            </div>
        </div>
    </div>

    <div id="athlete-workout-container" class="max-w-md mx-auto p-4" style="display: none;">
        <button onclick="location.reload()" class="text-gray-500 text-[10px] uppercase font-bold mb-4 flex items-center gap-1 hover:text-white transition-colors">
            ← Back to Workouts
        </button>
        <div class="mb-6">
            <h1 id="display-title" class="text-3xl font-black text-white uppercase tracking-tighter italic">--</h1>
            <p id="display-week" class="text-[#b91c1c] font-black text-sm uppercase tracking-widest">WEEK --</p>
        </div>
        <div id="athlete-exercise-list" class="space-y-4"></div>
    </div>

    <div class="flex items-center mb-6">
        <button onclick="location.href='index.html'" class="flex items-center text-gray-500 hover:text-white transition-colors group">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
            </svg>
            <span class="text-xs font-black uppercase tracking-widest italic">Lobby</span>
        </button>
    </div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { firebaseConfig } from "./firebase-config.js"; 
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, getDocs, addDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 1. URL & Auth Setup ---
        const urlParams = new URLSearchParams(window.location.search);
        const directWorkoutId = urlParams.get('id');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentAthleteId = user.uid;
                const docSnap = await getDoc(doc(db, "recruiting_profiles", user.uid));
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    window.currentSchoolId = data.school_id || data.schoolId;
                    
                    if (window.currentSchoolId) {
                        if (directWorkoutId) {
                            window.loadAthleteWorkout(directWorkoutId, user.uid);
                        } else {
                            window.loadAvailableWorkouts(); 
                        }
                    }
                }
            } else {
                window.location.href = "index.html";
            }
        });

        // --- 2. Logic Helpers ---
        const liftMap = {
            "clean": ["cleanMax", "clean", "clean_max"],
            "power clean": ["cleanMax", "power_clean", "clean"],
            "bench press": ["benchMax", "bench", "bench_press"],
            "bench": ["benchMax", "bench", "bench_press"],
            "back squat": ["squatMax", "squat", "back_squat"],
            "squat": ["squatMax", "squat", "back_squat"],
            "deadlift": ["deadliftMax", "deadlift", "dead_lift"],
            "push press": ["pushpressMax", "push_press"]
        };

        const calculateWeight = (max, percentage) => {
            const m = parseFloat(max);
            const p = parseFloat(percentage);
            if (!m || m === 0 || !p || p === 0) return "BW";
            return Math.round((m * (p / 100)) / 5) * 5; 
        };

        // --- 3. Database Propagation (Max Updates) ---
        window.updateAthleteMax = async (athleteId, exerciseName, weightAttempted) => {
            const liftKey = exerciseName.toLowerCase().replace(/\s+/g, '');
            const userRef = doc(db, "users", athleteId);
            const recruitingRef = doc(db, "recruiting_profiles", athleteId);

            try {
                // Update internal user doc for calculations
                await updateDoc(userRef, {
                    [`maxes.${liftKey}`]: Number(weightAttempted),
                    lastMaxUpdate: serverTimestamp()
                });
                // Update recruiting profile for public view
                await updateDoc(recruitingRef, {
                    [`stats.${liftKey}`]: Number(weightAttempted)
                });
                console.log(`Max updated for ${exerciseName}: ${weightAttempted}lbs`);
            } catch (err) {
                console.error("Error propagating new max:", err);
            }
        };

        // --- 4. UI Actions ---
        window.toggleSetComplete = (setId) => {
            const container = document.getElementById(`container-${setId}`);
            const btn = document.getElementById(`btn-${setId}`);
            container.classList.toggle('border-[#b91c1c]');
            container.classList.toggle('bg-[#b91c1c]/10');
            btn.classList.toggle('text-green-500');
            btn.classList.toggle('text-gray-600');
            const isDone = container.getAttribute('data-completed') === 'true';
            container.setAttribute('data-completed', !isDone);
        };

        window.recordMaxAttempt = async (exerciseName, setId, isWarmup, athleteId) => {
            const weightInput = document.getElementById(`weight-${setId}`);
            const weight = weightInput.value;
            
            if (!weight || weight === "BW") return alert("Enter weight first!");

            if (!isWarmup) {
                await window.updateAthleteMax(athleteId, exerciseName, weight);
                weightInput.classList.add('text-green-500');
            }
            window.toggleSetComplete(setId);
        };

        window.loadAvailableWorkouts = async () => {
            const workoutContainer = document.getElementById('available-workouts');
            const workoutRef = collection(db, "schools", window.currentSchoolId, "workouts");
            const q = query(workoutRef, orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            
            workoutContainer.innerHTML = ''; 
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const btn = document.createElement('button');
                btn.className = "w-full bg-[#1a1a1c] border border-[#2a2a2c] p-5 rounded-xl flex justify-between items-center group text-left mb-3";
                btn.onclick = () => window.loadAthleteWorkout(doc.id, window.currentAthleteId);
                btn.innerHTML = `
                    <div>
                        <h3 class="text-white font-black uppercase text-lg mb-1 italic">${data.title}</h3>
                        <span class="text-[#b91c1c] font-bold text-[10px] uppercase">Week ${weekDisplay}</span>
                    </div>
                    <span class="text-gray-600 group-hover:text-[#b91c1c]">→</span>
                `;
                workoutContainer.appendChild(btn);
            });
        };

    // --- 5. Main Workout Renderer ---
            window.loadAthleteWorkout = async (workoutId, athleteId) => {
                try {
                    const workoutDocRef = doc(db, "schools", window.currentSchoolId, "workouts", workoutId);
                    const athleteDocRef = doc(db, "recruiting_profiles", athleteId);
                    const userDocRef = doc(db, "users", athleteId);
                    
                    const [workoutSnap, athleteSnap, userSnap] = await Promise.all([
                        getDoc(workoutDocRef), 
                        getDoc(athleteDocRef),
                        getDoc(userDocRef)
                    ]);

                    if (!workoutSnap.exists()) return;
                    const workout = workoutSnap.data();
                    const athlete = athleteSnap.exists() ? athleteSnap.data() : {};
                    const userPrivate = userSnap.exists() ? userSnap.data() : {};
                    const currentMaxes = userPrivate.maxes || {};

                    document.getElementById('athlete-dashboard').style.display = 'none';
                    document.getElementById('athlete-workout-container').style.display = 'block';
                    document.getElementById('display-title').innerText = workout.title;
                    
                    // FIX: Check for Week 0 specifically (since 0 is falsy)
                    const weekNum = (workout.week !== undefined && workout.week !== null) ? workout.week : '?';
                    document.getElementById('display-week').innerText = `WEEK ${weekNum}`;

                    const list = document.getElementById('athlete-exercise-list');
                    list.innerHTML = '';

                    for (const [exIndex, ex] of workout.exercises.entries()) {
                        const cleanName = ex.name.toLowerCase().trim();
                        const lastWeight = await getLastLift(athleteId, ex.name);
                        
                        // FIX: Robust Max Lookup
                        // This checks "bench press", then "benchpress", then any mappings in liftMap
                        const liftKeyNoSpaces = cleanName.replace(/\s+/g, '');
                        let athleteCurrentMax = currentMaxes[cleanName] || currentMaxes[liftKeyNoSpaces] || "No Data";

                        if (athleteCurrentMax === "No Data" && typeof liftMap !== 'undefined') {
                            const alternates = liftMap[cleanName] || [];
                            for (let alt of alternates) {
                                if (currentMaxes[alt]) {
                                    athleteCurrentMax = currentMaxes[alt];
                                    break;
                                }
                            }
                        }

                        let setsHtml = '';

                        if (workout.isMaxOut) {
                            // --- MAX OUT MODE: 3 Warmup + 3 Attempt ---
                            for (let i = 0; i < 6; i++) {
                                const isWarmup = i < 3;
                                const setId = `set-${exIndex}-${i}`;
                                const label = isWarmup ? `Warmup ${i + 1}` : `MAX ATTEMPT ${i - 2}`;
                                const borderClass = isWarmup ? 'border-gray-800' : 'border-red-600/50 bg-red-900/5';

                                setsHtml += `
                                    <div id="container-${setId}" data-completed="false" class="flex justify-between items-center bg-[#0a0a0b] p-3 rounded-lg mb-2 border ${borderClass}">
                                        <div class="flex flex-col">
                                            <span class="text-[9px] text-gray-500 font-bold uppercase mb-1">${label}</span>
                                            <input type="number" id="weight-${setId}" placeholder="LBS" class="bg-transparent text-white font-black text-xl w-20 outline-none focus:text-red-500">
                                        </div>
                                        <div class="flex items-center gap-4">
                                            <div class="flex flex-col items-center">
                                                <label class="text-[8px] text-gray-600 uppercase font-black">Reps</label>
                                                <input type="number" id="reps-${setId}" placeholder="-" class="bg-transparent text-white font-black text-lg w-10 text-center outline-none">
                                            </div>
                                            <button onclick="recordMaxAttempt('${ex.name}', '${setId}', ${isWarmup}, '${athleteId}')" id="btn-${setId}" class="bg-[#1a1a1c] p-3 rounded-full text-gray-600 border border-[#2a2a2c]">
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7" /></svg>
                                            </button>
                                        </div>
                                    </div>`;
                            }
                        } else {
                            // --- STANDARD MODE: Percentage Based ---
                            let athleteMaxForCalc = 0;
                            // Use the same logic as above to find the max for calculations
                            const keysToTry = (typeof liftMap !== 'undefined' && liftMap[cleanName]) ? liftMap[cleanName] : [cleanName, liftKeyNoSpaces];
                            for (let key of keysToTry) {
                                if (currentMaxes[key]) { athleteMaxForCalc = currentMaxes[key]; break; }
                            }

                            setsHtml = ex.setsData.map((s, i) => {
                                const perc = s.percent || 0;
                                const suggestedWeight = calculateWeight(athleteMaxForCalc, perc);
                                const setId = `set-${exIndex}-${i}`;
                                return `
                                    <div id="container-${setId}" data-completed="false" class="flex justify-between items-center bg-[#0a0a0b] p-3 rounded-lg mb-2 border border-[#2a2a2c]">
                                        <div class="flex flex-col">
                                            <span class="text-[9px] text-gray-500 font-bold uppercase mb-1">Set ${i+1}</span>
                                            <div class="flex items-center">
                                                <input type="text" id="weight-${setId}" value="${suggestedWeight}" class="bg-transparent text-[#b91c1c] font-black text-xl italic w-20 outline-none">
                                                <small class="text-[10px] ml-1 text-gray-500 font-bold">${suggestedWeight === "BW" ? "" : "LBS"} ${perc > 0 ? '@ '+perc+'%' : ''}</small>
                                            </div>
                                        </div>
                                        <div class="flex items-center gap-4">
                                            <div class="flex flex-col items-center min-w-[60px]">
                                                <label class="text-[8px] text-gray-600 uppercase font-black">Reps</label>
                                                <span id="reps-${setId}" class="text-white font-black text-lg">${s.reps}</span>
                                            </div>
                                            <button onclick="toggleSetComplete('${setId}')" id="btn-${setId}" class="bg-[#1a1a1c] p-3 rounded-full text-gray-600 border border-[#2a2a2c]">
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7" /></svg>
                                            </button>
                                        </div>
                                    </div>`;
                            }).join('');
                        }

                        const card = document.createElement('div');
                        card.className = "exercise-card bg-[#1a1a1c] border-l-4 border-[#b91c1c] p-5 rounded-r-lg mb-4 shadow-xl";
                        
                        const headerInfo = workout.isMaxOut 
                            ? `<div class="text-right ml-auto"><span class="text-[8px] font-black text-gray-500 uppercase block">Current Max</span><span class="text-sm font-black text-red-500">${athleteCurrentMax}${athleteCurrentMax !== "No Data" ? " LBS" : ""}</span></div>`
                            : (lastWeight ? `<span class="bg-[#2a2a2c] text-gray-400 text-[10px] font-black px-2 py-0.5 rounded ml-2 italic uppercase">Last: ${lastWeight}</span>` : '');

                        card.innerHTML = `
                            <div class="flex items-center mb-4">
                                <h3 class="text-white font-black uppercase text-sm italic tracking-wider">${ex.name}</h3>
                                ${headerInfo}
                            </div>
                            <div class="space-y-2">${setsHtml}</div>
                        `;
                        list.appendChild(card);
                    }

                    const finishBtn = document.createElement('button');
                    finishBtn.className = "w-full bg-[#b91c1c] text-white font-black uppercase py-4 rounded-xl mt-6 mb-12"; 
                    finishBtn.innerText = "Log Session & Finish";
                    finishBtn.onclick = () => window.logFullWorkout(workoutId);
                    list.appendChild(finishBtn);

                } catch (e) { console.error("Error loading workout:", e); }
            };
            
        // --- 6. Persistence ---
        window.logFullWorkout = async (workoutId) => {
            try {
                const btn = document.querySelector('button[onclick*="logFullWorkout"]');
                if (btn) { btn.innerText = "SAVING..."; btn.disabled = true; }
                
                const loggedExercises = [];
                document.querySelectorAll('.exercise-card').forEach(card => {
                    const h3 = card.querySelector('h3');
                    if (!h3) return;
                    
                    // Clean the name from all potential badges
                    let name = h3.innerText.split('Last:')[0].split('Current Max')[0].trim();

                    const sets = Array.from(card.querySelectorAll('[id^="container-set-"]')).map(row => {
                        const weightInput = row.querySelector('input[id^="weight-"]');
                        
                        // HYBRID CHECK: Look for input first (Max Mode), then span (Standard Mode)
                        const repsInput = row.querySelector('input[id^="reps-"]');
                        const repsSpan = row.querySelector('span[id^="reps-"]');
                        
                        let repsVal = "0";
                        if (repsInput) repsVal = repsInput.value;
                        else if (repsSpan) repsVal = repsSpan.innerText; // This was the crashing line

                        return {
                            weightUsed: weightInput ? weightInput.value || "BW" : "BW",
                            repsPerformed: repsVal || "0",
                            completed: row.getAttribute('data-completed') === 'true'
                        };
                    });
                    loggedExercises.push({ name, sets });
                });

                await addDoc(collection(db, "completed_workouts"), {
                    athleteId: window.currentAthleteId,
                    workoutId: workoutId,
                    schoolId: window.currentSchoolId,
                    timestamp: serverTimestamp(),
                    performance: loggedExercises
                });

                alert("Workout Logged!");
                window.location.href = 'index.html'; 
            } catch (e) { 
                console.error("Save Error Detail:", e); 
                alert("Error saving workout. Check console."); 
                if (btn) { btn.innerText = "Log Session & Finish"; btn.disabled = false; }
            }
        };

        async function getLastLift(athleteId, exerciseName) {
            try {
                const q = query(collection(db, "completed_workouts"), where("athleteId", "==", athleteId), orderBy("timestamp", "desc"), limit(10));
                const snap = await getDocs(q);
                for (const doc of snap.docs) {
                    const ex = doc.data().performance.find(e => e.name === exerciseName);
                    if (ex) {
                        const done = ex.sets.find(s => s.completed);
                        if (done) return done.weightUsed;
                    }
                }
                return null;
            } catch (e) { return null; }
        }
    </script>

</body>
</html>
