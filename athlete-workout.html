<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RackStat | Athlete Workout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
        body { background-color: #0a0a0b; color: white; }
    </style>
</head>
<body class="bg-[#0a0a0b] text-white antialiased min-h-screen">

    <div id="athlete-dashboard" class="max-w-md mx-auto p-4">
        <div class="mb-8 border-b border-[#2a2a2c] pb-4 mt-4">
            <h2 class="text-[10px] font-black text-[#b91c1c] uppercase tracking-widest mb-1">Athlete Portal</h2>
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter italic">Current Workouts</h1>
        </div>
        <div id="available-workouts" class="space-y-3">
            <div class="animate-pulse text-gray-500 text-xs uppercase font-bold text-center py-10 tracking-widest">
                Loading training session...
            </div>
        </div>
    </div>

    <div id="athlete-workout-container" class="max-w-md mx-auto p-4" style="display: none;">
        <button onclick="location.reload()" class="text-gray-500 text-[10px] uppercase font-bold mb-4 flex items-center gap-1 hover:text-white transition-colors">
            ← Back to Workouts
        </button>
        <div class="mb-6">
            <h1 id="display-title" class="text-3xl font-black text-white uppercase tracking-tighter italic">--</h1>
            <p id="display-week" class="text-[#b91c1c] font-black text-sm uppercase tracking-widest">WEEK --</p>
        </div>
        <div id="athlete-exercise-list" class="space-y-4"></div>
    </div>

    <div class="flex items-center mb-6">
        <button onclick="location.href='index.html'" class="flex items-center text-gray-500 hover:text-white transition-colors group">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
            </svg>
            <span class="text-xs font-black uppercase tracking-widest italic">Lobby</span>
        </button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { firebaseConfig } from "./firebase-config.js"; 
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, query, where, orderBy, limit, getDocs, addDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- GLOBAL STATE ---
    const urlParams = new URLSearchParams(window.location.search);
    const directWorkoutId = urlParams.get('id');
    window.currentAthleteId = null;
    window.currentSchoolId = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            window.currentAthleteId = user.uid;
            
            // Check both possible profile locations
            const profileSnap = await getDoc(doc(db, "recruiting_profiles", user.uid));
            const userSnap = await getDoc(doc(db, "users", user.uid));
            
            const profileData = profileSnap.exists() ? profileSnap.data() : (userSnap.exists() ? userSnap.data() : null);

            if (profileData) {
                window.currentSchoolId = profileData.school_id || profileData.schoolId;
                
                if (window.currentSchoolId) {
                    if (directWorkoutId) {
                        window.loadAthleteWorkout(directWorkoutId, user.uid);
                    } else {
                        window.loadAvailableWorkouts(); 
                    }
                } else {
                    alert("No school associated with this account.");
                }
            }
        } else {
            window.location.href = "index.html";
        }
    });

    // --- MATH HELPERS ---
    window.calculateWeight = (max, percentage) => {
        const m = parseFloat(max);
        const p = parseFloat(percentage);
        if (isNaN(m) || m === 0) return "-";
        if (!p || p === 0) return "BW";
        return Math.round((m * (p / 100)) / 5) * 5; 
    };

    // --- WORKOUT LISTING ---
    window.loadAvailableWorkouts = async () => {
        const workoutContainer = document.getElementById('available-workouts');
        // UPDATED: Query the root workouts collection filtered by school_id
        const q = query(
            collection(db, "workouts"), 
            where("school_id", "==", window.currentSchoolId),
            orderBy("date", "desc")
        );
        
        const querySnapshot = await getDocs(q);
        workoutContainer.innerHTML = ''; 

        if (querySnapshot.empty) {
            workoutContainer.innerHTML = '<div class="text-gray-600 text-center py-10 uppercase text-xs font-bold tracking-widest">No workouts assigned to your team.</div>';
            return;
        }

        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const isMax = data.isMaxOutMode;
            
            const btn = document.createElement('button');
            btn.className = "w-full bg-[#1a1a1c] border border-[#2a2a2c] p-5 rounded-xl flex justify-between items-center group text-left mb-3 transition-all hover:border-[#b91c1c]";
            btn.onclick = () => window.loadAthleteWorkout(doc.id, window.currentAthleteId);
            
            btn.innerHTML = `
                <div>
                    <div class="flex items-center gap-2">
                        <h3 class="text-white font-black uppercase text-lg italic">${data.name}</h3>
                        ${isMax ? '<span class="bg-red-600 text-white text-[8px] px-1.5 py-0.5 rounded font-black">MAX</span>' : ''}
                    </div>
                    <span class="text-[#b91c1c] font-bold text-[10px] uppercase tracking-widest">${data.date}</span>
                </div>
                <span class="text-gray-600 group-hover:text-[#b91c1c] transition-transform group-hover:translate-x-1">→</span>
            `;
            workoutContainer.appendChild(btn);
        });
    };

    // --- MAIN RENDERER ---
    window.loadAthleteWorkout = async (workoutId, athleteId) => {
        try {
            const workoutDocRef = doc(db, "workouts", workoutId);
            const latestMaxRef = doc(db, "recruiting_profiles", athleteId, "maxes", "latest");
            
            const [workoutSnap, maxSnap] = await Promise.all([
                getDoc(workoutDocRef), 
                getDoc(latestMaxRef)
            ]);

            if (!workoutSnap.exists()) return;
            const workout = workoutSnap.data();
            const currentMaxes = maxSnap.exists() ? maxSnap.data() : {};

            document.getElementById('athlete-dashboard').style.display = 'none';
            document.getElementById('athlete-workout-container').style.display = 'block';
            document.getElementById('display-title').innerText = workout.name;
            document.getElementById('display-week').innerText = workout.date;

            const list = document.getElementById('athlete-exercise-list');
            list.innerHTML = '';

            for (const [exIndex, ex] of workout.exercises.entries()) {
                let athleteCurrentMax = currentMaxes[ex.name.toLowerCase().trim()] || 0;
                let setsHtml = '';

                if (ex.isMaxOut) {
                    // MAX OUT VIEW (Matches your existing logic)
                    for (let i = 0; i < 6; i++) {
                        const isWarmup = i < 3;
                        const setId = `set-${exIndex}-${i}`;
                        const label = isWarmup ? `Warmup ${i + 1}` : `MAX ATTEMPT ${i - 2}`;
                        setsHtml += `
                            <div id="container-${setId}" data-completed="false" class="flex justify-between items-center bg-black p-3 rounded-lg border border-gray-800 mb-2">
                                <div class="flex flex-col">
                                    <span class="text-[9px] text-gray-500 font-bold uppercase">${label}</span>
                                    <input type="number" id="weight-${setId}" placeholder="LBS" class="bg-transparent text-white font-black text-xl w-20 outline-none">
                                </div>
                                <button onclick="recordMaxAttempt('${ex.name}', '${setId}', ${isWarmup}, '${athleteId}')" id="btn-${setId}" class="bg-[#1a1a1c] p-3 rounded-full text-gray-600 border border-[#2a2a2c]">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7" /></svg>
                                </button>
                            </div>`;
                    }
                } else if (ex.isCircuit) {
                    // NEW: CIRCUIT VIEW
                    const config = ex.circuitConfig;
                    setsHtml = `
                        <div class="bg-red-900/10 border border-red-900/30 p-3 rounded mb-4">
                            <p class="text-[10px] font-black text-red-500 uppercase italic">Circuit Protocol: ${config.cycles} Rounds</p>
                            <p class="text-xs text-gray-400">${config.work}s Work / ${config.rest}s Rest</p>
                        </div>
                        <div class="space-y-2 mb-4">
                            ${ex.circuitExercises.map((ce, ci) => `
                                <div class="flex items-center gap-3 py-1 border-b border-gray-800/50">
                                    <span class="text-gray-600 font-bold text-xs">${ci + 1}.</span>
                                    <span class="text-white font-bold uppercase text-sm">${ce}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div id="container-circ-${ex.id}" data-completed="false" class="flex justify-between items-center bg-black p-4 rounded border border-gray-800">
                             <span class="text-xs font-black text-gray-500 uppercase">Complete Circuit</span>
                             <button onclick="toggleSetComplete('circ-${ex.id}')" id="btn-circ-${ex.id}" class="bg-[#1a1a1c] p-3 rounded-full text-gray-600 border border-[#2a2a2c]">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7" /></svg>
                             </button>
                        </div>
                    `;
                } else {
                    // STANDARD SETS
                    setsHtml = ex.sets.map((s, i) => {
                        const suggestedWeight = window.calculateWeight(athleteCurrentMax, s.pct || 0);
                        const setId = `set-${exIndex}-${i}`;
                        return `
                            <div id="container-${setId}" data-completed="false" class="flex justify-between items-center bg-[#0a0a0b] p-3 rounded-lg mb-2 border border-[#2a2a2c]">
                                <div class="flex flex-col">
                                    <span class="text-[9px] text-gray-500 font-bold uppercase">Set ${i+1}</span>
                                    <div class="flex items-center">
                                        <input type="text" id="weight-${setId}" value="${suggestedWeight}" class="bg-transparent text-[#b91c1c] font-black text-xl italic w-20 outline-none">
                                        <small class="text-[10px] ml-1 text-gray-500 font-bold">${suggestedWeight === "BW" ? "" : "LBS"}</small>
                                    </div>
                                </div>
                                <div class="flex items-center gap-4">
                                    <div class="flex flex-col items-center min-w-[50px]">
                                        <label class="text-[8px] text-gray-600 uppercase font-black">Reps</label>
                                        <span class="text-white font-black text-lg">${s.reps}</span>
                                    </div>
                                    <button onclick="toggleSetComplete('${setId}')" id="btn-${setId}" class="bg-[#1a1a1c] p-3 rounded-full text-gray-600 border border-[#2a2a2c]">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7" /></svg>
                                    </button>
                                </div>
                            </div>`;
                    }).join('');
                }

                const card = document.createElement('div');
                card.className = "exercise-card bg-[#1a1a1c] border-l-4 border-[#b91c1c] p-5 rounded-r-lg mb-4 shadow-xl";
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-white font-black uppercase text-sm italic tracking-wider">${ex.name}</h3>
                        ${ex.category === 'core' && athleteCurrentMax ? `<span class="text-[10px] font-bold text-gray-500">MAX: ${athleteCurrentMax}</span>` : ''}
                    </div>
                    <div class="space-y-2">${setsHtml}</div>
                `;
                list.appendChild(card);
            }

            // Finish Button
            const fBtn = document.createElement('button');
            fBtn.className = "w-full bg-[#b91c1c] text-white font-black uppercase py-4 rounded-xl mt-6 mb-12 shadow-lg active:scale-95 transition-transform"; 
            fBtn.innerText = "Log Session & Finish";
            fBtn.onclick = () => window.logFullWorkout(workoutId);
            list.appendChild(fBtn);

        } catch (e) { console.error(e); }
    };

    window.toggleSetComplete = (setId) => {
        const container = document.getElementById(`container-${setId}`);
        const btn = document.getElementById(`btn-${setId}`);
        const isCompleted = container.getAttribute('data-completed') === 'true';
        
        if (!isCompleted) {
            container.classList.add('border-[#b91c1c]', 'bg-[#b91c1c]/10');
            btn.classList.add('text-green-500', 'border-green-500/50');
            container.setAttribute('data-completed', 'true');
        } else {
            container.classList.remove('border-[#b91c1c]', 'bg-[#b91c1c]/10');
            btn.classList.remove('text-green-500', 'border-green-500/50');
            container.setAttribute('data-completed', 'false');
        }
    };

    window.logFullWorkout = async (workoutId) => {
        const btn = document.querySelector('button[onclick*="logFullWorkout"]');
        btn.innerText = "SAVING...";
        btn.disabled = true;

        const performance = [];
        document.querySelectorAll('.exercise-card').forEach(card => {
            const name = card.querySelector('h3').innerText;
            const sets = Array.from(card.querySelectorAll('[id^="container-"]')).map(row => ({
                weight: row.querySelector('input')?.value || "BW",
                completed: row.getAttribute('data-completed') === 'true'
            }));
            performance.push({ name, sets });
        });

        await addDoc(collection(db, "completed_workouts"), {
            athleteId: window.currentAthleteId,
            workoutId: workoutId,
            schoolId: window.currentSchoolId,
            performance,
            timestamp: serverTimestamp()
        });

        alert("Workout Logged!");
        location.href = 'index.html';
    };
</script>

</body>
</html>
