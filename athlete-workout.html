<div id="athlete-dashboard" class="max-w-md mx-auto p-4">
    <div class="mb-8 border-b border-gray-800 pb-4">
        <h2 class="text-xs font-black text-red-500 uppercase tracking-widest mb-1">Athlete Portal</h2>
        <h1 class="text-3xl font-black text-white uppercase tracking-tighter">Current Workouts</h1>
    </div>
    <div id="available-workouts" class="space-y-3">
        <div class="animate-pulse text-gray-600 text-xs uppercase font-bold text-center py-10">
            Loading your training session...
        </div>
    </div>
</div>

<div id="athlete-workout-container" class="max-w-md mx-auto p-4" style="display: none;">
    <button onclick="location.reload()" class="text-gray-500 text-[10px] uppercase font-bold mb-4 flex items-center gap-1">
        ← Back to Workouts
    </button>
    <div class="mb-6">
        <h1 id="display-title" class="text-2xl font-black text-white uppercase tracking-tighter">--</h1>
        <p id="display-week" class="text-red-500 font-bold text-sm">WEEK --</p>
    </div>
    <div id="athlete-exercise-list" class="space-y-4"></div>
</div>

<script type="module">
    // 1. Import the App Initializer
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    
    // 2. Import your specific config file (Ensure the path is correct!)
    import { firebaseConfig } from "./firebase-config.js"; 

    // 3. Import the rest of your Firebase services
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, orderBy, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 4. INITIALIZE EVERYTHING
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- FROM HERE DOWN, THE REST OF YOUR CODE REMAINS THE SAME ---

    onAuthStateChanged(auth, async (user) => {
    if (user) {
        window.currentAthleteId = user.uid;
        
        // Fetch the athlete's profile to get their School ID
        const profileSnap = await getDoc(doc(db, "profiles", user.uid));
        if (profileSnap.exists()) {
            window.currentSchoolId = profileSnap.data().schoolId; // Matches the field name in your Firestore
            window.loadAvailableWorkouts(); 
        } else {
            console.error("No profile found for this athlete.");
        }
    }
});

    const calculateWeight = (max, percentage) => {
        if (!max || !percentage) return "---";
        const raw = max * (parseFloat(percentage) / 100);
        return Math.round(raw / 5) * 5;
    };

    const liftMap = {
        "bench_press": "benchMax",
        "back_squat": "squatMax",
        "power_clean": "cleanMax",
        "deadlift": "deadliftMax"
    };

    // VISUAL TOGGLE
    window.toggleSetComplete = (setId) => {
        const container = document.getElementById(`container-${setId}`);
        const btn = document.getElementById(`btn-${setId}`);
        container.classList.toggle('border-green-500');
        container.classList.toggle('bg-green-900/20');
        btn.classList.toggle('text-green-500');
    };

    // LOAD LIST
    window.loadAvailableWorkouts = async () => {
        const workoutContainer = document.getElementById('available-workouts');
        try {
            const workoutRef = collection(db, "schools", window.currentSchoolId, "workouts");
            const q = query(workoutRef, orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                workoutContainer.innerHTML = `<p class="text-gray-500 text-center py-10 uppercase text-xs font-bold">No workouts published.</p>`;
                return;
            }

            workoutContainer.innerHTML = ''; 
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const btn = document.createElement('button');
                btn.className = "w-full bg-gray-800 border border-gray-700 p-5 rounded-xl flex justify-between items-center group text-left mb-3";
                btn.onclick = () => window.loadAthleteWorkout(doc.id, window.currentAthleteId);

                btn.innerHTML = `
                    <div>
                        <h3 class="text-white font-black uppercase text-lg mb-1">${data.title}</h3>
                        <span class="text-red-500 font-bold text-[10px] uppercase">Week ${data.week}</span>
                    </div>
                    <span class="text-gray-600 group-hover:text-red-500">→</span>
                `;
                workoutContainer.appendChild(btn);
            });
        } catch (e) {
            console.error(e);
        }
    };

    // LOGGING LOGIC
    window.logFullWorkout = async (workoutId) => {
        try {
            const loggedExercises = [];
            const exerciseCards = document.querySelectorAll('.exercise-card'); 

            exerciseCards.forEach(card => {
                const name = card.querySelector('h3').innerText;
                const setRows = card.querySelectorAll('[id^="container-set-"]');
                
                const sets = Array.from(setRows).map(row => {
                    const setId = row.id.replace('container-', '');
                    return {
                        repsPerformed: document.getElementById(`input-${setId}`).value,
                        completed: row.classList.contains('border-green-500')
                    };
                });
                loggedExercises.push({ name, sets });
            });

            await addDoc(collection(db, "completed_workouts"), {
                athleteId: window.currentAthleteId,
                workoutId: workoutId,
                schoolId: window.currentSchoolId,
                timestamp: serverTimestamp(),
                performance: loggedExercises
            });

            alert("Workout Logged Successfully!");
            location.reload();

        } catch (e) {
            console.error("Error logging workout:", e);
            alert("Failed to save workout.");
        }
    };

    // LOAD SINGLE WORKOUT
    window.loadAthleteWorkout = async (workoutId, athleteId) => {
        try {
            const workoutSnap = await getDoc(doc(db, "schools", window.currentSchoolId, "workouts", workoutId));
            const athleteSnap = await getDoc(doc(db, "profiles", athleteId));

            if (!workoutSnap.exists()) return;
            
            const workout = workoutSnap.data();
            const athlete = athleteSnap.exists() ? athleteSnap.data() : {};

            document.getElementById('athlete-dashboard').style.display = 'none';
            document.getElementById('athlete-workout-container').style.display = 'block';
            
            document.getElementById('display-title').innerText = workout.title;
            document.getElementById('display-week').innerText = `WEEK ${workout.week}`;

            const list = document.getElementById('athlete-exercise-list');
            list.innerHTML = '';

            workout.exercises.forEach(ex => {
                const athleteMax = athlete[liftMap[ex.name]] || 0;
                const card = document.createElement('div');
                card.className = "exercise-card bg-gray-800 border-l-4 border-red-600 p-4 rounded-r-lg mb-4";
                
                let setsHtml = ex.setsData.map((s, i) => {
                    const targetWeight = calculateWeight(athleteMax, s.percent);
                    const setId = `set-${ex.name}-${i}`;
                    
                    return `
                        <div id="container-${setId}" class="flex justify-between items-center bg-gray-900/50 p-3 rounded mb-2 border border-gray-700 transition-all">
                            <div class="flex flex-col">
                                <span class="text-[9px] text-gray-500 font-bold uppercase leading-none">Set ${i+1}</span>
                                <span class="text-red-500 font-black text-lg">${targetWeight}<small class="text-[10px] ml-1">LBS</small></span>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="flex flex-col items-center">
                                    <label class="text-[8px] text-gray-600 uppercase font-bold">Actual Reps</label>
                                    <input type="number" id="input-${setId}" value="${s.reps}" 
                                        class="w-12 bg-gray-800 text-white text-center font-bold p-1 rounded border border-gray-600 focus:border-green-500 outline-none">
                                </div>
                                <button onclick="toggleSetComplete('${setId}')" id="btn-${setId}"
                                    class="bg-gray-700 p-2 rounded-full text-gray-400 hover:text-green-500 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');

                card.innerHTML = `
                    <h3 class="text-white font-black uppercase text-sm mb-3">${ex.name.replace(/_/g, ' ')}</h3>
                    <div class="space-y-1">${setsHtml}</div>
                `;
                list.appendChild(card);
            });

            // FINISH BUTTON MOVED HERE - Inside loadAthleteWorkout but outside the loop
            const finishBtn = document.createElement('button');
            finishBtn.className = "w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 rounded-xl mt-8 mb-12 shadow-lg tracking-widest uppercase";
            finishBtn.innerText = "Log Session & Finish";
            finishBtn.onclick = () => window.logFullWorkout(workoutId);
            list.appendChild(finishBtn);

        } catch (e) {
            console.error(e);
        }
    };
</script>
