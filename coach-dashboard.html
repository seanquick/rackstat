<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RACKSTAT | Coach Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0b] text-white min-h-screen p-4">

    <header class="flex justify-between items-center max-w-6xl mx-auto border-b border-red-700 pb-4 mb-6">
        <div>
            <h1 class="text-xl font-black italic uppercase tracking-tighter">Coach Command</h1>
            <p id="school-title" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Loading School...</p>
        </div>
        <button onclick="handleLogout()" class="text-[10px] font-black uppercase bg-gray-800 px-4 py-2 rounded hover:bg-red-700 transition-all">Sign Out</button>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="flex gap-4 mb-6 bg-red-900/10 p-4 border border-red-900/30 rounded">
            <button onclick="bulkPromoteGrades()" class="text-[10px] bg-red-700 hover:bg-red-600 px-4 py-2 rounded font-black uppercase transition-all">
                ↑ Bulk Grade Increase
            </button>
            <button onclick="exportRoster()" class="text-[10px] bg-white text-black hover:bg-gray-200 px-4 py-2 rounded font-black uppercase transition-all">
                Download CSV
            </button>
        </div>

        <div class="flex justify-between items-end mb-4">
            <h2 class="text-sm font-black uppercase text-red-500">Active Roster</h2>
        </div>

        <div class="bg-black border border-gray-800 rounded overflow-x-auto">
            <table class="w-full text-left text-[11px] uppercase font-bold">
                <thead class="bg-gray-900 text-gray-500 border-b border-gray-800">
                    <tr>
                        <th class="p-4">Athlete</th>
                        <th class="p-4">Grade</th>
                        <th class="p-4">OFF / DEF</th> <th class="p-4">Bench</th>
                        <th class="p-4">Squat</th>
                        <th class="p-4">Clean</th>
                        <th class="p-4">Deadlift</th>
                        <th class="p-4">Push Press</th>
                        <th class="p-4">Nutrition</th> <th class="p-4">Manage</th>
                    </tr>
                </thead>
                <tbody id="roster-table-body" class="divide-y divide-gray-800">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="meal-modal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4">
        <div class="bg-[#0e0e0f] border border-gray-800 w-full max-w-2xl rounded-lg p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
                <h3 id="modal-player-name" class="text-lg font-black italic uppercase text-red-500">Meal Logs</h3>
                <button onclick="closeMealModal()" class="text-gray-500 hover:text-white text-xl">✕</button>
            </div>
            <div id="meal-logs-container" class="space-y-3 max-h-[60vh] overflow-y-auto pr-2">
                </div>
        </div>
    </div>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, deleteDoc} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Security & Data Loading
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            const userSnap = await getDoc(doc(db, "users", user.uid));
            const userData = userSnap.data();

            if (userData.role !== 'coach') {
                window.location.href = 'index.html'; // Boot non-coaches
                return;
            }

            document.getElementById('school-title').innerText = userData.school_id.replace('_', ' ');
            loadRoster(userData.school_id);
        });

        async function loadRoster(schoolId) {
            const rosterBody = document.getElementById('roster-table-body');
            const q = query(collection(db, "recruiting_profiles"), where("school_id", "==", schoolId), where("role", "==", "player"));
            const querySnapshot = await getDocs(q);

            rosterBody.innerHTML = '';
            querySnapshot.forEach((docSnap) => {
                const p = docSnap.data();
                const uid = docSnap.id;

                rosterBody.innerHTML += `
                    <tr class="hover:bg-gray-900/50 transition-all border-b border-gray-800">
                        <td class="p-4 text-white font-bold cursor-pointer hover:text-red-500" onclick="location.href='recruiting-card.html?uid=${uid}'">
                            ${p.firstName} ${p.lastName}
                        </td>
                        <td class="p-4 text-gray-400">${p.gradYear || '--'}</td>
                        <td class="p-4 text-xs">
                            <span class="text-blue-400">${p.primaryPos || '--'}</span> / 
                            <span class="text-red-400">${p.defPrimary || '--'}</span>
                        </td>
                        <td class="p-4">${p.bench || '--'}</td>
                        <td class="p-4">${p.squat || '--'}</td>
                        <td class="p-4">${p.clean || '--'}</td>
                        <td class="p-4">${p.deadlift || '--'}</td>
                        <td class="p-4">${p.push_press || '--'}</td>
                        <td class="p-4">
                            <button onclick="viewMeals('${uid}', '${p.firstName}')" class="text-[9px] bg-gray-800 px-2 py-1 rounded hover:bg-red-700">
                                VIEW LOGS
                            </button>
                        </td>
                        
                        <td class="p-4 flex gap-3">
                            <button onclick="location.href='recruiting-card.html?uid=${uid}&edit=true'" class="text-blue-500 hover:underline">EDIT</button>
                            <button onclick="deleteAthlete('${athlete.id}', '${athlete.name}')" class="text-red-500 hover:underline ml-2">DEL</button>
                        </td>
                    </tr>
                `;
            });
        }

        window.bulkPromoteGrades = async () => {
            if (!confirm("Are you sure? This will promote all athletes to the next grade level.")) return;
            
            const q = query(collection(db, "recruiting_profiles"), 
                    where("school_id", "==", currentSchoolId), 
                    where("role", "==", "player"));
            const snapshot = await getDocs(q);
            
            const batch = writeBatch(db); // Use a batch for efficiency
            snapshot.forEach((doc) => {
                const currentYear = parseInt(doc.data().gradYear);
                if (currentYear) {
                    batch.update(doc.ref, { gradYear: (currentYear + 1).toString() });
                }
            });
            await batch.commit();
            alert("Roster promoted successfully!");
            location.reload();
        };

        window.deleteAthlete = async (athleteId, athleteName) => {
            const confirmed = confirm(`Are you sure you want to PERMANENTLY delete ${athleteName}? This cannot be undone.`);
            
            if (confirmed) {
                try {
                    // 1. Delete from the main profiles collection
                    await deleteDoc(doc(db, "recruiting_profiles", athleteId));
                    
                    // 2. Optional: Delete their user account reference if you have one
                    await deleteDoc(doc(db, "users", athleteId));

                    alert(`${athleteName} has been removed from the roster.`);
                    location.reload(); // Refresh the table
                } catch (error) {
                    console.error("Error deleting athlete:", error);
                    alert("Delete failed. Check your Firestore Rules.");
                }
            }
        };
        
        // Open the Meal Modal and fetch data
        window.viewMeals = async (uid, name) => {
            document.getElementById('modal-player-name').innerText = `${name}'S MEAL HISTORY`;
            const container = document.getElementById('meal-logs-container');
            container.innerHTML = '<p class="text-center py-4 text-gray-600">Loading...</p>';
            document.getElementById('meal-modal').classList.remove('hidden');

            const mealSnap = await getDocs(collection(db, "recruiting_profiles", uid, "meals"));
            container.innerHTML = '';
            
            if (mealSnap.empty) {
                container.innerHTML = '<p class="text-center py-4">No meals recorded.</p>';
                return;
            }

            mealSnap.forEach(mDoc => {
                const m = mDoc.data();
                container.innerHTML += `
                    <div class="bg-black p-3 border border-gray-800 rounded flex justify-between items-center text-[10px]">
                        <div>
                            <div class="text-white font-bold uppercase">${m.mealName || 'Meal'}</div>
                            <div class="text-gray-500">${m.date || ''}</div>
                        </div>
                        <div class="text-right">
                            <span class="text-red-500">${m.calories} CAL</span><br>
                            <span class="text-blue-400">${m.protein}G PROTEIN</span>
                        </div>
                    </div>
                `;
            });
        };

        window.closeMealModal = () => {
            document.getElementById('meal-modal').classList.add('hidden');
        };

        // Ensure currentSchoolId is accessible for the bulk function
        let currentSchoolId = ""; 
        // Inside your onAuthStateChanged, add: currentSchoolId = userData.school_id;

        window.handleLogout = () => signOut(auth).then(() => window.location.href = 'index.html');
    </script>
</body>
</html>
