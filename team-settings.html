<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Settings | RACKSTAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0d1117] text-white font-sans antialiased pb-24">

    <header class="p-6 flex justify-between items-center border-b border-gray-800">
        <div class="flex items-center gap-4">
            <a href="coach-lobby.html" class="text-gray-400 hover:text-white transition">← Back to Office</a>
            <h1 id="program-title" class="text-xl font-black italic uppercase tracking-tighter text-red-500">Program Settings</h1>
        </div>
        <div class="flex gap-3">
            <span id="player-count" class="bg-gray-800 px-3 py-2 rounded text-xs font-bold self-center uppercase">0 Athletes</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12">
        
        <section class="bg-gray-900 border border-gray-700 p-8 rounded-xl mb-10 shadow-2xl">
            <h2 class="text-2xl font-black text-white uppercase mb-2 italic">Program Branding & Logic</h2>
            <p class="text-gray-400 text-sm mb-8">Customize the board's appearance and the algorithm used for rankings.</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Primary Color (Theme)</label>
                    <input type="color" id="primary-color" class="w-full h-12 bg-gray-800 border border-gray-700 rounded cursor-pointer">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Secondary Color (Accents)</label>
                    <input type="color" id="secondary-color" class="w-full h-12 bg-gray-800 border border-gray-700 rounded cursor-pointer">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">School Logo URL</label>
                    <input type="text" id="logo-url" placeholder="https://..." class="w-full p-3 rounded-lg bg-[#0d1117] text-white border border-gray-700 focus:border-red-500 outline-none transition">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Ranking Formula</label>
                    <select id="formula-type" class="w-full p-3 rounded-lg bg-[#0d1117] text-white border border-gray-700 outline-none">
                        <option value="straight_calculation">Straight Total (Core Lifts)</option>
                        <option value="power_index">Power Index</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Weight Club Threshold (Min LB)</label>
                    <input type="number" id="club-start" placeholder="50" class="w-full p-3 rounded-lg bg-[#0d1117] text-white border border-gray-700 outline-none">
                </div>
            </div>
        </section>

        <section class="mb-10">
            <div class="flex justify-between items-center bg-gray-900 border border-gray-700 p-6 rounded-xl">
                <div>
                    <h3 class="text-white font-black italic uppercase text-lg">Recruiting Feature</h3>
                    <p class="text-gray-500 text-sm uppercase tracking-wider">Enable or Disable the Recruiting-Card for all athletes</p>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="toggle-recruiting" class="sr-only peer">
                    <div class="w-14 h-7 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-red-600"></div>
                </label>
            </div>
        </section>

        <section class="bg-gray-900 border border-gray-700 p-8 rounded-xl mb-10">
            <h2 class="text-2xl font-black text-white uppercase mb-2 italic">Tracked Core Lifts</h2>
            <p class="text-gray-400 text-sm mb-8">Select which lifts appear in athlete trackers.</p>
            
            <div id="core-lifts-container" class="grid grid-cols-2 md:grid-cols-3 gap-6 text-gray-300 mb-8 font-bold uppercase text-sm">
                <label class="flex items-center space-x-3 cursor-pointer group">
                    <input type="checkbox" value="bench" class="lift-checkbox w-6 h-6 rounded bg-gray-800 border-gray-600 text-red-600 focus:ring-red-600 transition">
                    <span class="group-hover:text-white">Bench</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer group">
                    <input type="checkbox" value="squat" class="lift-checkbox w-6 h-6 rounded bg-gray-800 border-gray-600 text-red-600 focus:ring-red-600 transition">
                    <span class="group-hover:text-white">Squat</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer group">
                    <input type="checkbox" value="clean" class="lift-checkbox w-6 h-6 rounded bg-gray-800 border-gray-600 text-red-600 focus:ring-red-600 transition">
                    <span class="group-hover:text-white">Clean</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer group">
                    <input type="checkbox" value="deadlift" class="lift-checkbox w-6 h-6 rounded bg-gray-800 border-gray-600 text-red-600 focus:ring-red-600 transition">
                    <span class="group-hover:text-white">Deadlift</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer group">
                    <input type="checkbox" value="push_press" class="lift-checkbox w-6 h-6 rounded bg-gray-800 border-gray-600 text-red-600 focus:ring-red-600 transition">
                    <span class="group-hover:text-white">Push Press</span>
                </label>
            </div>

            <div class="flex gap-3 pt-8 border-t border-gray-800">
                <input type="text" id="custom-lift-input" placeholder="e.g. Incline Bench" 
                    class="flex-1 p-3 rounded-lg bg-[#0d1117] text-white border border-gray-700 focus:border-red-500 outline-none transition">
                <button onclick="addCustomLiftToUI()" class="bg-gray-700 hover:bg-red-600 text-white px-8 font-black rounded-lg transition-all uppercase text-xs">
                    Add Lift
                </button>
            </div>
        </section>

        <div class="fixed bottom-0 left-0 right-0 p-6 bg-[#0d1117]/90 backdrop-blur-md border-t border-gray-800 flex justify-center z-50">
            <button onclick="saveAllSettings()" id="master-save-btn" class="bg-red-600 hover:bg-red-700 text-white px-16 py-4 rounded-full font-black uppercase tracking-widest transition-all shadow-lg hover:scale-105 active:scale-95">
                Save All Changes
            </button>
        </div>

    </main>

    <script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, getDoc, updateDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let schoolId = null;

    // Turns "Incline Bench" into "incline_bench"
    const slugify = (text) => text.toLowerCase().replace(/\s+/g, '_').replace(/[^\w-]+/g, '');

    // Returns school ID regardless of legacy underscore/camelCase naming
    const getSchoolIdFromData = (data = {}) => data.schoolId || data.school_id || "";

    // Loads authenticated coach context before allowing access to settings
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }

        try {
            const userDoc = await getDoc(doc(db, "users", user.uid));

            if (!userDoc.exists() || userDoc.data().role !== 'coach') {
                window.location.href = 'index.html';
                return;
            }

            schoolId = getSchoolIdFromData(userDoc.data());

            if (!schoolId) {
                alert("Coach profile is missing a school ID.");
                window.location.href = 'index.html';
                return;
            }

            await loadSettings();
            await fetchPlayerCount();
        } catch (err) {
            console.error("Error loading team settings auth context:", err);
            window.location.href = 'index.html';
        }
    });

    // Loads the current school configuration into the settings form
    async function loadSettings() {
        if (!schoolId) return;

        try {
            const schoolRef = doc(db, "schools", schoolId);
            const snap = await getDoc(schoolRef);
            
            if (!snap.exists()) return;

            const data = snap.data();
            const trackedLifts = data.trackedLifts || data.activeLifts || ["bench", "squat", "clean"];
            const customLifts = data.customLifts || [];
            const recruitingEnabled = data.hasRecruitingCard !== undefined
                ? data.hasRecruitingCard
                : (data.recruitingEnabled !== false);

            document.getElementById('program-title').innerText = `${data.name || 'Program'} Settings`;
            document.getElementById('primary-color').value = data.colors?.primary || data.primaryColor || '#ff0000';
            document.getElementById('secondary-color').value = data.colors?.secondary || '#000000';
            document.getElementById('logo-url').value = data.logo_url || data.logo_primary || data.logo || '';
            document.getElementById('formula-type').value = data.formula_type || 'power_index';
            document.getElementById('club-start').value = data.club_start || 50;
            document.getElementById('toggle-recruiting').checked = recruitingEnabled;

            // Check standard lifts
            document.querySelectorAll('.lift-checkbox').forEach(cb => {
                cb.checked = trackedLifts.includes(cb.value);
            });

            // Render custom lifts
            customLifts.forEach(liftObj => {
                const liftId = typeof liftObj === 'string' ? slugify(liftObj) : liftObj.id;
                const liftName = typeof liftObj === 'string' ? liftObj : liftObj.name;
                renderNewLiftCheckbox(liftName, liftId, trackedLifts.includes(liftId));
            });
        } catch (err) {
            console.error("Error loading settings:", err);
        }
    }

    // Loads athlete count for the current coach's school
    async function fetchPlayerCount() {
        if (!schoolId) return;

        const badge = document.getElementById('player-count');
        if (!badge) return;

        try {
            let snap = await getDocs(query(
                collection(db, "users"),
                where("schoolId", "==", schoolId),
                where("role", "==", "player")
            ));

            // Legacy fallback for older user docs
            if (snap.empty) {
                snap = await getDocs(query(
                    collection(db, "users"),
                    where("school_id", "==", schoolId),
                    where("role", "==", "player")
                ));
            }

            const count = snap.size;
            badge.innerText = `${count} Athlete${count === 1 ? '' : 's'}`;
        } catch (err) {
            console.error("Error fetching athlete count:", err);
            badge.innerText = "0 Athletes";
        }
    }

    // Adds a custom lift to the UI in checked state by default
    window.addCustomLiftToUI = () => {
        const input = document.getElementById('custom-lift-input');
        const liftName = input.value.trim();
        if (!liftName) return;

        const liftId = slugify(liftName);
        renderNewLiftCheckbox(liftName, liftId, true);
        input.value = "";
    };

    // Renders a custom lift checkbox row if it does not already exist
    function renderNewLiftCheckbox(name, id, checked) {
        const container = document.getElementById('core-lifts-container');
        const existing = Array.from(container.querySelectorAll('.lift-checkbox')).find(cb => cb.value === id);
        if (existing) return;

        const label = document.createElement('label');
        label.className = "flex items-center space-x-3 cursor-pointer group";
        label.innerHTML = `
            <input type="checkbox" value="${id}" data-name="${name}" class="lift-checkbox w-6 h-6 rounded bg-gray-800 border-gray-600 text-red-600 focus:ring-red-600 transition" ${checked ? 'checked' : ''}>
            <span class="group-hover:text-white text-yellow-500">${name}</span>
        `;
        container.appendChild(label);
    }

    // Saves all branding, ranking, recruiting, and tracked-lift settings to the school document
    window.saveAllSettings = async () => {
        if (!schoolId) return;

        const btn = document.getElementById('master-save-btn');
        btn.innerText = "SAVING CHANGES...";
        btn.disabled = true;

        const trackedLifts = [];
        const customLifts = [];
        const standardIds = ["bench", "squat", "clean", "deadlift", "push_press"];

        document.querySelectorAll('.lift-checkbox').forEach(cb => {
            const id = cb.value;
            const name = cb.getAttribute('data-name') || cb.nextElementSibling.innerText;

            if (cb.checked) trackedLifts.push(id);

            if (!standardIds.includes(id)) {
                customLifts.push({ id, name });
            }
        });

        try {
            const logoUrl = document.getElementById('logo-url').value.trim();

            await updateDoc(doc(db, "schools", schoolId), {
                "colors.primary": document.getElementById('primary-color').value,
                "colors.secondary": document.getElementById('secondary-color').value,
                logo_url: logoUrl,
                formula_type: document.getElementById('formula-type').value,
                club_start: parseInt(document.getElementById('club-start').value, 10) || 50,
                hasRecruitingCard: document.getElementById('toggle-recruiting').checked,
                recruitingEnabled: document.getElementById('toggle-recruiting').checked,
                trackedLifts,
                activeLifts: trackedLifts,
                customLifts,
                lastUpdated: new Date()
            });

            alert("Settings Saved! All athlete pages will now sync to these IDs.");
        } catch (err) {
            alert("Save Error: Check console.");
            console.error(err);
        } finally {
            btn.innerText = "Save All Changes";
            btn.disabled = false;
        }
    };
    </script>
</body>
</html>
