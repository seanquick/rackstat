<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Center | Coach Lobby</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans antialiased min-h-screen pb-20">

    <header class="p-6 flex justify-between items-center border-b border-gray-800">
        <div class="flex items-center gap-4">
            <a href="coach-lobby.html" class="text-gray-400 hover:text-white transition flex items-center gap-2 font-bold uppercase text-xs">
                ← Back to Office
            </a>
            <h1 class="text-xl font-black italic uppercase tracking-tighter text-red-500">Training Center</h1>
        </div>
        <button onclick="saveWorkout()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg font-black text-sm transition shadow-lg uppercase">
            Save Workout
        </button>
    </header>

    <main class="max-w-4xl mx-auto p-6 space-y-6">
        <div class="bg-gray-900 p-6 rounded-xl border border-gray-800 flex flex-wrap gap-6 items-end">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Date</label>
                <input type="date" id="workout-date" class="w-full bg-black border border-gray-700 rounded px-4 py-2 text-white focus:outline-none focus:border-red-500">
            </div>
            <div class="flex-[2] min-w-[200px]">
                <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Workout Name</label>
                <input type="text" id="workout-name" placeholder="e.g., Upper Body Power" class="w-full bg-black border border-gray-700 rounded px-4 py-2 text-white focus:outline-none focus:border-red-500">
            </div>
            <div class="flex items-center gap-3 bg-gray-800 px-4 py-2 rounded border border-gray-700 cursor-pointer" onclick="toggleMaxOut()">
                <div class="text-sm font-bold uppercase">Max Out Mode</div>
                <div id="max-out-indicator" class="w-10 h-5 bg-black rounded-full relative transition-colors">
                    <div id="max-out-knob" class="w-4 h-4 bg-gray-500 rounded-full absolute top-0.5 left-0.5 transition-transform"></div>
                </div>
            </div>
        </div>

        <div id="exercises-container" class="space-y-4">
            </div>

        <button id="add-exercise-btn" onclick="addExerciseBlock()" class="w-full py-4 border-2 border-dashed border-gray-800 text-gray-500 font-bold uppercase rounded-xl hover:border-gray-600 hover:text-white transition">
            + Add Exercise Block
        </button>
    </main>

    <section class="max-w-4xl mx-auto p-6 mt-12 border-t border-gray-800">
        <h2 class="text-xl font-black italic uppercase tracking-tighter text-gray-500 mb-6">Workout History</h2>
        <div id="history-container" class="space-y-3">
            <p class="text-gray-600 italic text-sm">Loading history...</p>
        </div>
    </section>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, setDoc, deleteDoc, getDoc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let coreLifts = ["Bench Press", "Squat", "Power Clean", "Deadlift", "Push Press"]; // Default fallback
        let supplementLibrary = []; 
        let exercises = [];
        let isMaxOutMode = false;
        let userSchoolId = null;
        let editingWorkoutId = null; // Tracks if we are updating an existing workout

        async function fetchTeamSettings(schoolId) {
            try {
                const settingsRef = doc(db, "school_settings", schoolId);
                const settingsSnap = await getDoc(settingsRef);
                
                if (settingsSnap.exists()) {
                    const data = settingsSnap.data();
                    // If the coach has defined custom core lifts, use them
                    if (data.trackedCoreLifts && data.trackedCoreLifts.length > 0) {
                        coreLifts = data.trackedCoreLifts;
                        console.log("Team Core Lifts loaded:", coreLifts);
                    }
                }
            } catch (err) {
                console.error("Error fetching team settings:", err);
            }
        }

        async function fetchSupplements() {
            try {
                const snap = await getDocs(collection(db, "supplement_library"));
                snap.forEach(doc => supplementLibrary.push(doc.data().name));
            } catch (err) { console.error("Error fetching library", err); }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // 1. Get the user's school_id from their profile
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    userSchoolId = userDoc.data().school_id;
                    
                    // 2. Fetch the custom Core Lifts for that school
                    if (userSchoolId) {
                        await fetchTeamSettings(userSchoolId);
                    }
                }

                // 3. Load the rest of the app
                await fetchSupplements();
                await loadHistory();
                
                // Only add the first block once settings are loaded
                if (exercises.length === 0) {
                    addExerciseBlock(); 
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        // --- STATE MANAGERS ---
        window.toggleMaxOut = () => {
            isMaxOutMode = !isMaxOutMode;
            const bg = document.getElementById('max-out-indicator');
            const knob = document.getElementById('max-out-knob');
            const addBtn = document.getElementById('add-exercise-btn');
            
            if (isMaxOutMode) {
                bg.classList.add('bg-red-600');
                knob.classList.add('translate-x-5', 'bg-white');
                addBtn.style.display = 'none';
                
                exercises = coreLifts.map(lift => ({
                    id: Date.now() + Math.random(),
                    category: 'core',
                    name: lift,
                    isMaxOut: true,
                    sets: [{ reps: 5, pct: 50 }, { reps: 3, pct: 70 }, { reps: 1, pct: 85 }, { reps: 1, pct: 100 }, { reps: 1, pct: 105 }, { reps: 1, pct: 110 }]
                }));
            } else {
                bg.classList.remove('bg-red-600');
                knob.classList.remove('translate-x-5', 'bg-white');
                addBtn.style.display = 'block';
                exercises = [];
                addExerciseBlock();
            }
            renderExercises();
        };

        window.addExerciseBlock = () => {
            exercises.push({
                id: Date.now(),
                category: 'core',
                name: coreLifts[0],
                isCircuit: false,
                circuitExercises: [''], // Array for multiple exercises in a circuit
                circuitConfig: { cycles: 3, work: 40, rest: 20 }, // Global rules for the circuit
                sets: [{ reps: '', pct: '' }]
            });
            renderExercises();
        };

        window.updateExercise = (id, field, value) => {
            const ex = exercises.find(e => e.id === id);
            if (ex) {
                ex[field] = value;
                if (field === 'category') {
                    ex.isCircuit = false;
                    ex.name = value === 'core' ? coreLifts[0] : '';
                    ex.sets = [{ reps: '', pct: '' }];
                }
                renderExercises();
            }
        };

        // --- CIRCUIT SPECIFIC LOGIC ---
        window.toggleCircuit = (id) => {
            const ex = exercises.find(e => e.id === id);
            if (ex) {
                ex.isCircuit = !ex.isCircuit;
                // Ensure arrays are reset when toggled
                if (ex.isCircuit && ex.circuitExercises.length === 0) {
                    ex.circuitExercises = [ex.name || '']; 
                }
                renderExercises();
            }
        };

        window.addCircuitExercise = (blockId) => {
            const ex = exercises.find(e => e.id === blockId);
            if (ex) {
                ex.circuitExercises.push('');
                renderExercises();
            }
        };

        window.updateCircuitExercise = (blockId, exIndex, value) => {
            const ex = exercises.find(e => e.id === blockId);
            if (ex) {
                ex.circuitExercises[exIndex] = value;
            }
        };

        window.removeCircuitExercise = (blockId, exIndex) => {
            const ex = exercises.find(e => e.id === blockId);
            if (ex) {
                ex.circuitExercises.splice(exIndex, 1);
                renderExercises();
            }
        };

        window.updateCircuitConfig = (blockId, field, value) => {
            const ex = exercises.find(e => e.id === blockId);
            if (ex) {
                ex.circuitConfig[field] = value;
            }
        };

        // --- SET SPECIFIC LOGIC ---
        window.addSet = (id) => {
            const ex = exercises.find(e => e.id === id);
            if (ex) {
                if (ex.category === 'supplement') ex.sets.push({ reps: '' });
                else ex.sets.push({ reps: '', pct: '' });
                renderExercises();
            }
        };
        
        window.updateSet = (exId, setIndex, field, value) => {
            const ex = exercises.find(e => e.id === exId);
            if (ex && ex.sets[setIndex]) {
                ex.sets[setIndex][field] = value;
            }
        };

        window.removeExercise = (id) => {
            exercises = exercises.filter(e => e.id !== id);
            renderExercises();
        };

        window.removeSet = (exId, setIndex) => {
            const ex = exercises.find(e => e.id === exId);
            if (ex) {
                ex.sets.splice(setIndex, 1); // Removes that specific set from the array
                renderExercises(); // Refreshes the display
            }
        };

        // --- RENDER FUNCTION ---
        function renderExercises() {
            const container = document.getElementById('exercises-container');
            container.innerHTML = '';

            exercises.forEach((ex, index) => {
                const isCore = ex.category === 'core';
                
                let innerHtml = `
                    <div class="bg-gray-900 border ${ex.isMaxOut ? 'border-red-600' : 'border-gray-800'} rounded-xl p-4">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex gap-4 items-center w-full">
                                <span class="text-gray-600 font-black text-xl">0${index + 1}</span>
                `;

                if (ex.isMaxOut) {
                    innerHtml += `<h2 class="text-xl font-black uppercase text-red-500">${ex.name} (MAX OUT)</h2></div></div>`;
                    innerHtml += `<div class="text-xs text-gray-400">3 Warm Up Sets, 3 Max Attempts auto-generated.</div></div>`;
                    container.insertAdjacentHTML('beforeend', innerHtml);
                    return; 
                } 
                
                // TYPE SELECTOR
                innerHtml += `
                    <select onchange="updateExercise(${ex.id}, 'category', this.value)" class="bg-black border border-gray-700 text-xs font-bold uppercase rounded p-2 text-white">
                        <option value="core" ${isCore ? 'selected' : ''}>Core</option>
                        <option value="supplement" ${!isCore ? 'selected' : ''}>Supplement</option>
                    </select>
                `;

                // CIRCUIT TOGGLE (Supplement Only)
                if (!isCore) {
                    innerHtml += `
                        <div class="flex items-center gap-2 ml-4">
                            <input type="checkbox" id="circ-${ex.id}" ${ex.isCircuit ? 'checked' : ''} onchange="toggleCircuit(${ex.id})">
                            <label for="circ-${ex.id}" class="text-xs font-bold text-gray-500 uppercase cursor-pointer">Circuit</label>
                        </div>
                    `;
                }

                // EXERCISE NAME INPUT(S)
                if (isCore) {
                    const options = coreLifts.map(l => `<option value="${l}" ${ex.name === l ? 'selected' : ''}>${l}</option>`).join('');
                    innerHtml += `<select onchange="updateExercise(${ex.id}, 'name', this.value)" class="flex-1 bg-black border border-gray-700 rounded p-2 text-white font-bold uppercase">${options}</select></div>`;
                } else if (!ex.isCircuit) {
                    const datalistId = `list-${ex.id}`;
                    const dlOptions = supplementLibrary.map(s => `<option value="${s}">`).join('');
                    innerHtml += `
                        <input type="text" list="${datalistId}" value="${ex.name}" onchange="updateExercise(${ex.id}, 'name', this.value)" placeholder="Enter Exercise Name" class="flex-1 bg-black border border-gray-700 rounded p-2 text-white font-bold uppercase">
                        <datalist id="${datalistId}">${dlOptions}</datalist>
                    </div>`;
                } else {
                    innerHtml += `<span class="flex-1 font-bold text-gray-400 uppercase italic">Circuit Builder</span></div>`;
                }

                // Close Top Bar, Add Delete Block Button
                innerHtml += `<button onclick="removeExercise(${ex.id})" class="text-gray-600 hover:text-red-500 transition">✕</button></div>`;

                // --- BUILDER AREA ---
                if (ex.isCircuit && !isCore) {
                    // CIRCUIT BUILDER UI
                    innerHtml += `<div class="bg-black border border-gray-800 p-4 rounded mb-4 space-y-3">
                        <label class="text-xs font-bold text-gray-500 uppercase">Circuit Exercises</label>`;
                    
                    ex.circuitExercises.forEach((cEx, cIdx) => {
                        const dlId = `circ-list-${ex.id}-${cIdx}`;
                        const dlOptions = supplementLibrary.map(s => `<option value="${s}">`).join('');
                        innerHtml += `
                            <div class="flex gap-2 items-center">
                                <span class="text-gray-600 text-xs font-bold">${cIdx + 1}.</span>
                                <input type="text" list="${dlId}" value="${cEx}" onchange="updateCircuitExercise(${ex.id}, ${cIdx}, this.value)" placeholder="Exercise ${cIdx + 1}" class="flex-1 bg-gray-900 border border-gray-700 rounded p-2 text-white text-sm font-bold uppercase">
                                <datalist id="${dlId}">${dlOptions}</datalist>
                                ${cIdx > 0 ? `<button onclick="removeCircuitExercise(${ex.id}, ${cIdx})" class="text-red-500 hover:text-red-400 font-bold px-2">✕</button>` : `<div class="w-6"></div>`}
                            </div>
                        `;
                    });

                    innerHtml += `<button onclick="addCircuitExercise(${ex.id})" class="text-xs font-bold text-red-500 hover:text-red-400 uppercase mt-2">+ Add Exercise to Circuit</button></div>`;

                    // CIRCUIT TIMERS
                    innerHtml += `
                        <div class="flex gap-4 items-center bg-gray-800 p-3 rounded border border-gray-700">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Total Cycles</label>
                                <input type="number" value="${ex.circuitConfig.cycles}" onchange="updateCircuitConfig(${ex.id}, 'cycles', this.value)" class="w-16 bg-black border border-gray-600 rounded px-2 py-1 text-sm text-center">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Work (sec)</label>
                                <input type="number" value="${ex.circuitConfig.work}" onchange="updateCircuitConfig(${ex.id}, 'work', this.value)" class="w-16 bg-black border border-gray-600 rounded px-2 py-1 text-sm text-center">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Rest (sec)</label>
                                <input type="number" value="${ex.circuitConfig.rest}" onchange="updateCircuitConfig(${ex.id}, 'rest', this.value)" class="w-16 bg-black border border-gray-600 rounded px-2 py-1 text-sm text-center">
                            </div>
                        </div>
                    `;
                } else {
                    // STANDARD SETS BUILDER WITH DELETE SET OPTION
                    innerHtml += `<div class="space-y-2 mb-4">`;
                    ex.sets.forEach((set, sIndex) => {
                        innerHtml += `<div class="flex gap-2 items-center">
                            <span class="text-xs font-bold text-gray-500 w-12 uppercase">Set ${sIndex + 1}</span>`;
                        
                        innerHtml += `<input type="number" placeholder="Reps" value="${set.reps || ''}" onchange="updateSet(${ex.id}, ${sIndex}, 'reps', this.value)" class="w-20 bg-black border border-gray-700 rounded px-2 py-1 text-sm text-center">`;
                        
                        if (isCore) {
                            innerHtml += `<input type="number" placeholder="% Max" value="${set.pct || ''}" onchange="updateSet(${ex.id}, ${sIndex}, 'pct', this.value)" class="w-20 bg-black border border-gray-700 rounded px-2 py-1 text-sm text-center">`;
                        }

                        // INDIVIDUAL SET DELETE BUTTON
                        innerHtml += `<button onclick="removeSet(${ex.id}, ${sIndex})" class="text-red-500 hover:text-red-400 font-bold px-2 transition" title="Remove Set">✕</button>`;
                        
                        innerHtml += `</div>`;
                    });

                    innerHtml += `</div>
                    <button onclick="addSet(${ex.id})" class="text-xs font-bold bg-gray-800 text-gray-300 px-3 py-1 rounded hover:bg-gray-700 transition uppercase">+ Add Set</button>`;
                }
                
                innerHtml += `</div>`;
                container.insertAdjacentHTML('beforeend', innerHtml);
            });
        }

        // --- SAVE TO DATABASE ---
        window.saveWorkout = async () => {
            const date = document.getElementById('workout-date').value;
            const name = document.getElementById('workout-name').value;

            if (!date || !name) return alert("Please provide a Date and Workout Name.");

            try {
                // 1. Save new supplement names to library
                for (const ex of exercises) {
                    if (ex.category === 'supplement') {
                        const namesToSave = ex.isCircuit ? ex.circuitExercises : [ex.name];
                        for (const n of namesToSave) {
                            if (n && n.trim() !== '' && !supplementLibrary.includes(n)) {
                                supplementLibrary.push(n);
                                await setDoc(doc(db, "supplement_library", n.toLowerCase().replace(/\s/g, '')), { name: n });
                            }
                        }
                    }
                }

                const workoutData = {
                    date: date,
                    name: name,
                    school_id: userSchoolId,
                    isMaxOutMode: isMaxOutMode,
                    exercises: exercises,
                    updatedAt: new Date()
                };

                if (editingWorkoutId) {
                    // UPDATE EXISTING
                    await updateDoc(doc(db, "workouts", editingWorkoutId), workoutData);
                    alert("Workout Updated Successfully!");
                } else {
                    // SAVE NEW
                    workoutData.createdAt = new Date();
                    await addDoc(collection(db, "workouts"), workoutData);
                    alert("Workout Saved Successfully!");
                }

                // Reset state and refresh history
                editingWorkoutId = null;
                window.location.reload();

            } catch (err) {
                console.error(err);
                alert("Error saving workout.");
            }
        };

        // --- HISTORY & MANAGEMENT LOGIC ---

        // Fetch and display all workouts
        async function loadHistory() {
            const container = document.getElementById('history-container');
            if (!userSchoolId) return;

            try {
                // Only get workouts for THIS school
                const q = query(collection(db, "workouts"), where("school_id", "==", userSchoolId));
                const snap = await getDocs(q);
                
                container.innerHTML = '';
                
                if (snap.empty) {
                    container.innerHTML = '<p class="text-gray-600 text-sm">No saved workouts found for your team.</p>';
                    return;
                }

                const docs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                                .sort((a, b) => new Date(b.date) - new Date(a.date));

                docs.forEach(workout => {
                    const item = document.createElement('div');
                    item.className = "bg-gray-900 p-4 rounded-lg border border-gray-800 flex justify-between items-center group";
                    item.innerHTML = `
                        <div>
                            <span class="text-red-500 font-bold text-xs uppercase">${workout.date}</span>
                            <h3 class="font-black uppercase text-white">${workout.name}</h3>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="duplicateWorkout('${workout.id}')" class="bg-gray-800 hover:bg-blue-600 text-white text-[10px] font-bold px-3 py-1 rounded uppercase transition">Duplicate</button>
                            <button onclick="editWorkout('${workout.id}')" class="bg-gray-800 hover:bg-green-600 text-white text-[10px] font-bold px-3 py-1 rounded uppercase transition">Edit</button>
                            <button onclick="deleteWorkout('${workout.id}')" class="bg-gray-800 hover:bg-red-600 text-white text-[10px] font-bold px-3 py-1 rounded uppercase transition">Delete</button>
                        </div>
                    `;
                    container.appendChild(item);
                });
            } catch (err) {
                console.error("Error loading history:", err);
            }
        }

        // Delete a workout
        window.deleteWorkout = async (id) => {
            if (confirm("Are you sure you want to delete this workout?")) {
                try {
                    await deleteDoc(doc(db, "workouts", id));
                    loadHistory();
                } catch (err) { alert("Error deleting workout"); }
            }
        };

        // Load workout back into the builder to Edit
        window.editWorkout = async (id) => {
            const snap = await getDoc(doc(db, "workouts", id));
            if (snap.exists()) {
                const data = snap.data();
                editingWorkoutId = id; // IMPORTANT: Set this so Save knows to update
                
                document.getElementById('workout-date').value = data.date;
                document.getElementById('workout-name').value = data.name;
                
                // ... rest of your existing logic to load exercises and max out mode ...
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
                // Change button text to give UI feedback
                document.querySelector('button[onclick="saveWorkout()"]').innerText = "Update Workout";
            }
        };

        window.duplicateWorkout = async (id) => {
            const snap = await getDoc(doc(db, "workouts", id));
            if (snap.exists()) {
                const data = snap.data();
                editingWorkoutId = null; // IMPORTANT: Clear this so it saves as NEW
                
                exercises = data.exercises;
                document.getElementById('workout-date').value = '';
                document.getElementById('workout-name').value = `${data.name} (Copy)`;
                
                renderExercises();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        // Duplicate logic: Loads data but clears date/name for fresh input
        window.duplicateWorkout = async (id) => {
            const snap = await getDoc(doc(db, "workouts", id));
            if (snap.exists()) {
                const data = snap.data();
                exercises = data.exercises;
                
                // Clear inputs so coach is forced to set new ones
                document.getElementById('workout-date').value = '';
                document.getElementById('workout-name').value = `${data.name} (Copy)`;
                
                renderExercises();
                window.scrollTo({ top: 0, behavior: 'smooth' });
                alert("Workout copied! Please set a NEW DATE and NAME before saving.");
            }
        };

        // Initial load
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await fetchSupplements();
                await loadHistory(); // Load history on login
                addExerciseBlock(); 
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
