<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Center | RACKSTAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        select option {
            background-color: #111827;
            color: white;
        }

        .remove-btn {
            color: rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease;
            opacity: 1 !important;
        }

        .remove-btn:hover {
            color: #ef4444 !important;
            transform: scale(1.2);
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            filter: invert(1);
        }
    </style>
</head>
<body class="bg-[#0d1117] text-white font-sans antialiased min-h-screen pb-20">

    <header class="p-6 flex justify-between items-center border-b border-gray-800 bg-[#0d1117]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <a href="coach-lobby.html" class="group flex items-center gap-2 text-xs font-black tracking-widest uppercase text-gray-500 hover:text-white transition-all">
                <span class="group-hover:-translate-x-1 transition-transform">←</span> Office
            </a>
            <h1 class="text-2xl font-black italic uppercase tracking-tighter text-red-600">Training <span class="text-white">Center</span></h1>
        </div>
        <button id="save-workout-btn" onclick="saveWorkout()" class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-md font-black text-xs transition shadow-lg uppercase tracking-widest italic">
            Save Workout
        </button>
    </header>

    <main class="max-w-4xl mx-auto p-6 space-y-6">
        <div class="bg-gray-900/50 p-6 rounded-2xl border border-gray-800 flex flex-wrap gap-6 items-end shadow-2xl">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-[10px] font-black text-gray-500 mb-2 uppercase tracking-widest">Training Date</label>
                <input type="date" id="workout-date" class="w-full bg-black border border-gray-700 rounded-lg px-4 py-3 text-white font-bold focus:outline-none focus:border-red-600 transition-colors">
            </div>
            <div class="flex-[2] min-w-[200px]">
                <label class="block text-[10px] font-black text-gray-500 mb-2 uppercase tracking-widest">Workout Name</label>
                <input type="text" id="workout-name" placeholder="e.g., UPPER BODY POWER" class="w-full bg-black border border-gray-700 rounded-lg px-4 py-3 text-white font-bold focus:outline-none focus:border-red-600 transition-colors placeholder:text-gray-700">
            </div>
            <div class="flex items-center gap-4 bg-gray-800/50 px-5 py-3 rounded-lg border border-gray-700 cursor-pointer hover:bg-gray-800 transition-all" onclick="toggleMaxOut()">
                <div class="text-[10px] font-black uppercase tracking-widest">Max Out Mode</div>
                <div id="max-out-indicator" class="w-12 h-6 bg-gray-700 rounded-full relative transition-colors">
                    <div id="max-out-knob" class="w-4 h-4 bg-white rounded-full absolute top-1 left-1 transition-transform"></div>
                </div>
            </div>
        </div>

        <div id="exercises-container" class="space-y-4"></div>

        <button id="add-exercise-btn" onclick="addExerciseBlock()" class="w-full py-6 border-2 border-dashed border-gray-800 text-gray-600 font-black uppercase text-xs tracking-[0.3em] rounded-2xl hover:border-red-600/50 hover:text-white hover:bg-red-600/5 transition-all">
            + Add Exercise Block
        </button>

        <section class="mt-20 pt-12 border-t border-gray-800">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-xl font-black italic uppercase tracking-tighter text-gray-400">Workout Archive</h2>
                    <p class="text-xs text-gray-600 font-bold uppercase tracking-widest">Manage previous training sessions</p>
                </div>
                <div class="relative w-64">
                    <input type="text" id="history-search" onkeyup="filterHistory()" placeholder="SEARCH ARCHIVE..."
                        class="w-full bg-gray-900 border border-gray-800 rounded-lg px-4 py-2 text-[10px] font-black text-white focus:outline-none focus:border-red-600 transition-all">
                </div>
            </div>

            <div id="history-container" class="grid gap-3">
                <p class="text-gray-700 italic text-sm font-bold uppercase tracking-widest">Initializing database...</p>
            </div>
        </section>
    </main>

    <script type="module">
        import { db, auth } from './js/firebase-config.js';
        import {
            collection,
            addDoc,
            getDocs,
            doc,
            deleteDoc,
            getDoc,
            updateDoc,
            query,
            where,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { applyTheme } from './js/theme.js';

        let coreLifts = ["bench", "squat", "clean"];
        let supplementLibrary = [];
        let exercises = [];
        let isMaxOutMode = false;
        let userSchoolId = null;
        let editingWorkoutId = null;

        function getSchoolIdFromData(data = {}) {
            return data.schoolId || data.school_id || "";
        }

        function normalizeLiftValue(value = "") {
            return String(value).trim().toLowerCase().replace(/\s+/g, '_');
        }

        function displayLiftName(value = "") {
            return String(value).replace(/_/g, ' ').toUpperCase();
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (!userDoc.exists()) {
                    window.location.href = 'index.html';
                    return;
                }

                const userData = userDoc.data();
                if ((userData.role || "").toLowerCase() !== "coach") {
                    window.location.href = 'index.html';
                    return;
                }

                userSchoolId = getSchoolIdFromData(userData);

                if (!userSchoolId) {
                    alert("Coach profile is missing a school ID.");
                    window.location.href = 'index.html';
                    return;
                }

                await fetchSupplements();
                await fetchTeamSettings();
                await loadHistory();
            } catch (error) {
                console.error("Training Center init error:", error);
                window.location.href = 'index.html';
            }
        });

        async function fetchTeamSettings() {
            try {
                if (!userSchoolId) return;

                const schoolDoc = await getDoc(doc(db, "schools", userSchoolId));

                if (!schoolDoc.exists()) return;

                const schoolData = schoolDoc.data();

                await applyTheme(db, userSchoolId);

                const trackedLifts = schoolData.trackedLifts || schoolData.activeLifts || ["bench", "squat", "clean"];
                if (Array.isArray(trackedLifts) && trackedLifts.length > 0) {
                    coreLifts = trackedLifts.map(normalizeLiftValue);
                }

                updateCoreLiftDropdown(coreLifts);
            } catch (error) {
                console.error("Settings Error:", error);
            }
        }

        function updateCoreLiftDropdown(lifts) {
            const dropdowns = document.querySelectorAll('.core-lift-select');

            dropdowns.forEach(select => {
                const currentVal = select.value;
                select.innerHTML = '';

                const placeholder = document.createElement('option');
                placeholder.value = "";
                placeholder.textContent = "-- Select Lift --";
                placeholder.disabled = true;
                placeholder.selected = !currentVal;
                select.appendChild(placeholder);

                lifts.forEach(lift => {
                    const option = document.createElement('option');
                    option.value = lift;
                    option.textContent = displayLiftName(lift);
                    select.appendChild(option);
                });

                if (currentVal) {
                    select.value = currentVal;
                }
            });
        }

        async function fetchSupplements() {
            try {
                const snap = await getDocs(collection(db, "supplement_library"));
                supplementLibrary = snap.docs.map(docSnap => docSnap.data().name).filter(Boolean);
            } catch (err) {
                console.error("Library Error", err);
            }
        }

        window.toggleMaxOut = () => {
            isMaxOutMode = !isMaxOutMode;
            const bg = document.getElementById('max-out-indicator');
            const knob = document.getElementById('max-out-knob');
            const addBtn = document.getElementById('add-exercise-btn');

            if (isMaxOutMode) {
                bg.classList.replace('bg-gray-700', 'bg-red-600');
                knob.classList.add('translate-x-6');
                addBtn?.classList.add('hidden');

                exercises = coreLifts.map(lift => ({
                    id: Date.now() + Math.random(),
                    category: 'core',
                    name: lift,
                    isMaxOut: true,
                    sets: [
                        { reps: 5, pct: 50 },
                        { reps: 3, pct: 70 },
                        { reps: 1, pct: 85 },
                        { reps: 1, pct: 100 },
                        { reps: 1, pct: 105 },
                        { reps: 1, pct: 110 }
                    ]
                }));
            } else {
                bg.classList.replace('bg-red-600', 'bg-gray-700');
                knob.classList.remove('translate-x-6');
                addBtn?.classList.remove('hidden');
                exercises = [];
                addExerciseBlock();
            }

            renderExercises();
        };

        window.addExerciseBlock = () => {
            exercises.push({
                id: Date.now() + Math.random(),
                category: 'core',
                name: coreLifts[0] || 'bench',
                isCircuit: false,
                circuitExercises: [''],
                circuitConfig: { cycles: 3, work: 40, rest: 20 },
                sets: [{ reps: '', pct: '' }]
            });

            renderExercises();
        };

        window.updateExercise = (id, field, value) => {
            const ex = exercises.find(e => e.id === id);
            if (!ex) return;

            ex[field] = value;

            if (field === 'category') {
                ex.isCircuit = false;
                ex.name = value === 'core' ? (coreLifts[0] || 'bench') : '';
                ex.sets = [{ reps: '', pct: '' }];
            }

            renderExercises();
        };

        window.toggleCircuit = (id) => {
            const ex = exercises.find(e => e.id === id);
            if (!ex) return;

            ex.isCircuit = !ex.isCircuit;

            if (ex.isCircuit && ex.circuitExercises.length === 0) {
                ex.circuitExercises = [ex.name || ''];
            }

            renderExercises();
        };

        window.addCircuitExercise = (blockId) => {
            const ex = exercises.find(e => e.id === blockId);
            if (!ex) return;

            ex.circuitExercises.push('');
            renderExercises();
        };

        window.updateCircuitExercise = (blockId, exIndex, value) => {
            const ex = exercises.find(e => e.id === blockId);
            if (!ex) return;

            ex.circuitExercises[exIndex] = value;
        };

        window.removeCircuitExercise = (blockId, exIndex) => {
            const ex = exercises.find(e => e.id === blockId);
            if (!ex) return;

            ex.circuitExercises.splice(exIndex, 1);
            renderExercises();
        };

        window.updateCircuitConfig = (blockId, field, value) => {
            const ex = exercises.find(e => e.id === blockId);
            if (!ex) return;

            ex.circuitConfig[field] = value;
        };

        window.addSet = (id) => {
            const ex = exercises.find(e => e.id === id);
            if (!ex) return;

            ex.sets.push(ex.category === 'supplement' ? { reps: '' } : { reps: '', pct: '' });
            renderExercises();
        };

        window.updateSet = (exId, setIndex, field, value) => {
            const ex = exercises.find(e => e.id === exId);
            if (ex && ex.sets[setIndex]) {
                ex.sets[setIndex][field] = value;
            }
        };

        window.removeExercise = (id) => {
            exercises = exercises.filter(e => e.id !== id);
            renderExercises();
        };

        window.removeSet = (exId, setIndex) => {
            const ex = exercises.find(e => e.id === exId);
            if (!ex) return;

            ex.sets.splice(setIndex, 1);
            renderExercises();
        };

        function renderExercises() {
            const container = document.getElementById('exercises-container');
            container.innerHTML = '';

            exercises.forEach((ex, index) => {
                const isCore = ex.category === 'core';
                let blockHtml = `
                    <div class="bg-gray-900/40 border ${ex.isMaxOut ? 'border-red-600' : 'border-white/10'} rounded-2xl p-6 mb-4 shadow-xl backdrop-blur-sm">
                        <div class="flex justify-between items-center mb-6">
                            <div class="flex gap-4 items-center flex-1">
                                <span class="text-white/10 font-black text-3xl italic tracking-tighter">#0${index + 1}</span>
                `;

                if (ex.isMaxOut) {
                    blockHtml += `
                                <h2 class="text-xl font-black uppercase text-red-600 tracking-tight italic">${displayLiftName(ex.name)} <span class="text-[10px] bg-red-600 text-white px-3 py-1 ml-3 rounded-full not-italic">MAX TEST</span></h2>
                            </div>
                        </div>
                        <p class="text-[10px] text-gray-500 uppercase font-black tracking-widest border-t border-white/5 pt-4">Automatic Load Calculation Enabled</p>
                    </div>`;
                    container.insertAdjacentHTML('beforeend', blockHtml);
                    return;
                }

                blockHtml += `
                    <select onchange="updateExercise(${JSON.stringify(ex.id)}, 'category', this.value)" class="bg-white/5 border border-white/10 text-[10px] font-black uppercase rounded px-3 py-1.5 text-white outline-none focus:border-red-600">
                        <option value="core" ${isCore ? 'selected' : ''}>CORE LIFT</option>
                        <option value="supplement" ${!isCore ? 'selected' : ''}>SUPPLEMENT</option>
                    </select>
                `;

                if (!isCore) {
                    blockHtml += `
                        <div class="flex items-center gap-2 ml-4">
                            <input type="checkbox" id="circ-${ex.id}" ${ex.isCircuit ? 'checked' : ''} onchange="toggleCircuit(${JSON.stringify(ex.id)})" class="accent-red-600 w-4 h-4">
                            <label for="circ-${ex.id}" class="text-[10px] font-black text-white/40 uppercase cursor-pointer">CIRCUIT</label>
                        </div>
                    `;
                }

                if (isCore) {
                    const options = coreLifts
                        .map(l => `<option value="${l}" ${ex.name === l ? 'selected' : ''}>${displayLiftName(l)}</option>`)
                        .join('');

                    blockHtml += `<select onchange="updateExercise(${JSON.stringify(ex.id)}, 'name', this.value)" class="core-lift-select flex-1 bg-transparent border-b-2 border-white/10 focus:border-red-600 outline-none text-white font-black uppercase text-lg px-2 transition-all">${options}</select>`;
                } else if (!ex.isCircuit) {
                    const dlId = `list-${ex.id}`;
                    blockHtml += `
                        <input type="text" list="${dlId}" value="${ex.name || ''}" onchange="updateExercise(${JSON.stringify(ex.id)}, 'name', this.value)" placeholder="EXERCISE NAME" class="flex-1 bg-transparent border-b-2 border-white/10 focus:border-red-600 outline-none text-white font-black uppercase text-lg px-2 transition-all">
                        <datalist id="${dlId}">${supplementLibrary.map(s => `<option value="${s}">`).join('')}</datalist>
                    `;
                } else {
                    blockHtml += `<span class="flex-1 font-black text-red-600 uppercase italic text-sm tracking-widest">CIRCUIT BUILDER</span>`;
                }

                blockHtml += `<button onclick="removeExercise(${JSON.stringify(ex.id)})" class="remove-btn px-3 font-bold text-xl">✕</button></div></div>`;

                if (ex.isCircuit && !isCore) {
                    blockHtml += `<div class="bg-black/40 border border-white/5 p-5 rounded-xl mb-4 space-y-4">`;
                    ex.circuitExercises.forEach((cEx, cIdx) => {
                        blockHtml += `
                            <div class="flex gap-3 items-center">
                                <span class="text-white/20 text-[10px] font-black italic">0${cIdx + 1}</span>
                                <input type="text" value="${cEx || ''}" onchange="updateCircuitExercise(${JSON.stringify(ex.id)}, ${cIdx}, this.value)" placeholder="MOVEMENT" class="flex-1 bg-black border border-white/10 rounded-lg px-4 py-3 text-xs font-black text-white uppercase outline-none focus:border-red-600 transition-all">
                                ${cIdx > 0 ? `<button onclick="removeCircuitExercise(${JSON.stringify(ex.id)}, ${cIdx})" class="remove-btn px-3 font-black text-lg">✕</button>` : `<div class="w-10"></div>`}
                            </div>
                        `;
                    });
                    blockHtml += `
                        <button onclick="addCircuitExercise(${JSON.stringify(ex.id)})" class="text-[10px] font-black text-red-600 uppercase tracking-widest hover:text-white transition-colors py-2">+ ADD MOVEMENT</button>
                        <div class="grid grid-cols-3 gap-4 pt-6 border-t border-white/5">
                            <div class="text-center"><label class="text-[9px] font-black text-white/40 uppercase block mb-2">Cycles</label><input type="number" value="${ex.circuitConfig.cycles}" onchange="updateCircuitConfig(${JSON.stringify(ex.id)}, 'cycles', this.value)" class="w-full bg-black border border-white/10 rounded-lg py-3 text-xs font-black text-center text-white outline-none focus:border-red-600"></div>
                            <div class="text-center"><label class="text-[9px] font-black text-white/40 uppercase block mb-2">Work (s)</label><input type="number" value="${ex.circuitConfig.work}" onchange="updateCircuitConfig(${JSON.stringify(ex.id)}, 'work', this.value)" class="w-full bg-black border border-white/10 rounded-lg py-3 text-xs font-black text-center text-white outline-none focus:border-red-600"></div>
                            <div class="text-center"><label class="text-[9px] font-black text-white/40 uppercase block mb-2">Rest (s)</label><input type="number" value="${ex.circuitConfig.rest}" onchange="updateCircuitConfig(${JSON.stringify(ex.id)}, 'rest', this.value)" class="w-full bg-black border border-white/10 rounded-lg py-3 text-xs font-black text-center text-white outline-none focus:border-red-600"></div>
                        </div>
                    </div>`;
                } else {
                    blockHtml += `<div class="space-y-4 mb-6">`;
                    ex.sets.forEach((set, sIndex) => {
                        blockHtml += `
                            <div class="flex items-center gap-6 group">
                                <span class="text-[10px] font-black text-white/20 uppercase w-16 tracking-tighter italic">Set ${sIndex + 1}</span>
                                <div class="flex-1 grid grid-cols-2 gap-4 max-w-sm">
                                    <input type="number" placeholder="REPS" value="${set.reps || ''}" onchange="updateSet(${JSON.stringify(ex.id)}, ${sIndex}, 'reps', this.value)" class="w-full bg-black border border-white/10 rounded-lg py-3 text-sm font-black text-center text-white outline-none focus:border-red-600 transition-all">
                                    ${isCore ? `<input type="number" placeholder="% MAX" value="${set.pct || ''}" onchange="updateSet(${JSON.stringify(ex.id)}, ${sIndex}, 'pct', this.value)" class="w-full bg-black border border-white/10 rounded-lg py-3 text-sm font-black text-center text-red-600 outline-none focus:border-red-600 transition-all">` : '<div></div>'}
                                </div>
                                <button onclick="removeSet(${JSON.stringify(ex.id)}, ${sIndex})" class="remove-btn font-bold px-2">✕</button>
                            </div>`;
                    });
                    blockHtml += `
                        </div>
                        <button onclick="addSet(${JSON.stringify(ex.id)})" class="text-[9px] font-black bg-white/5 text-white/60 px-6 py-2.5 rounded-md uppercase tracking-widest hover:bg-white hover:text-black transition-all">+ Add Rep Set</button>`;
                }

                blockHtml += `</div>`;
                container.insertAdjacentHTML('beforeend', blockHtml);
            });
        }

        window.saveWorkout = async () => {
            const dateInput = document.getElementById('workout-date');
            const nameInput = document.getElementById('workout-name');
            const saveBtn = document.getElementById('save-workout-btn');

            if (!userSchoolId) {
                alert("CRITICAL ERROR: School Profile not loaded. Try refreshing.");
                return;
            }

            if (!dateInput.value || !nameInput.value.trim()) {
                alert("SYSTEM ERROR: Date and Name required for upload.");
                return;
            }

            const originalText = saveBtn.innerText;
            saveBtn.innerText = "UPLOADING...";
            saveBtn.disabled = true;

            try {
                const workoutData = {
                    date: dateInput.value,
                    name: nameInput.value.trim().toUpperCase(),
                    schoolId: userSchoolId,
                    isMaxOutMode,
                    exercises,
                    updatedAt: serverTimestamp()
                };

                if (editingWorkoutId) {
                    await updateDoc(doc(db, "workouts", editingWorkoutId), workoutData);
                } else {
                    workoutData.createdAt = serverTimestamp();
                    await addDoc(collection(db, "workouts"), workoutData);
                }

                alert("SYNC COMPLETE: Training data saved.");
                window.location.reload();
            } catch (err) {
                console.error("Save Error:", err);
                alert("SAVE FAILED: Check console for permissions details.");
                saveBtn.innerText = originalText;
                saveBtn.disabled = false;
            }
        };

        async function loadHistory() {
            const container = document.getElementById('history-container');
            if (!userSchoolId || !container) return;

            try {
                let snap = await getDocs(query(collection(db, "workouts"), where("schoolId", "==", userSchoolId)));

                if (snap.empty) {
                    snap = await getDocs(query(collection(db, "workouts"), where("school_id", "==", userSchoolId)));
                }

                container.innerHTML = '';

                if (snap.empty) {
                    container.innerHTML = '<p class="text-white/20 text-[10px] uppercase font-black tracking-widest p-10 border-2 border-dashed border-white/5 text-center rounded-2xl">Archive Empty</p>';
                    return;
                }

                const docs = snap.docs
                    .map(docSnap => ({ id: docSnap.id, ...docSnap.data() }))
                    .sort((a, b) => new Date(b.date) - new Date(a.date));

                docs.forEach(workout => {
                    const item = document.createElement('div');
                    item.className = "bg-gray-900/60 p-5 rounded-xl border border-white/5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 hover:border-red-600/40 transition-all group";
                    item.innerHTML = `
                        <div class="flex flex-col">
                            <span class="text-red-600 font-black text-[10px] uppercase tracking-widest italic leading-none mb-1">${workout.date || ''}</span>
                            <h3 class="font-black uppercase text-white tracking-tighter text-lg">${workout.name || 'UNTITLED WORKOUT'}</h3>
                        </div>
                        <div class="flex gap-2 w-full sm:w-auto">
                            <button onclick="duplicateWorkout('${workout.id}')" class="flex-1 bg-white/5 hover:bg-white hover:text-black text-white text-[10px] font-black px-4 py-2 rounded transition-all italic uppercase tracking-tighter">CLONE</button>
                            <button onclick="editWorkout('${workout.id}')" class="flex-1 bg-white/5 hover:bg-blue-600 text-white text-[10px] font-black px-4 py-2 rounded transition-all italic uppercase tracking-tighter">EDIT</button>
                            <button onclick="deleteWorkout('${workout.id}')" class="flex-1 bg-white/5 hover:bg-red-600 text-white text-[10px] font-black px-4 py-2 rounded transition-all italic uppercase tracking-tighter">DEL</button>
                        </div>
                    `;
                    container.appendChild(item);
                });
            } catch (err) {
                console.error("History load error:", err);
                container.innerHTML = '<p class="text-red-500 text-[10px] uppercase font-black tracking-widest p-10 border border-red-500/20 text-center rounded-2xl">Unable To Load Archive</p>';
            }
        }

        window.editWorkout = async (id) => {
            const snap = await getDoc(doc(db, "workouts", id));
            if (!snap.exists()) return;

            const data = snap.data();
            editingWorkoutId = id;
            document.getElementById('workout-date').value = data.date || '';
            document.getElementById('workout-name').value = data.name || '';
            exercises = Array.isArray(data.exercises) ? data.exercises : [];
            isMaxOutMode = !!data.isMaxOutMode;

            const bg = document.getElementById('max-out-indicator');
            const knob = document.getElementById('max-out-knob');
            const addBtn = document.getElementById('add-exercise-btn');

            if (isMaxOutMode) {
                bg.classList.replace('bg-gray-700', 'bg-red-600');
                knob.classList.add('translate-x-6');
                addBtn?.classList.add('hidden');
            } else {
                bg.classList.replace('bg-red-600', 'bg-gray-700');
                knob.classList.remove('translate-x-6');
                addBtn?.classList.remove('hidden');
            }

            renderExercises();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.getElementById('save-workout-btn').innerText = "Update Archive";
        };

        window.duplicateWorkout = async (id) => {
            const snap = await getDoc(doc(db, "workouts", id));
            if (!snap.exists()) return;

            const data = snap.data();
            editingWorkoutId = null;
            exercises = Array.isArray(data.exercises) ? data.exercises : [];
            isMaxOutMode = !!data.isMaxOutMode;

            document.getElementById('workout-date').value = '';
            document.getElementById('workout-name').value = `${data.name || 'WORKOUT'} CLONE`;

            const bg = document.getElementById('max-out-indicator');
            const knob = document.getElementById('max-out-knob');
            const addBtn = document.getElementById('add-exercise-btn');

            if (isMaxOutMode) {
                bg.classList.replace('bg-gray-700', 'bg-red-600');
                knob.classList.add('translate-x-6');
                addBtn?.classList.add('hidden');
            } else {
                bg.classList.replace('bg-red-600', 'bg-gray-700');
                knob.classList.remove('translate-x-6');
                addBtn?.classList.remove('hidden');
            }

            renderExercises();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.getElementById('save-workout-btn').innerText = "Save Clone";
        };

        window.deleteWorkout = async (id) => {
            if (!confirm("DANGER: This training session will be permanently purged from the archive. Continue?")) return;

            try {
                await deleteDoc(doc(db, "workouts", id));
                await loadHistory();
            } catch (err) {
                console.error("Delete workout failed:", err);
                alert("Unable to delete workout.");
            }
        };

        window.filterHistory = () => {
            const term = document.getElementById('history-search').value.toLowerCase();
            document.querySelectorAll('#history-container > div').forEach(item => {
                item.style.display = item.innerText.toLowerCase().includes(term) ? 'flex' : 'none';
            });
        };
    </script>
</body>
</html>
