<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BOARD | RACKSTAT</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: white; }
        .club-card { background: #111827; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; border: 1px solid #1f2937; }
        .record-table { width: 100%; border-collapse: collapse; font-size: 10px; background: #111827; border: 1px solid #1f2937; }
        .record-table th { background: #1f2937; color: #ef4444; text-transform: uppercase; padding: 8px; border: 1px solid #374151; font-weight: 900; }
        .record-table td { border: 1px solid #374151; padding: 6px; text-align: center; }
        .record-name { color: #9ca3af; font-weight: bold; display: block; font-size: 8px; }
        .record-value { color: white; font-weight: 900; font-style: italic; font-size: 11px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

<header class="bg-black border-b-2 border-red-700 p-4">
    <div class="flex justify-between items-center max-w-6xl mx-auto">
        
        <div class="w-1/4 flex justify-start">
            <button onclick="location.href='index.html'" class="text-[10px] font-black uppercase bg-gray-800 px-3 py-1 rounded text-gray-300 hover:text-white transition-colors">← Lobby</button>
        </div>

        <div class="flex items-center gap-6 justify-center flex-1">
            <div class="header-logo-container">
                <img id="school-logo" src="images/rackstat-logo.png" alt="School Logo" onerror="this.src='images/rackstat-logo.png'">
            </div>

            <div class="h-10 w-[1px] bg-gray-700"></div>

            <div class="flex flex-col items-center min-w-[140px]">
                <span id="school-tag" class="text-sm font-black italic uppercase tracking-widest text-white leading-tight text-center">LOADING...</span>
                <span id="athlete-count" class="text-[8px] font-bold text-gray-400 uppercase tracking-tighter">Updating...</span>
                <span id="formula-display" class="mt-1 text-[7px] font-black text-red-500 bg-red-500/10 border border-red-900/30 px-2 py-0.5 rounded italic tracking-widest uppercase text-center">Syncing...</span>
            </div>

            <div class="h-10 w-[1px] bg-gray-700"></div>

            <div class="header-logo-container">
                <img src="images/rackstat-logo.png" alt="RACKSTAT">
            </div>
        </div>

        <div class="w-1/4"></div> 
    </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-6">
    <h2 class="text-red-600 font-black italic text-xs uppercase mb-4 tracking-tighter">Lifting Clubs</h2>
    <div id="player-club-grid">
        <p class="text-center text-xs animate-pulse text-red-600 font-black uppercase py-10">Syncing Lifts...</p>
    </div>

    <div class="mt-10">
        <div class="flex justify-between items-end mb-4">
            <h2 class="text-red-600 font-black italic text-xs uppercase tracking-tighter">Weight Class Records</h2>
            <button id="coach-edit-btn" class="text-[8px] bg-gray-900 border border-gray-700 px-2 py-1 rounded text-gray-500 font-bold uppercase hover:text-white transition-all">Coach Mode: OFF</button>
        </div>
        <div class="overflow-x-auto no-scrollbar rounded-lg border border-gray-800 shadow-2xl">
            <table class="record-table" id="weight-class-table">
                <thead>
                    <tr>
                        <th>WT</th>
                        <th>BENCH</th>
                        <th>SQUAT</th>
                        <th>CLEANS</th>
                        <th>DEADLIFT</th>
                        <th>40 YD DASH</th>
                    </tr>
                </thead>
                <tbody id="record-rows"></tbody>
            </table>
        </div>
    </div>
</main>

<nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-red-900/30 px-6 py-4 flex justify-between items-center z-50">
    <button onclick="location.href='board.html'" class="text-red-600 flex flex-col items-center"><span class="text-[9px] font-black uppercase italic">Board</span></button>
    <button onclick="location.href='rack.html'" class="text-gray-500 flex flex-col items-center"><span class="text-[9px] font-black uppercase italic">The Rack</span></button>
    <button onclick="location.href='kitchen.html'" class="text-gray-500 flex flex-col items-center"><span class="text-[9px] font-black uppercase italic">Kitchen</span></button>
    <button onclick="location.href='profile.html'" class="text-gray-500 flex flex-col items-center"><span class="text-[9px] font-black uppercase italic">Profile</span></button>
</nav>

<script type="module">
    import { db, auth } from "./js/firebase-config.js";
    import { applyTheme } from "./js/theme.js";
    import {
        buildBoardScoreSettings,
        calculateBoardScore
    } from "./js/board-score.js";
    import {
        getDoc,
        doc,
        collection,
        query,
        where,
        getDocs,
        setDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    let isCoachMode = false;
    let currentSchoolId = null;
    let currentUserRole = null;

    const weightClasses = [125, 135, 145, 155, 165, 175, 185, 195, 210, 225, 250, "UNLIMITED"];

    const getWeightClass = (bw) => {
        const numericBw = Number(bw) || 0;
        if (!numericBw || numericBw > 250) return "UNLIMITED";
        return weightClasses.find(c => c !== "UNLIMITED" && numericBw <= c) || "UNLIMITED";
    };

    const getSchoolIdFromData = (data = {}) => data.schoolId || data.school_id || "";

    const getDisplayName = (data = {}) => {
        if (data.fullName && String(data.fullName).trim()) {
            return String(data.fullName).trim();
        }
        const first = String(data.firstName || "").trim();
        const last = String(data.lastName || "").trim();
        const combined = `${first} ${last}`.trim();
        return combined || "Unknown Athlete";
    };

    const getFormulaDisplayText = (formulaType = "power_index") =>
        String(formulaType || "power_index").replaceAll("_", " ").toUpperCase();

    function normalizeRecordEntry(entry, dashDefault = false) {
        if (!entry || typeof entry !== "object") {
            return { val: dashDefault ? 99.9 : 0, name: "-" };
        }

        const rawVal = Number(entry.val);
        return {
            val: Number.isFinite(rawVal) ? rawVal : (dashDefault ? 99.9 : 0),
            name: String(entry.name || "-")
        };
    }

    function getPreferredRecord(lift, autoEntry, manualEntry) {
        const autoData = normalizeRecordEntry(autoEntry, lift === 'dash');
        const manualData = manualEntry ? normalizeRecordEntry(manualEntry, lift === 'dash') : null;

        if (!manualData) return autoData;

        if (lift === 'dash') {
            const autoValid = autoData.val > 0 && autoData.val < 99.9;
            const manualValid = manualData.val > 0 && manualData.val < 99.9;

            if (autoValid && manualValid) {
                return autoData.val < manualData.val ? autoData : manualData;
            }

            if (autoValid) return autoData;
            if (manualValid) return manualData;
            return manualData;
        }

        return autoData.val > manualData.val ? autoData : manualData;
    }

    function getCoachModeRecord(lift, autoEntry, manualEntry) {
        if (manualEntry) return normalizeRecordEntry(manualEntry, lift === 'dash');
        return normalizeRecordEntry(autoEntry, lift === 'dash');
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }

        try {
            const [profileSnap, userSnap] = await Promise.all([
                getDoc(doc(db, "recruiting_profiles", user.uid)),
                getDoc(doc(db, "users", user.uid))
            ]);

            const profileData = profileSnap.exists() ? profileSnap.data() : {};
            const userData = userSnap.exists() ? userSnap.data() : {};
            const mergedUser = { ...userData, ...profileData };

            currentSchoolId = getSchoolIdFromData(mergedUser);
            currentUserRole = (mergedUser.role || "").toLowerCase();

            if (!currentSchoolId) {
                console.error("Board Init Error: Missing school ID.");
                return;
            }

            await applyTheme(db, currentSchoolId);
            await window.loadBoard(currentSchoolId);
        } catch (err) {
            console.error("Board Init Error:", err);
        }
    });

    window.loadBoard = async function(schoolId) {
        if (!schoolId) return;

        const grid = document.getElementById('player-club-grid');
        const recordBody = document.getElementById('record-rows');
        const schoolTag = document.getElementById('school-tag');
        const formulaDisplay = document.getElementById('formula-display');
        const athleteCountDisplay = document.getElementById('athlete-count');

        let schoolSnap, manualSnap;

        try {
            [schoolSnap, manualSnap] = await Promise.all([
                getDoc(doc(db, "schools", schoolId)),
                getDoc(doc(db, "schools", schoolId, "settings", "manual_records"))
            ]);
        } catch (err) {
            console.warn("Manual records missing or restricted.");
            manualSnap = { exists: () => false };
        }

        if (!schoolSnap || !schoolSnap.exists()) return;

        const school = schoolSnap.data();
        const manualRecords = manualSnap.exists() ? manualSnap.data() : {};
        const boardSettings = buildBoardScoreSettings(school);

        if (schoolTag) {
            schoolTag.innerText = `${school.name || "School"} Weightroom`.toUpperCase();
        }

        if (formulaDisplay) {
            formulaDisplay.innerText = getFormulaDisplayText(boardSettings.formula_type);
        }

        let athleteQuery = query(collection(db, "recruiting_profiles"), where("schoolId", "==", schoolId));
        let pSnap = await getDocs(athleteQuery);

        if (pSnap.empty) {
            athleteQuery = query(collection(db, "recruiting_profiles"), where("school_id", "==", schoolId));
            pSnap = await getDocs(athleteQuery);
        }

        if (athleteCountDisplay) {
            athleteCountDisplay.innerText = `${pSnap.size} Athletes Logged`;
        }

        const classRecords = {};
        weightClasses.forEach(wc => {
            classRecords[wc] = {
                bench: { val: 0, name: "-" },
                squat: { val: 0, name: "-" },
                clean: { val: 0, name: "-" },
                deadlift: { val: 0, name: "-" },
                dash: { val: 99.9, name: "-" }
            };
        });

        const scores = [];

        for (const athleteDoc of pSnap.docs) {
            const athleteProfile = athleteDoc.data();

            const [userSnap, latestMaxSnap] = await Promise.all([
                getDoc(doc(db, "users", athleteDoc.id)),
                getDoc(doc(db, "recruiting_profiles", athleteDoc.id, "maxes", "latest"))
            ]);

            if (!latestMaxSnap.exists()) continue;

            const userData = userSnap.exists() ? userSnap.data() : {};
            const athleteData = { ...userData, ...athleteProfile };
            const maxes = latestMaxSnap.data();

            const athleteBW = Number(
                maxes.bodyWeight ||
                maxes.body_weight ||
                maxes.weight ||
                athleteData.bodyWeight ||
                athleteData.weight ||
                0
            );

            const currentWC = getWeightClass(athleteBW);
            const fullName = getDisplayName(athleteData);

            const checkMax = (liftKey, possibleKeys) => {
                let val = 0;
                for (const key of possibleKeys) {
                    const candidate = Number(maxes[key]) || Number(athleteData[key]) || 0;
                    if (candidate > val) val = candidate;
                }
                if (val > classRecords[currentWC][liftKey].val) {
                    classRecords[currentWC][liftKey] = { val, name: fullName };
                }
            };

            const checkMin = (liftKey, possibleKeys) => {
                let best = 99.9;
                for (const key of possibleKeys) {
                    const candidate = parseFloat(maxes[key] || athleteData[key]);
                    if (candidate > 0 && candidate < best) {
                        best = candidate;
                    }
                }
                if (best > 0 && best < classRecords[currentWC][liftKey].val) {
                    classRecords[currentWC][liftKey] = { val: best, name: fullName };
                }
            };

            checkMax('bench', ['bench', 'bench_press']);
            checkMax('squat', ['squat', 'back_squat']);
            checkMax('clean', ['clean', 'power_clean']);
            checkMax('deadlift', ['deadlift']);
            checkMin('dash', ['forty', 'forty_yard_dash']);

            const scoreResult = calculateBoardScore({
                data: {
                    ...athleteData,
                    ...maxes
                },
                formulaType: boardSettings.formula_type,
                scoringLifts: boardSettings.scoring_lifts
            });

            scores.push({
                name: fullName,
                displayScore: Number(scoreResult.score) || 0
            });
        }

        if (recordBody) {
            recordBody.innerHTML = '';

            weightClasses.forEach(wc => {
                const row = `
                    <tr>
                        <td class="bg-gray-900/50 font-black text-[var(--school-primary)]">${wc}</td>
                        ${['bench', 'squat', 'clean', 'deadlift', 'dash'].map(lift => {
                            const autoData = classRecords[wc][lift];
                            const manualData = manualRecords[wc] && manualRecords[wc][lift]
                                ? manualRecords[wc][lift]
                                : null;

                            const data = (isCoachMode && currentUserRole === 'coach')
                                ? getCoachModeRecord(lift, autoData, manualData)
                                : getPreferredRecord(lift, autoData, manualData);

                            const numericVal = Number(data.val);
                            const displayVal = lift === 'dash'
                                ? (numericVal > 0 && numericVal < 99.9 ? data.val : '-')
                                : (numericVal > 0 ? data.val : '-');

                            return `
                                <td contenteditable="${isCoachMode && currentUserRole === 'coach'}"
                                    class="record-cell ${isCoachMode && currentUserRole === 'coach' ? 'bg-[var(--school-primary)]/10 outline outline-1 outline-[var(--school-primary)]/30' : ''}"
                                    data-wc="${wc}"
                                    data-lift="${lift}">
                                    <span class="record-name">${data.name || '-'}</span>
                                    <span class="record-value">${displayVal}${lift === 'dash' && displayVal !== '-' ? 's' : ''}</span>
                                </td>
                            `;
                        }).join('')}
                    </tr>
                `;
                recordBody.innerHTML += row;
            });

            if (isCoachMode && currentUserRole === 'coach') {
                document.querySelectorAll('.record-cell').forEach(cell => {
                    cell.addEventListener('blur', async (e) => {
                        const rawText = e.target.innerText;
                        const parts = rawText.split('\n').map(p => p.trim()).filter(Boolean);
                        const newName = parts[0] || "-";
                        const newVal = (parts[1] || "0").replace('s', '').trim();
                        const wc = e.target.getAttribute('data-wc');
                        const lift = e.target.getAttribute('data-lift');
                        await saveManualRecord(wc, lift, newVal, newName);
                    });
                });
            }
        }

        if (grid) {
            grid.innerHTML = '';

            const minimumClub = Number(school.club_start) || 50;
            const scoringLiftLabel = boardSettings.scoring_lifts.length
                ? boardSettings.scoring_lifts.map(l => l.replace(/_/g, ' ')).join(' + ').toUpperCase()
                : 'NO SCORING LIFTS';

            const clubMap = new Map();

            scores.forEach((athlete) => {
                const score = Number(athlete.displayScore) || 0;

                if (score < minimumClub) return;

                const clubLevel = Math.floor(score / 50) * 50;

                if (clubLevel < minimumClub) return;

                if (!clubMap.has(clubLevel)) {
                    clubMap.set(clubLevel, []);
                }

                clubMap.get(clubLevel).push(athlete);
            });

            const sortedClubLevels = Array.from(clubMap.keys()).sort((a, b) => b - a);

            if (!sortedClubLevels.length) {
                grid.innerHTML = `
                    <p class="text-center text-xs text-gray-500 font-black uppercase py-10">
                        No athletes currently qualify for a lifting club.
                    </p>
                `;
            } else {
                sortedClubLevels.forEach((level) => {
                    const qualifiers = clubMap.get(level).sort((a, b) => b.displayScore - a.displayScore);

                    grid.innerHTML += `
                        <div class="club-card border-l-4 mb-4" style="border-color: var(--school-primary)">
                            <div class="flex justify-between items-end border-b border-gray-800 mb-3 pb-1">
                                <p class="font-black italic text-lg uppercase" style="color: var(--school-primary)">${level} LB CLUB</p>
                                <p class="text-[8px] text-white font-black uppercase italic">${scoringLiftLabel}</p>
                            </div>
                            ${qualifiers.map(q => `
                                <div class="flex justify-between items-center py-2 border-b border-white/5 last:border-0">
                                    <span class="text-white font-bold uppercase tracking-tight">${q.name}</span>
                                    <span class="text-white font-black italic text-lg">${q.displayScore}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                });
            }
        }
    };

    async function saveManualRecord(wc, lift, val, name) {
        if (!currentSchoolId || currentUserRole !== 'coach') return;

        const recordRef = doc(db, "schools", currentSchoolId, "settings", "manual_records");
        try {
            await setDoc(recordRef, {
                [wc]: { [lift]: { val: Number(val) || 0, name } }
            }, { merge: true });
        } catch (err) {
            alert("Permission Denied: Coaches only.");
        }
    }

    const coachBtn = document.getElementById('coach-edit-btn');
    if (coachBtn) {
        coachBtn.addEventListener('click', (e) => {
            if (currentUserRole !== 'coach') {
                alert("Coach mode is only available to coaches.");
                return;
            }

            isCoachMode = !isCoachMode;
            e.target.innerText = `Coach Mode: ${isCoachMode ? 'ON' : 'OFF'}`;

            if (isCoachMode) {
                e.target.style.color = 'var(--school-primary)';
                e.target.style.borderColor = 'var(--school-primary)';
            } else {
                e.target.style.color = '';
                e.target.style.borderColor = '';
            }

            if (currentSchoolId) {
                window.loadBoard(currentSchoolId);
            }
        });
    }
</script>
</body>
</html>
