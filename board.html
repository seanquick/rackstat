<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BOARD | RACKSTAT</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: var(--rackstat-black); color: white; }
        .club-card { 
            background: var(--rackstat-gray); 
            border-radius: 8px; 
            padding: 1rem; 
            margin-bottom: 1rem; 
            border: 1px solid var(--rackstat-border);
        }
        /* Custom scrollbar for clean UI */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-black border-b-2 border-red-700 p-4">
        <div class="flex justify-between items-center max-w-4xl mx-auto mb-4">
            <button onclick="location.href='index.html'" class="text-[10px] font-black uppercase bg-gray-800 px-3 py-1 rounded text-gray-300 hover:text-white transition-colors">← Lobby</button>
            
            <div class="flex items-center gap-4">
                <img id="school-logo" src="images/panther-logo.png" alt="School Logo" class="h-10 w-auto">
                <div class="h-6 w-[1px] bg-gray-700"></div>
                <span class="text-sm font-black italic uppercase tracking-widest text-white">FAIRBANKS</span>
                <div class="h-6 w-[1px] bg-gray-700"></div>
                <img src="images/rackstat-logo.png" alt="RACKSTAT" class="h-10 w-auto">
            </div>

            <div class="w-[60px]"></div> 
        </div>
    </header>

    <div class="max-w-md mx-auto px-4 py-6">
        <div id="player-club-grid">
            <p class="text-center text-xs animate-pulse text-red-600 font-black uppercase py-20">Analyzing Lifts...</p>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-red-900/30 px-6 py-4 flex justify-between items-center z-50">
        <button onclick="location.href='board.html'" class="text-red-600 flex flex-col items-center"><span class="text-[9px] font-black uppercase italic">Board</span></button>
        <button onclick="location.href='rack.html'" class="text-gray-500 flex flex-col items-center"><span class="text-[9px] font-black uppercase italic">The Rack</span></button>
        <button onclick="location.href='kitchen.html'" class="text-gray-500 flex flex-col items-center"><span class="text-[9px] font-black uppercase italic">Kitchen</span></button>
        <button onclick="location.href='profile.html'" class="text-gray-500 flex flex-col items-center"><span class="text-[9px] font-black uppercase italic">Profile</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBOQFeokKaNQKwaUhXMCA0oEm4W9G0qafE", 
            authDomain: "rackstat-production.firebaseapp.com", 
            projectId: "rackstat-production",
            storageBucket: "rackstat-production.firebasestorage.app",
            messagingSenderId: "345003825117",
            appId: "1:345003825117:web:2ad86b1902dfdebe0c8834"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userSnap = await getDoc(doc(db, "recruiting_profiles", user.uid));
                if (userSnap.exists()) {
                    const userData = userSnap.data();
                    loadBoard(userData.school_id);
                }
            } else { window.location.href = 'index.html'; }
        });

        async function loadBoard(schoolId) {
            const grid = document.getElementById('player-club-grid');
            const schoolSnap = await getDoc(doc(db, "schools", schoolId));
            if (!schoolSnap.exists()) return;
            const school = schoolSnap.data();
            
            document.getElementById('school-tag').innerText = `${school.name} Weightroom`;

            const q = query(collection(db, "recruiting_profiles"), where("school_id", "==", schoolId));
            const pSnap = await getDocs(q);
            
            let scores = [];

            for (const d of pSnap.docs) {
                // Fetch the absolute latest max entry for this athlete
                const maxSnap = await getDocs(query(
                    collection(db, "recruiting_profiles", d.id, "maxes"), 
                    orderBy("timestamp", "desc"), 
                    limit(1)
                ));
                
                if(!maxSnap.empty) {
                    const m = maxSnap.docs[0].data();
                    const trackedLifts = school.preferences?.tracked_lifts || ["bench", "squat", "clean"];
                    
                    const totalLifts = trackedLifts.reduce((acc, lift) => {
                        return acc + (Number(m[lift]) || 0);
                    }, 0);

                    // P4P Logic if school prefers it
                    let finalScore = totalLifts;
                    if (school.preferences?.formula_type === "power_index") {
                        const bw = Number(m.bodyWeight) || 1;
                        finalScore = (totalLifts / bw).toFixed(2); 
                    }

                    scores.push({ 
                        id: d.id,
                        name: `${d.data().firstName} ${d.data().lastName}`, 
                        total: totalLifts, 
                        displayScore: finalScore,
                        placed: false 
                    });
                }
            }

            // Sort by the raw total for club placement
            scores.sort((a, b) => b.total - a.total);
            grid.innerHTML = '';

            const start = school.preferences?.club_start || 1000;
            const end = school.preferences?.club_end || 300;
            
            for(let level = start; level >= end; level -= 50) {
                const qualifiers = scores.filter(s => !s.placed && s.total >= level);
                qualifiers.forEach(s => s.placed = true);
                
                if(qualifiers.length > 0) {
                    grid.innerHTML += `
                        <div class="club-card border-l-4" style="border-color: ${school.colors?.primary || '#b91c1c'}">
                            <p class="font-black italic text-lg border-b border-gray-800 mb-3 pb-1" style="color: ${school.colors?.primary || '#b91c1c'}">${level} LB CLUB</p>
                            ${qualifiers.map(q => `
                                <div class="flex justify-between items-center text-sm py-2 border-b border-white/5 last:border-0">
                                    <div class="flex flex-col">
                                        <span class="font-bold uppercase tracking-tight">${q.name}</span>
                                        <button onclick="location.href='player-card.html?id=${q.id}'" class="text-[8px] text-blue-500 text-left font-bold uppercase">View Card →</button>
                                    </div>
                                    <span class="text-white font-black">${q.total}</span>
                                </div>`).join('')}
                        </div>`;
                }
            }
        }
    </script>
</body>
</html>
