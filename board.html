<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BOARD | RACKSTAT</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: white; }
        .club-card { 
            background: #111827; 
            border-radius: 8px; 
            padding: 1rem; 
            margin-bottom: 1rem; 
            border: 1px solid #1f2937;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

<header class="bg-black border-b-2 border-red-700 p-4">
    <div class="flex justify-between items-center max-w-4xl mx-auto">
        <button onclick="location.href='index.html'" class="text-[10px] font-black uppercase bg-gray-800 px-3 py-1 rounded text-gray-300 hover:text-white transition-colors">
            ← Lobby
        </button>
        
        <div class="flex items-center gap-4">
            <img id="school-logo" src="images/panther-logo1.png" alt="School Logo" class="h-10 w-auto" onerror="this.src='images/rackstat-logo.png'">
            
            <div class="h-10 w-[1px] bg-gray-700"></div>
            
            <div class="flex flex-col items-center">
                <span id="school-tag" class="text-sm font-black italic uppercase tracking-widest text-white leading-tight text-center">
                    FAIRBANKS
                </span>
                <span id="athlete-count" class="text-[8px] font-bold text-gray-400 uppercase tracking-tighter">
                    Updating...
                </span>
                <span id="formula-display" class="mt-1 text-[7px] font-black text-red-500 bg-red-500/10 border border-red-900/30 px-2 py-0.5 rounded italic tracking-widest uppercase text-center">
                    Syncing Formula...
                </span>
            </div>
            
            <div class="h-10 w-[1px] bg-gray-700"></div>
            
            <img src="images/rackstat-logo.png" alt="RACKSTAT" class="h-10 w-auto">
        </div>

        <div class="w-[60px]"></div> 
    </div>
</header>

    <div class="max-w-md mx-auto px-4 py-6">
        <div id="player-club-grid">
            <p class="text-center text-xs animate-pulse text-red-600 font-black uppercase py-20">Analyzing Lifts...</p>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-red-900/30 px-6 py-4 flex justify-between items-center z-50">
        <button onclick="location.href='board.html'" class="text-red-600 flex flex-col items-center"><span class="text-[9px] font-black uppercase italic">Board</span></button>
        <button onclick="location.href='rack.html'" class="text-gray-500 flex flex-col items-center"><span class="text-[9px] font-black uppercase italic">The Rack</span></button>
        <button onclick="location.href='kitchen.html'" class="text-gray-500 flex flex-col items-center"><span class="text-[9px] font-black uppercase italic">Kitchen</span></button>
        <button onclick="location.href='profile.html'" class="text-gray-500 flex flex-col items-center"><span class="text-[9px] font-black uppercase italic">Profile</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBOQFeokKaNQKwaUhXMCA0oEm4W9G0qafE", 
            authDomain: "rackstat-production.firebaseapp.com", 
            projectId: "rackstat-production",
            storageBucket: "rackstat-production.firebasestorage.app",
            messagingSenderId: "345003825117",
            appId: "1:345003825117:web:2ad86b1902dfdebe0c8834"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userSnap = await getDoc(doc(db, "recruiting_profiles", user.uid));
                if (userSnap.exists()) {
                    const userData = userSnap.data();
                    loadBoard(userData.school_id);
                }
            } else { window.location.href = 'index.html'; }
        });

        window.loadBoard = async function(schoolId) {
            const grid = document.getElementById('player-club-grid');
            if (!grid) return; 

            // 1. Fetch school settings
            const schoolSnap = await getDoc(doc(db, "schools", schoolId));
            if (!schoolSnap.exists()) return;
            const school = schoolSnap.data();

            // DIAGNOSTIC LOG (Moved after initialization)
            const formulaSetting = (school.preferences?.formula_type || "").toLowerCase().replace("_", " ");
            console.log("School Formula Type Found:", formulaSetting);
            
            const schoolTag = document.getElementById('school-tag');
            if (schoolTag) schoolTag.innerText = `${school.name} Weightroom`.toUpperCase();
            
            const schoolLogo = document.getElementById('school-logo');
            if (schoolLogo && school.logo_url) schoolLogo.src = school.logo_url;

            // Define scoring lifts globally for the function scope
            const scoringLifts = school.preferences?.scoring_lifts || ["bench", "squat", "clean", "deadlift"];

            // 2. Fetch Athletes
            const q = query(collection(db, "recruiting_profiles"), where("school_id", "==", schoolId));
            const pSnap = await getDocs(q);

            // 3. Update Count & Formula Display
            const countEl = document.getElementById('athlete-count');
            if (countEl) countEl.innerText = `${pSnap.size} Athletes Logged`;

            const formulaEl = document.getElementById('formula-display');
            if (formulaEl) {
                if (formulaSetting === "power index") {
                    formulaEl.innerText = "INDEX: TOTAL LIFTED - (BW CAP * 4)";
                } else {
                    formulaEl.innerText = "RANKING: RAW TOTAL LBS";
                }
            }
            
            let scores = [];

           // 4. Process Athlete Data
            for (const d of pSnap.docs) {
                const latestMaxSnap = await getDoc(doc(db, "recruiting_profiles", d.id, "maxes", "latest"));
                
                if (latestMaxSnap.exists()) {
                    const m = latestMaxSnap.data();
                    const athleteData = d.data(); 
                    
                    const totalLifts = scoringLifts.reduce((acc, lift) => acc + (Number(m[lift]) || 0), 0);
                    const athleteBW = Number(athleteData.bodyWeight || athleteData.weight || m.bodyWeight || 0);
                    
                    let displayScore = totalLifts;
                    let bwFactor = 0;

                    // Robust Check for Power Index
                    if (formulaSetting === "power index") {
                        const bwCap = Math.min(athleteBW, 200); 
                        bwFactor = bwCap * 4;
                        displayScore = totalLifts - bwFactor;
                    }

                    // --- CONSOLE DEBUGGER ---
                    console.log(`--- DEBUG: ${athleteData.firstName} ${athleteData.lastName} ---`);
                    console.log(`Total Lifted: ${totalLifts}`);
                    console.log(`Body Weight used: ${athleteBW}`);
                    console.log(`BW Factor: ${bwFactor}`);
                    console.log(`Calculated Index: ${displayScore}`);

                    scores.push({ 
                        id: d.id,
                        name: `${athleteData.firstName} ${athleteData.lastName}`, 
                        total: totalLifts, 
                        displayScore: Math.round(displayScore),
                        placed: false 
                    });
                }
            }

            // 5. Render Club Groups
            scores.sort((a, b) => b.displayScore - a.displayScore);

            grid.innerHTML = '';

            const start = school.preferences?.club_start || 1000;
            const end = school.preferences?.club_end || 50; 
            
            for(let level = start; level >= end; level -= 50) {
                const qualifiers = scores.filter(s => !s.placed && s.total >= level);
                qualifiers.forEach(s => s.placed = true);
                
                if(qualifiers.length > 0) {
                    grid.innerHTML += `
                        <div class="club-card border-l-4 mb-4" style="border-color: ${school.colors?.primary || '#b91c1c'}">
                            <div class="flex justify-between items-end border-b border-gray-800 mb-3 pb-1">
                                <p class="font-black italic text-lg uppercase" style="color: ${school.colors?.primary || '#b91c1c'}">${level} LB CLUB</p>
                                <div class="text-right">
                                    <p class="text-[7px] text-gray-600 font-bold uppercase tracking-widest">RANKING BASIS:</p>
                                    <p class="text-[8px] text-white font-black uppercase italic">${scoringLifts.join(' + ').toUpperCase()}</p>
                                </div>
                            </div>
                            ${qualifiers.map(q => `
                                <div class="flex justify-between items-center py-2 border-b border-white/5 last:border-0 group">
                                    <div class="flex flex-col">
                                        <span class="text-white font-bold uppercase tracking-tight group-hover:text-red-500 transition-colors">${q.name}</span>
                                        <div class="flex items-center gap-2">
                                            <span class="text-[8px] text-gray-500 font-black uppercase italic">Index: ${q.displayScore}</span>
                                            <button onclick="location.href='recruiting-card.html?id=${q.id}'" class="text-[8px] text-blue-500 hover:text-blue-300 font-bold uppercase transition-colors">View Card →</button>
                                        </div>
                                    </div>
                                    <span class="text-white font-black italic text-lg">${q.total}</span>
                                </div>`).join('')}
                        </div>`;
                }
            }
        }
    </script>
</body>
</html>
