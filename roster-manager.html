<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roster Manager | RACKSTAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    <style>
        /* Custom Overrides for Tabulator to match RACKSTAT RED */
        .tabulator { border: none !important; background-color: transparent !important; }
        .tabulator-header { background-color: #111827 !important; border-bottom: 2px solid var(--school-primary, #ef4444) !important; }
        .tabulator-row { background-color: #0d1117 !important; border-bottom: 1px solid #1f2937 !important; }
        .tabulator-row:hover { background-color: #1f2937 !important; }
        .tabulator-col-title { font-weight: 900 !important; letter-spacing: -0.025em !important; color: #9ca3af !important; }
    </style>
</head>
<body class="bg-[#0d1117] text-white font-sans antialiased selection:bg-red-500/30">

    <header class="p-4 flex justify-between items-center border-b border-gray-800 bg-[#0d1117]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <a href="coach-lobby.html" class="group flex items-center gap-2 text-[10px] font-black tracking-widest uppercase text-gray-500 hover:text-white transition-all">
                <span class="group-hover:-translate-x-1 transition-transform">←</span> Office
            </a>
            
            <div class="flex items-center gap-4 border-l border-gray-800 pl-6">
                <img id="school-logo" src="images/rackstat-logo.png" class="h-10 w-auto object-contain" alt="Logo" onerror="this.src='images/rackstat-logo.png'">
                <div>
                    <h1 class="text-lg font-black italic uppercase tracking-tighter leading-none text-white">Roster <span class="text-red-600">Manager</span></h1>
                    <p id="school-name" class="text-[9px] font-black text-gray-500 uppercase tracking-widest mt-1">LOADING...</p>
                </div>
            </div>
        </div>
        <div class="flex gap-3">
            <span id="player-count" class="bg-red-600/10 border border-red-600/20 text-red-500 px-4 py-2 rounded-full text-[10px] font-black tracking-widest uppercase">0 ATHLETES ON FILE</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
            <div>
                <h2 class="text-4xl font-black tracking-tighter uppercase italic">Team Roster</h2>
                <p class="text-gray-500 font-medium max-w-md">Edit profiles, track recruiting status, or prune the roster to keep data clean.</p>
            </div>
            <div class="relative w-full md:w-80 group">
                <input type="text" id="roster-search" placeholder="Search athlete name..." 
                       class="w-full bg-gray-900 border-2 border-gray-800 px-5 py-3 rounded-xl outline-none focus:border-red-600 transition-all text-sm font-bold placeholder:text-gray-600">
                <div class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-600 group-focus-within:text-red-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>
            </div>
        </div>

        <div class="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden shadow-2xl">
            <div id="roster-table" data-theme-ignore="true"></div>
        </div>
    </main>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc, updateDoc, query, where, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { applyTheme } from './theme.js';

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- Table Definition ---
        const table = new Tabulator("#roster-table", {
            layout: "fitColumns",
            responsiveLayout: "collapse",
            pagination: "local",
            paginationSize: 15,
            placeholder: "Searching Database...",
            columns: [
                {
                    title: "ATHLETE NAME", 
                    field: "fullName", 
                    widthGrow: 2, 
                    formatter: (cell) => `<div class="py-1"><span class="block font-black text-white tracking-tight uppercase leading-none">${cell.getValue() || "Unnamed"}</span></div>`
                },
                {title: "CLASS", field: "gradYear", width: 90, hozAlign: "center", cssClass: "text-gray-400 font-bold"},
                {title: "OFF.", field: "offPrimary", width: 80, hozAlign: "center", cssClass: "text-red-600 font-black italic"},
                {title: "DEF.", field: "defPrimary", width: 80, hozAlign: "center", cssClass: "text-blue-500 font-black italic"},
                {
                    title: "NEXT-LEVEL", 
                    field: "nextLevelComplete", 
                    width: 130, 
                    hozAlign: "center",
                    formatter: "tickCross", 
                    formatterParams: { allowEmpty: true, crossElement: false },
                    cellClick: async function(e, cell) {
                        const newVal = !cell.getValue();
                        const rowData = cell.getRow().getData();
                        if (confirm(`Toggle recruiting status for ${rowData.fullName}?`)) {
                            try {
                                await updateDoc(doc(db, "recruiting_profiles", rowData.id), { nextLevelComplete: newVal });
                                cell.setValue(newVal);
                            } catch (err) { alert("Update failed."); }
                        }
                    }
                },
                {
                    title: "COMMANDS", 
                    width: 200, 
                    hozAlign: "right", 
                    headerSort: false,
                    formatter: function() {
                        return `
                            <div class="flex gap-2 justify-end pr-2">
                                <button class="edit-btn bg-white/5 hover:bg-white text-white hover:text-black px-4 py-1.5 rounded-md text-[10px] font-black transition-all border border-white/10 italic">EDIT</button>
                                <button class="delete-btn bg-red-900/10 hover:bg-red-600 text-red-600 hover:text-white px-4 py-1.5 rounded-md text-[10px] font-black transition-all border border-red-900/20 italic">DELETE</button>
                            </div>
                        `;
                    },
                    cellClick: function(e, cell) {
                        const rowData = cell.getRow().getData();
                        if (e.target.classList.contains('edit-btn')) {
                            window.location.href = `profile.html?id=${rowData.id}`;
                        }
                        if (e.target.classList.contains('delete-btn')) {
                            // Pointing specifically to the new robust global function
                            window.deleteAthlete(rowData.id, rowData.fullName);
                        }
                    }
                }
            ]
        });

        async function loadRoster(schoolID) {
            try {
                window.currentSchoolId = schoolID;
                const q = query(
                    collection(db, "users"), 
                    where("schoolId", "==", schoolID), 
                    where("role", "==", "player")
                );
                
                const userSnap = await getDocs(q);
                const athleteData = await Promise.all(userSnap.docs.map(async (userDoc) => {
                    const userData = userDoc.data();
                    const profileDoc = await getDoc(doc(db, "recruiting_profiles", userDoc.id));
                    const profileData = profileDoc.exists() ? profileDoc.data() : {};
                    
                    const calculatedName = userData.fullName || 
                                         ((userData.firstName || "") + " " + (userData.lastName || "")).trim() || 
                                         "Unnamed Player";

                    return {
                        id: userDoc.id,
                        fullName: calculatedName,
                        gradYear: userData.gradYear || "N/A",
                        offPrimary: profileData.offPrimary || userData.offPrimary || "-",
                        defPrimary: profileData.defPrimary || userData.defPrimary || "-",
                        nextLevelComplete: profileData.nextLevelComplete || false,
                        ...profileData
                    };
                }));

                table.setData(athleteData);
                const countEl = document.getElementById('player-count');
                if (countEl) countEl.innerText = `${athleteData.length} ATHLETES ON FILE`;

            } catch (err) {
                console.error("❌ Roster Load Error:", err);
            }
        }

        // --- Updated Global Delete Athlete Logic ---
        window.deleteAthlete = async (athleteId, athleteName) => {
            // 1. Initial Prompt for verification
            const typedName = prompt(`To confirm deletion, type the athlete's name exactly: ${athleteName.toUpperCase()}`);
            
            if (typedName === null) return; // User cancelled

            // 2. The Misspell Check (Your requested feedback)
            if (typedName.trim().toLowerCase() !== athleteName.trim().toLowerCase()) {
                alert(`ERROR: "${typedName}" does not match "${athleteName}". Deletion unsuccessful.`);
                return;
            }

            // 3. Final Confirmation
            if (!confirm("LAST WARNING: This will permanently wipe all stats and the user account. Proceed?")) return;

            try {
                const profileRef = doc(db, "recruiting_profiles", athleteId);
                const userRef = doc(db, "users", athleteId);
                
                const athleteSnap = await getDoc(profileRef);
                const batch = writeBatch(db);

                if (!athleteSnap.exists()) {
                    console.warn("Profile doc missing. Attempting user cleanup.");
                    await deleteDoc(userRef);
                } else {
                    const athleteData = athleteSnap.data();
                    const sCheck = athleteData.school_id || athleteData.schoolId;

                    if (sCheck && sCheck !== window.currentSchoolId) {
                        alert("PERMISSION DENIED: Unauthorized access.");
                        return;
                    }

                    batch.delete(profileRef);
                    batch.delete(userRef);
                    await batch.commit();
                }
                
                alert(`SUCCESS: ${athleteName.toUpperCase()} has been removed.`);
                
                // Reload the roster to update the table
                if (window.currentSchoolId) {
                    loadRoster(window.currentSchoolId);
                } else {
                    location.reload();
                }

            } catch (error) {
                console.error("Deletion Error:", error);
                alert(`CRITICAL ERROR: ${error.message}`);
            }
        };

        const searchInput = document.getElementById("roster-search");
        if (searchInput) {
            searchInput.addEventListener("input", (e) => table.setFilter("fullName", "like", e.target.value));
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const coachSnap = await getDoc(doc(db, "users", user.uid));
                if (coachSnap.exists()) {
                    const coachData = coachSnap.data();
                    const sID = coachData.school_id || coachData.schoolId;
                    if (sID) {
                        window.currentSchoolId = sID;
                        await applyTheme(db, sID);
                        loadRoster(sID);
                    }
                }
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
