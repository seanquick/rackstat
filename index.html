<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RACKSTAT | Athlete Lobby</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<header class="brand-header flex flex-col items-center py-10 space-y-10">
    <img src="images/rackstat-logo.png" alt="RACKSTAT" class="h-28 w-auto drop-shadow-[0_0_20px_rgba(185,28,28,0.4)] transition-transform duration-500 hover:scale-105">

    <div id="school-branding" class="flex items-center justify-center gap-8" style="display: none;">
        <img id="school-logo-1" src="images/panther-logo1.png" class="h-16 w-auto opacity-90 object-contain">
        
        <div class="flex items-center">
            <div class="h-8 w-[2px] bg-red-700"></div>
            <h2 id="school-name-display" class="text-3xl font-black italic uppercase tracking-tighter text-white px-6">
                Fairbanks High School
            </h2>
            <div class="h-8 w-[2px] bg-red-700"></div>
        </div>

        <img id="school-logo-2" src="images/panther-logo2.png" class="h-16 w-auto opacity-90 object-contain">
    </div>
</header>

    <div class="container">
        <div id="auth-section">
            <h2 class="text-center font-black uppercase tracking-widest text-sm mb-6">Athlete Login</h2>
            <div id="login-form" class="space-y-4">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                <button type="button" onclick="handleLogin()" class="btn-primary">Login to Rackstat</button>
            </div>
            
            <div class="mt-8 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">
                    New Athlete? <a href="signup.html" class="text-red-600 hover:underline">Create Account</a>
                </p>
            </div>
        </div>

        <div id="main-menu" class="hidden space-y-4 p-6">
            <h2 id="welcome-msg" class="text-xl font-black italic uppercase text-center mb-6"></h2>
            
            <div class="grid grid-cols-1 gap-4">
            
            <button onclick="location.href='board.html'" class="btn-primary w-full py-4 text-lg bg-red-700 border-red-900 mb-4">
                THE BOARD
            </button>

            <button onclick="location.href='rack.html'" class="btn-primary w-full py-4 text-lg bg-slate-800 border-slate-900 mb-4">
                THE RACK
            </button>

            <button onclick="location.href='kitchen.html'" class="btn-primary w-full py-4 text-lg bg-green-700 border-green-900 mb-4">
                THE KITCHEN
            </button>

            <button onclick="location.href='next-level.html'" class="btn-primary w-full py-4 text-lg bg-red-700 border-red-900 mb-4">
                NEXT LEVEL RECRUITING
            </button>

            <button onclick="location.href='profile.html'" class="btn-primary w-full py-4 text-lg bg-blue-700 border-blue-900">
                MY PROFILE
            </button>
            </div>

            <button onclick="handleLogout()" class="w-full mt-8 text-[14px] font-bold uppercase text-gray-500 hover:text-white transition-colors">
                Sign Out / Switch User
            </button>
        </div>
    </div>

    <script type="module">
            // 1. Pull the config from your central file
            import { firebaseConfig } from './firebase-config.js';

            // 2. Pull the tools from Google's servers
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
            import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
            import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

            // 3. Initialize using the imported config
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            
            // ... rest of your code ...

        // LOGIN FUNCTION
        window.handleLogin = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            
            try { 
                await signInWithEmailAndPassword(auth, email, pass);
                // location.reload() is fine, but checking auth state will handle the rest
            } catch (e) { 
                alert("Login failed: " + e.message); 
            }
        };

        // FIX handleLogout
            window.handleLogout = async () => {
                try {
                    await signOut(auth);
                    console.log("User signed out successfully");
                    window.location.href = 'index.html'; // Or wherever your lobby is
                } catch (error) {
                    console.error("Error signing out:", error);
                    alert("Logout failed. Please try again.");
                }
            };

        onAuthStateChanged(auth, async (user) => {
            const authSection = document.getElementById('auth-section');
            const mainMenu = document.getElementById('main-menu');
            
            if (user) {
                try {
                    const userSnap = await getDoc(doc(db, "users", user.uid));
                    
                    if (userSnap.exists()) {
                        const userData = userSnap.data();

                        if (userData.role === 'coach') {
                            window.location.href = 'coach-dashboard.html';
                            return; 
                        }
                        
                        // --- NEW: CHECK SCHOOL SETTINGS FOR THE RECRUITING CARD ---
                        if (userData.school_id) {
                            const schoolSnap = await getDoc(doc(db, "schools", userData.school_id));
                            if (schoolSnap.exists()) {
                                const schoolData = schoolSnap.data();
                                
                                // Look for your Recruiting Card button/link
                                const recruitingBtn = document.getElementById('btn-recruiting-card'); 
                                
                                if (schoolData.hasRecruitingCard === false) {
                                    if (recruitingBtn) recruitingBtn.classList.add('hidden');
                                    console.log("Recruiting feature disabled by coach.");
                                } else {
                                    if (recruitingBtn) recruitingBtn.classList.remove('hidden');
                                }
                            }
                        }
                        // ---------------------------------------------------------

                        authSection.classList.add('hidden');
                        mainMenu.classList.remove('hidden');
                        document.getElementById('welcome-msg').innerText = `Welcome, ${userData.fullName || 'Athlete'}`;
                        
                    }
                } catch (err) {
                    console.error("Auth Error:", err);
                }
            } else {
                authSection.classList.remove('hidden');
                mainMenu.classList.add('hidden');
            }
        });

        // Check Recruiting Profile Status
            const recruitingDoc = await getDoc(doc(db, "recruiting_profiles", user.uid));
            const statusLabel = document.getElementById('recruiting-status'); // Add an ID to your UI if you want to show this

            if (recruitingDoc.exists()) {
                const data = recruitingDoc.data();
                // If they haven't updated in 30 days, warn them
                const lastUpdate = new Date(data.lastUpdated);
                const daysSinceUpdate = (new Date() - lastUpdate) / (1000 * 60 * 60 * 24);
                
                if (daysSinceUpdate > 30) {
                    statusLabel.innerText = "⚠️ Profile Outdated";
                    statusLabel.className = "text-[9px] font-black text-yellow-400 uppercase";
                } else {
                    statusLabel.innerText = "✅ Profile Active";
                    statusLabel.className = "text-[9px] font-black text-green-400 uppercase";
                }
            } else {
                statusLabel.innerText = "❌ Profile Incomplete";
            }
    </script>
</body>
</html>
