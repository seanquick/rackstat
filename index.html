<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAGNOSTIC MODE | RACKSTAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            background-color: #1a1a1a !important;
            color: white !important;
            margin: 0;
            padding: 0;
            display: block !important;
            height: 100%;
        }
        #emergency-check {
            background: yellow;
            color: black;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            display: block !important;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="emergency-check">INITIALIZING...</div>

    <div class="container mx-auto max-w-md px-6 py-24 text-center">
        <img src="images/rackstat-logo.png" alt="RACKSTAT" class="h-20 mx-auto mb-10">
        
        <div id="auth-section" style="display: block !important;">
            <h1 class="text-2xl font-bold mb-6 italic uppercase">Athlete Login</h1>
            <div class="space-y-4 text-left">
                <div class="bg-zinc-900 p-4 rounded border border-zinc-800">
                    <label class="text-[10px] font-black uppercase text-gray-500">Email</label>
                    <input type="email" id="email" placeholder="athlete@school.edu" class="w-full bg-transparent outline-none">
                </div>
                <div class="bg-zinc-900 p-4 rounded border border-zinc-800">
                    <label class="text-[10px] font-black uppercase text-gray-500">Password</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full bg-transparent outline-none">
                </div>
                <button id="login-btn" class="w-full bg-red-600 p-4 rounded font-black uppercase tracking-widest hover:bg-red-700 transition-colors">
                    Login to Rackstat
                </button>
            </div>
        </div>

        <div id="main-menu" class="hidden">
            <h1 id="welcome-msg" class="text-2xl font-bold italic uppercase"></h1>
            <p class="mt-4 text-gray-400">Successfully Logged In</p>
        </div>
    </div>

<script type="module">
    // 1. IMPORTS MUST BE AT THE VERY TOP
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const status = (msg) => {
        const el = document.getElementById('emergency-check');
        if (el) el.innerText = msg;
        console.log(msg);
    };

    // 2. ONLY LOGIC GOES INSIDE THE TRY BLOCK
    try {
        status("Connecting to Firebase...");
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        status("Firebase Ready. Checking session...");

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                status("User detected: " + user.email);
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    document.getElementById('auth-section').style.setProperty('display', 'none', 'important');
                    document.getElementById('main-menu').classList.remove('hidden');
                    document.getElementById('welcome-msg').innerText = "Welcome, " + snap.data().fullName;
                    status("Lobby Active");
                } else {
                    status("User logged in, but no profile found in Firestore.");
                }
            } else {
                status("No active session. Please login.");
            }
        });

        document.getElementById('login-btn').onclick = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            status("Attempting login...");
            try { 
                await signInWithEmailAndPassword(auth, e, p); 
            } catch(err) { 
                status("Login Error: " + err.message);
                alert(err.message); 
            }
        };

    } catch (e) {
        status("CRITICAL ERROR: " + e.message);
        console.error(e);
    }
</script>
</body>
</html>
