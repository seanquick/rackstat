<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RACKSTAT | Athlete Lobby</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --school-primary: #dc2626; } 
        body { background-color: #000; color: #fff; }
        .btn-primary-dynamic { background-color: var(--school-primary); border-bottom: 4px solid rgba(0,0,0,0.3); }
        /* Force display of the auth section initially to prevent black screen */
        #auth-section { display: block; }
        #main-menu { display: none; }
    </style>
</head>
<body class="font-sans antialiased">

<header class="flex flex-col items-center py-10 space-y-6">
    <img src="images/rackstat-logo.png" alt="RACKSTAT" class="h-20 w-auto">
    <div id="school-branding" class="opacity-0 flex items-center justify-center gap-6">
        <h2 id="school-name-display" class="text-2xl font-black italic uppercase"></h2>
    </div>
</header>

<div class="container mx-auto max-w-md px-6 pb-20">
    <div id="auth-section">
        <h2 class="text-center font-black uppercase tracking-widest text-xs mb-8 text-gray-500">Athlete Login</h2>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="Email" class="w-full bg-[#111] border border-gray-800 p-4 rounded-xl outline-none">
            <input type="password" id="password" placeholder="Password" class="w-full bg-[#111] border border-gray-800 p-4 rounded-xl outline-none">
            <button type="button" id="login-btn" class="w-full bg-red-600 font-black py-4 rounded-xl uppercase tracking-widest shadow-lg">
                Login to Rackstat
            </button>
        </div>
    </div>

    <div id="main-menu">
        <h2 id="welcome-msg" class="text-2xl font-black italic uppercase text-center mb-8"></h2>
        <div class="grid grid-cols-1 gap-4">
            <button onclick="location.href='board.html'" class="btn-primary-dynamic py-6 rounded-2xl font-black italic uppercase">THE BOARD</button>
            <button onclick="location.href='athlete-workout.html'" class="bg-zinc-800 border-b-4 border-zinc-950 py-6 rounded-2xl font-black italic uppercase">THE RACK</button>
        </div>
        <button id="logout-btn" class="w-full mt-12 text-[10px] font-black uppercase text-gray-600">Sign Out</button>
    </div>
</div>

<script type="module">
    // 1. Log to the screen itself so we can see it on mobile/hosting
    const debug = (msg) => {
        console.log(msg);
        // Optional: Uncomment next line to see debug text on the black screen
        // document.body.insertAdjacentHTML('beforeend', `<p style="color:green; font-size:10px">${msg}</p>`);
    };

    debug("Script started...");

    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    
    // Attempting theme import
    let applyTheme;
    try {
        const themeModule = await import('./theme.js');
        applyTheme = themeModule.applyTheme;
        debug("Theme engine loaded.");
    } catch(e) {
        debug("Theme engine failed to load - continuing anyway.");
    }

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        const authSection = document.getElementById('auth-section');
        const mainMenu = document.getElementById('main-menu');

        if (user) {
            debug("User detected: " + user.uid);
            try {
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if (userSnap.exists()) {
                    authSection.style.display = 'none';
                    mainMenu.style.display = 'block';
                    document.getElementById('welcome-msg').innerText = "Welcome Back";
                    
                    // Background Theme Load
                    if (applyTheme) {
                        const sId = userSnap.data().schoolId || userSnap.data().school_id;
                        await applyTheme(db, sId);
                    }
                }
            } catch (e) { debug("Firestore Error: " + e.message); }
        } else {
            debug("No user session. Showing login.");
            authSection.style.display = 'block';
            mainMenu.style.display = 'none';
        }
    });

    document.getElementById('login-btn').addEventListener('click', async () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        try { await signInWithEmailAndPassword(auth, e, p); } 
        catch (err) { alert(err.message); }
    });

    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth).then(() => location.reload()));
</script>
</body>
</html>
