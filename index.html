<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RACKSTAT | Athlete Lobby</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<header class="brand-header flex flex-col items-center py-10 space-y-10">
    <img src="images/rackstat-logo.png" alt="RACKSTAT" class="h-28 w-auto drop-shadow-[0_0_20px_rgba(185,28,28,0.4)] transition-transform duration-500 hover:scale-105">

    <div id="school-branding" class="flex items-center justify-center gap-8" style="display: none;">
        <img id="school-logo-1" src="images/panther-logo1.png" class="h-16 w-auto opacity-90 object-contain">
        
        <div class="flex items-center">
            <div class="h-8 w-[2px] bg-red-700"></div>
            <h2 id="school-name-display" class="text-3xl font-black italic uppercase tracking-tighter text-white px-6">
                Fairbanks High School
            </h2>
            <div class="h-8 w-[2px] bg-red-700"></div>
        </div>

        <img id="school-logo-2" src="images/panther-logo2.png" class="h-16 w-auto opacity-90 object-contain">
    </div>
</header>

    <div class="container">
        <div id="auth-section">
            <h2 class="text-center font-black uppercase tracking-widest text-sm mb-6">Athlete Login</h2>
            <div id="login-form" class="space-y-4">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                <button type="button" onclick="handleLogin()" class="btn-primary">Login to Rackstat</button>
            </div>
            
            <div class="mt-8 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">
                    New Athlete? <a href="signup.html" class="text-red-600 hover:underline">Create Account</a>
                </p>
            </div>
        </div>

        <div id="main-menu" class="hidden space-y-4 p-6">
            <h2 id="welcome-msg" class="text-xl font-black italic uppercase text-center mb-6"></h2>
            
            <div id="quick-workout-container" class="mb-8"></div>

            <div class="grid grid-cols-1 gap-4">
                <button onclick="location.href='board.html'" class="btn-primary w-full py-4 text-lg bg-red-700 border-red-900 mb-4">
                    THE BOARD
                </button>

                <button onclick="location.href='athlete-workout.html'" class="btn-primary w-full py-4 text-lg bg-slate-800 border-slate-900 mb-4">
                    THE RACK
                </button>

                <button id="btn-kitchen" onclick="location.href='kitchen.html'" class="btn-primary w-full py-4 text-lg bg-green-700 border-green-900 mb-4">
                    THE KITCHEN
                </button>

                <button id="btn-recruiting-card" onclick="location.href='next-level.html'" class="btn-primary w-full py-4 text-lg bg-red-700 border-red-900 mb-4">
                    NEXT LEVEL RECRUITING
                </button>

                <button onclick="location.href='profile.html'" class="btn-primary w-full py-4 text-lg bg-blue-700 border-blue-900">
                    MY PROFILE
                </button>
            </div>

            <button onclick="handleLogout()" class="w-full mt-8 text-[14px] font-bold uppercase text-gray-500 hover:text-white transition-colors">
                Sign Out / Switch User
            </button>
        </div>
    </div>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // Added collection, query, orderBy, getDocs, limit to the imports below
        import { getFirestore, doc, getDoc, collection, query, orderBy, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // LOGIN FUNCTION
        window.handleLogin = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            try { 
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) { 
                alert("Login failed: " + e.message); 
            }
        };

        // LOGOUT FUNCTION
        window.handleLogout = async () => {
            try {
                await signOut(auth);
                window.location.href = 'index.html';
            } catch (error) {
                console.error("Error signing out:", error);
            }
        };

        // QUICK WORKOUT LOADER
        async function loadQuickWorkout(schoolId) {
            const container = document.getElementById('quick-workout-container');
            if(!container) return;

            try {
                const workoutRef = collection(db, "schools", schoolId, "workouts");
                const q = query(workoutRef, orderBy("createdAt", "desc"), limit(1));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const workoutDoc = querySnapshot.docs[0];
                    const data = workoutDoc.data();
                    
                    container.innerHTML = `
                        <div class="bg-[#1a1a1c] border-l-4 border-[#b91c1c] p-6 rounded-r-xl shadow-2xl transition-transform hover:scale-[1.01]">
                            <span class="text-[#b91c1c] font-black text-xs uppercase italic tracking-widest">Active Session</span>
                            <h2 class="text-white text-2xl font-black uppercase italic mt-1">${data.title}</h2>
                            <p class="text-gray-500 text-xs font-bold uppercase mb-4">Week ${data.week || 1}</p>
                            <a href="athlete-workout.html?id=${workoutDoc.id}" 
                               class="inline-block bg-[#b91c1c] text-white font-black uppercase px-6 py-3 rounded-lg text-sm tracking-widest hover:bg-red-700 transition-colors">
                               Start Workout →
                            </a>
                        </div>
                    `;
                }
            } catch (err) {
                console.error("Error loading quick workout:", err);
            }
        }

        onAuthStateChanged(auth, async (user) => {
            const authSection = document.getElementById('auth-section');
            const mainMenu = document.getElementById('main-menu');
            
            if (user) {
                try {
                    const userSnap = await getDoc(doc(db, "users", user.uid));
                    
                    if (userSnap.exists()) {
                        const userData = userSnap.data();

                        if (userData.role === 'coach') {
                            window.location.href = 'coach-dashboard.html';
                            return; 
                        }

                        const recruitingDoc = await getDoc(doc(db, "recruiting_profiles", user.uid));
                        const recruitingBtn = document.getElementById('btn-recruiting-card');

                        if (recruitingDoc.exists()) {
                            const profileData = recruitingDoc.data();
                            const schoolId = profileData.school_id || profileData.schoolId;
                            
                            if (schoolId) {
                                // TRIGGER THE QUICK WORKOUT LOAD
                                loadQuickWorkout(schoolId);

                                const schoolSnap = await getDoc(doc(db, "schools", schoolId));
                                if (schoolSnap.exists()) {
                                    const schoolData = schoolSnap.data();
                                    if (schoolData.hasRecruitingCard === false) {
                                        if (recruitingBtn) recruitingBtn.classList.add('hidden');
                                    }
                                }
                            }
                        }

                        authSection.classList.add('hidden');
                        mainMenu.classList.remove('hidden');
                        document.getElementById('welcome-msg').innerText = `Welcome, ${userData.fullName || 'Athlete'}`;
                    }
                } catch (err) {
                    console.error("Auth Error:", err);
                }
            } else {
                authSection.classList.remove('hidden');
                mainMenu.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
