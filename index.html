<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RACKSTAT | Athlete Lobby</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">

<header class="brand-header flex flex-col items-center py-10 space-y-10">
    <img src="images/rackstat-logo.png" alt="RACKSTAT" class="h-28 w-auto drop-shadow-[0_0_20px_rgba(185,28,28,0.4)] transition-transform duration-500 hover:scale-105">

    <div id="school-branding" class="flex items-center justify-center gap-8" style="display: none;">
        <img id="school-logo-1" src="images/panther-logo1.png" class="h-16 w-auto opacity-90 object-contain">
        
        <div class="flex items-center">
            <div class="h-8 w-[2px] bg-red-700"></div>
            <h2 id="school-name-display" class="text-3xl font-black italic uppercase tracking-tighter text-white px-6">
                Fairbanks High School
            </h2>
            <div class="h-8 w-[2px] bg-red-700"></div>
        </div>

        <img id="school-logo-2" src="images/panther-logo2.png" class="h-16 w-auto opacity-90 object-contain">
    </div>
</header>

    <div class="container mx-auto max-w-md px-6">
        <div id="auth-section">
            <h2 class="text-center font-black uppercase tracking-widest text-sm mb-6">Athlete Login</h2>
            <div id="login-form" class="space-y-4">
                <div class="form-group bg-[#111] p-4 rounded-lg border border-gray-800">
                    <label class="block text-[10px] font-black uppercase text-gray-500 mb-1">Email Address</label>
                    <input type="email" id="email" placeholder="email" class="w-full bg-transparent text-white outline-none">
                </div>
                <div class="form-group bg-[#111] p-4 rounded-lg border border-gray-800">
                    <label class="block text-[10px] font-black uppercase text-gray-500 mb-1">Password</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full bg-transparent text-white outline-none">
                </div>
                <button type="button" onclick="handleLogin()" class="w-full bg-red-700 hover:bg-red-600 text-white font-black py-4 rounded-lg uppercase tracking-widest transition-all">
                    Login to Rackstat
                </button>
            </div>
            
            <div class="mt-8 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">
                    New Athlete? <a href="signup.html" class="text-red-600 hover:underline">Create Account</a>
                </p>
            </div>
        </div>

        <div id="main-menu" class="hidden space-y-6 py-4">
            <h2 id="welcome-msg" class="text-xl font-black italic uppercase text-center mb-8 text-gray-300 tracking-tight"></h2>
            
            <div class="grid grid-cols-1 gap-4">
                <button onclick="location.href='board.html'" class="group relative overflow-hidden bg-red-700 border-b-4 border-red-900 py-6 rounded-xl transition-transform active:scale-95">
                    <span class="relative z-10 text-2xl font-black italic uppercase italic">THE BOARD</span>
                </button>

                <button onclick="location.href='athlete-workout.html'" class="group relative overflow-hidden bg-slate-800 border-b-4 border-slate-900 py-6 rounded-xl transition-transform active:scale-95">
                    <span class="relative z-10 text-2xl font-black italic uppercase italic">THE RACK</span>
                </button>

                <button id="btn-kitchen" onclick="location.href='kitchen.html'" class="group relative overflow-hidden bg-green-700 border-b-4 border-green-900 py-6 rounded-xl transition-transform active:scale-95">
                    <span class="relative z-10 text-2xl font-black italic uppercase italic">THE KITCHEN</span>
                </button>

                <button id="btn-recruiting-card" onclick="location.href='next-level.html'" class="group relative overflow-hidden bg-red-700 border-b-4 border-red-900 py-6 rounded-xl transition-transform active:scale-95">
                    <span class="relative z-10 text-xl font-black italic uppercase italic leading-none">NEXT LEVEL<br><span class="text-sm tracking-[0.3em]">RECRUITING</span></span>
                </button>

                <button onclick="location.href='profile.html'" class="group relative overflow-hidden bg-blue-700 border-b-4 border-blue-900 py-6 rounded-xl transition-transform active:scale-95">
                    <span class="relative z-10 text-2xl font-black italic uppercase italic">MY PROFILE</span>
                </button>
            </div>

            <button onclick="handleLogout()" class="w-full mt-12 text-[12px] font-black uppercase text-gray-600 hover:text-white tracking-widest transition-colors">
                Sign Out / Switch User
            </button>
        </div>
    </div>

    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // LOGIN FUNCTION
        window.handleLogin = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            try { 
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) { 
                alert("Login failed: " + e.message); 
            }
        };

        // LOGOUT FUNCTION
        window.handleLogout = async () => {
            try {
                await signOut(auth);
                window.location.href = 'index.html';
            } catch (error) {
                console.error("Error signing out:", error);
            }
        };

        // AUTH STATE LISTENER
        onAuthStateChanged(auth, async (user) => {
            const authSection = document.getElementById('auth-section');
            const mainMenu = document.getElementById('main-menu');
            const branding = document.getElementById('school-branding');
            
            if (user) {
                try {
                    const userSnap = await getDoc(doc(db, "users", user.uid));
                    
                    if (userSnap.exists()) {
                        const userData = userSnap.data();

                        // Redirect Coaches
                        if (userData.role === 'coach') {
                            window.location.href = 'coach-dashboard.html';
                            return; 
                        }

                        // Handle School Branding
                        const schoolId = userData.schoolId || userData.school_id;
                        if (schoolId) {
                            const schoolSnap = await getDoc(doc(db, "schools", schoolId));
                            if (schoolSnap.exists()) {
                                const schoolData = schoolSnap.data();
                                document.getElementById('school-name-display').innerText = schoolData.name || "My School";
                                branding.style.display = 'flex';
                                
                                // Toggle Recruiting Card visibility
                                const recruitingBtn = document.getElementById('btn-recruiting-card');
                                if (schoolData.hasRecruitingCard === false && recruitingBtn) {
                                    recruitingBtn.classList.add('hidden');
                                }
                            }
                        }

                        // UI Transition
                        authSection.classList.add('hidden');
                        mainMenu.classList.remove('hidden');
                        document.getElementById('welcome-msg').innerText = `Welcome, ${userData.fullName || 'Athlete'}`;
                    }
                } catch (err) {
                    console.error("Auth Error:", err);
                }
            } else {
                authSection.classList.remove('hidden');
                mainMenu.classList.add('hidden');
                branding.style.display = 'none';
            }
        });
    </script>
</body>
</html>
