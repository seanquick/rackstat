<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RackStat | Session Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #0a0a0b; color: white; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .pr-badge {
            background-color: var(--school-primary);
            box-shadow: 0 0 12px var(--school-primary);
        }
    </style>
</head>
<body class="bg-[#0a0a0b] text-white antialiased min-h-screen">

    <div class="max-w-5xl mx-auto p-6">
        <div class="flex justify-between items-end border-b border-[#2a2a2c] pb-6 mb-8 gap-4 flex-wrap">
            <div class="flex items-center gap-6 min-w-0">
                <div class="logo-container-fixed">
                    <img src="" id="coach-school-logo" class="school-logo-primary" alt="Logo" style="display: none;" onerror="this.style.display='none'">
                </div>
                <div>
                    <h2 class="text-[10px] font-black text-[var(--school-primary)] uppercase tracking-[0.2em] mb-1">Intelligence</h2>
                    <h1 class="text-4xl font-black uppercase tracking-tighter italic">Session Review</h1>
                    <p id="review-status" class="text-[9px] font-bold text-gray-500 uppercase tracking-widest mt-2">Initializing</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button
                    onclick="location.href='help-coach.html'"
                    class="text-xs font-bold text-gray-500 hover:text-white transition-colors uppercase tracking-widest">
                    Help / Coach Guide
                </button>

                <button
                    onclick="location.href='coach-lobby.html'"
                    class="text-xs font-bold text-gray-500 hover:text-white transition-colors uppercase tracking-widest">
                    ← Coach Lobby
                </button>
            </div>
        </div>

        <div id="review-page-message" class="hidden mb-6">
            <div id="review-page-message-box" class="rounded-xl border p-4 text-xs font-bold uppercase tracking-wider"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <button id="tab-parent-requests" class="review-tab bg-[#161618] border border-red-600 p-5 rounded-2xl text-left">
                <p class="text-[9px] font-black uppercase tracking-widest text-red-500">Queue</p>
                <h3 class="text-xl font-black uppercase italic text-white">Parent Requests</h3>
                <p id="parent-request-count" class="text-[10px] text-gray-500 font-bold uppercase mt-2">Loading...</p>
            </button>

            <button id="tab-rack-reviews" class="review-tab bg-[#161618] border border-[#2a2a2c] p-5 rounded-2xl text-left">
                <p class="text-[9px] font-black uppercase tracking-widest text-red-500">Queue</p>
                <h3 class="text-xl font-black uppercase italic text-white">Rack PR Reviews</h3>
                <p id="rack-review-count" class="text-[10px] text-gray-500 font-bold uppercase mt-2">Loading...</p>
            </button>

            <button id="tab-workout-reviews" class="review-tab bg-[#161618] border border-[#2a2a2c] p-5 rounded-2xl text-left">
                <p class="text-[9px] font-black uppercase tracking-widest text-red-500">Queue</p>
                <h3 class="text-xl font-black uppercase italic text-white">Workout Sessions</h3>
                <p id="workout-review-count" class="text-[10px] text-gray-500 font-bold uppercase mt-2">Loading...</p>
            </button>

            <button id="tab-athlete-alerts" class="review-tab bg-[#161618] border border-[#2a2a2c] p-5 rounded-2xl text-left">
                <p class="text-[9px] font-black uppercase tracking-widest text-red-500">Queue</p>
                <h3 class="text-xl font-black uppercase italic text-white">Athlete Alerts</h3>
                <p id="athlete-alert-count" class="text-[10px] text-gray-500 font-bold uppercase mt-2">Loading...</p>
            </button>
        </div>

        <div id="review-content-grid" class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div id="review-sidebar" class="lg:col-span-1 space-y-4 hidden">
                <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-4">Select Review Queue</h3>
                <div id="workout-list" class="space-y-2 max-h-[70vh] overflow-y-auto hide-scroll">
                    <div class="animate-pulse bg-[#1a1a1c] h-12 rounded-lg w-full"></div>
                </div>
            </div>

            <div id="review-main-panel" class="lg:col-span-4">
                <div id="stats-header" class="hidden grid grid-cols-3 gap-4 mb-6">
                    <div class="bg-[#1a1a1c] p-4 rounded-xl border border-[#2a2a2c]">
                        <span class="block text-[9px] font-black text-gray-500 uppercase">Items</span>
                        <span id="stat-count" class="text-2xl font-black italic">--</span>
                    </div>
                </div>

                <div id="review-queue-container" class="space-y-4"></div>

                <div id="performance-feed" class="space-y-4 hidden">
                    <div class="text-center py-20 border-2 border-dashed border-[#2a2a2c] rounded-3xl">
                        <p class="text-gray-600 uppercase text-xs font-bold tracking-widest">Select a review queue on the left to see results</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { db, auth, appCheckReady } from "./js/firebase-config.js";
    import { doc, getDoc, collection, query, where, getDocs, orderBy, limit, setDoc, addDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { applyTheme } from './js/theme.js';
    import { buildLiftWritebacks, slugify } from "./js/board-score.js";

    let currentSchoolId = null;
    let currentWorkoutId = null;
    let currentWorkoutName = "";
    let currentViewMode = "workout";

    const officialMaxCache = new Map();

    const workoutList = document.getElementById('workout-list');
    const performanceFeed = document.getElementById('performance-feed');
    const statCount = document.getElementById('stat-count');
    const statsHeader = document.getElementById('stats-header');
    const reviewStatus = document.getElementById('review-status');
    const pageMessageWrap = document.getElementById('review-page-message');
    const pageMessageBox = document.getElementById('review-page-message-box');

    const reviewSidebar = document.getElementById('review-sidebar');
    const reviewMainPanel = document.getElementById('review-main-panel');

    function getSchoolIdFromData(data = {}) {
        return data.schoolId || data.school_id || "";
    }

    function getDisplayName(data = {}) {
        if (data.fullName && String(data.fullName).trim()) {
            return String(data.fullName).trim();
        }

        const first = String(data.firstName || "").trim();
        const last = String(data.lastName || "").trim();
        const combined = `${first} ${last}`.trim();

        return combined || "Unknown Athlete";
    }

    function getWeightClass(bw) {
        const numericBw = Number(bw) || 0;
        if (!numericBw || numericBw > 250) return "UNLIMITED";

        const weightClasses = [125, 135, 145, 155, 165, 175, 185, 195, 210, 225, 250];
        return weightClasses.find(c => numericBw <= c) || "UNLIMITED";
    }

    function getNumericBodyweight(maxes = {}, athleteData = {}, workoutLog = {}) {
        return Number(
            workoutLog.weighInWeight ??
            workoutLog.bodyWeight ??
            workoutLog.body_weight ??
            workoutLog.weight ??
            maxes.bodyWeight ??
            maxes.body_weight ??
            maxes.weight ??
            athleteData.bodyWeight ??
            athleteData.body_weight ??
            athleteData.weight ??
            0
        ) || 0;
    }

    function buildExerciseKeyVariations(name = "") {
        const normalized = slugify(name);
        const compact = normalized.replace(/_/g, "");
        const spaced = String(name).toLowerCase().trim();

        return [...new Set([
            normalized,
            spaced,
            compact
        ].filter(Boolean))];
    }

    function getExerciseReviewKey(name = "") {
        return slugify(name);
    }

    function escapeAttr(value = "") {
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }

    function generateParentRegistrationCode() {
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        let code = "PARENT-";

        for (let i = 0; i < 6; i += 1) {
            code += chars.charAt(Math.floor(Math.random() * chars.length));
        }

        return code;
    }

    function setReviewStatus(text, tone = "default") {
        if (!reviewStatus) return;

        reviewStatus.innerText = text;
        reviewStatus.className = "text-[9px] font-bold uppercase tracking-widest mt-2";

        if (tone === "error") reviewStatus.classList.add("text-red-400");
        else if (tone === "success") reviewStatus.classList.add("text-green-400");
        else if (tone === "warn") reviewStatus.classList.add("text-yellow-300");
        else reviewStatus.classList.add("text-gray-500");
    }

    function showPageMessage(message, tone = "warn") {
        if (!pageMessageWrap || !pageMessageBox) return;

        pageMessageWrap.classList.remove('hidden');
        pageMessageBox.innerText = message;
        pageMessageBox.className = "rounded-xl border p-4 text-xs font-bold uppercase tracking-wider";

        if (tone === "error") {
            pageMessageBox.classList.add("bg-red-500/10", "border-red-500/20", "text-red-300");
        } else if (tone === "success") {
            pageMessageBox.classList.add("bg-green-500/10", "border-green-500/20", "text-green-300");
        } else {
            pageMessageBox.classList.add("bg-yellow-500/10", "border-yellow-500/20", "text-yellow-300");
        }
    }

    function hidePageMessage() {
        if (!pageMessageWrap || !pageMessageBox) return;
        pageMessageWrap.classList.add('hidden');
        pageMessageBox.innerText = '';
    }

    function renderWorkoutListMessage(message, tone = "muted") {
        if (!workoutList) return;

        const toneClass = tone === "error"
            ? "text-red-500"
            : tone === "warn"
                ? "text-yellow-300"
                : "text-gray-600";

        workoutList.innerHTML = `<p class="${toneClass} text-[10px] uppercase p-4 font-bold tracking-widest">${message}</p>`;
    }

    function renderFeedMessage(message, tone = "muted") {
        if (!performanceFeed) return;

        const toneClass = tone === "error"
            ? "text-red-400 border-red-500/20"
            : tone === "warn"
                ? "text-yellow-300 border-yellow-500/20"
                : "text-gray-600 border-[#2a2a2c]";

        performanceFeed.innerHTML = `
            <div class="text-center py-20 border-2 border-dashed rounded-3xl ${toneClass}">
                <p class="uppercase text-xs font-bold tracking-widest">${message}</p>
            </div>
        `;
    }

    function setStatsVisible(show) {
        if (!statsHeader) return;
        statsHeader.classList.toggle('hidden', !show);
    }

    function showQueueView(type) {
        if (type === "workout") {
            reviewSidebar.classList.remove("hidden");
            reviewMainPanel.classList.remove("lg:col-span-4");
            reviewMainPanel.classList.add("lg:col-span-3");

            queueContainer.classList.add("hidden");
            performanceFeed.classList.remove("hidden");
            return;
        }

        reviewSidebar.classList.add("hidden");
        reviewMainPanel.classList.remove("lg:col-span-3");
        reviewMainPanel.classList.add("lg:col-span-4");

        if (type === "parents") {
            queueContainer.classList.remove("hidden");
            performanceFeed.classList.add("hidden");
        } else {
            queueContainer.classList.add("hidden");
            performanceFeed.classList.remove("hidden");
        }
    }

    async function getReviewDecision(athleteId, workoutId, exerciseKey, attemptedWeight) {
        if (!currentSchoolId) return null;

        const normalizedWeight = Number(attemptedWeight) || 0;

        try {
            const approvedQ = query(
                collection(db, "approved_max_reviews"),
                where("schoolId", "==", currentSchoolId),
                where("athleteId", "==", athleteId),
                where("workoutId", "==", workoutId || null),
                where("exerciseKey", "==", exerciseKey),
                where("attemptedWeight", "==", normalizedWeight)
            );

            const approvedSnap = await getDocs(approvedQ);
            if (!approvedSnap.empty) {
                return "approved";
            }
        } catch (err) {
            console.warn("Approved review lookup skipped:", err);
        }

        try {
            const rejectedQ = query(
                collection(db, "rejected_max_reviews"),
                where("schoolId", "==", currentSchoolId),
                where("athleteId", "==", athleteId),
                where("workoutId", "==", workoutId || null),
                where("exerciseKey", "==", exerciseKey),
                where("attemptedWeight", "==", normalizedWeight)
            );

            const rejectedSnap = await getDocs(rejectedQ);
            if (!rejectedSnap.empty) {
                return "rejected";
            }
        } catch (err) {
            console.warn("Rejected review lookup skipped:", err);
        }

        return null;
    }

    async function getOfficialApprovedMax(athleteId, exerciseKey, exerciseName = "") {
        if (!athleteId || !currentSchoolId) return 0;

        const variations = [...new Set([
            exerciseKey,
            ...buildExerciseKeyVariations(exerciseName),
            ...buildExerciseKeyVariations(exerciseKey)
        ].filter(Boolean))];

        const cacheKey = `${athleteId}__${variations.sort().join('|')}`;
        if (officialMaxCache.has(cacheKey)) {
            return officialMaxCache.get(cacheKey);
        }

        let best = 0;

        for (const key of variations) {
            try {
                const q = query(
                    collection(db, "approved_max_reviews"),
                    where("schoolId", "==", currentSchoolId),
                    where("athleteId", "==", athleteId),
                    where("exerciseKey", "==", key)
                );

                const snap = await getDocs(q);
                snap.forEach((docSnap) => {
                    const data = docSnap.data();
                    const candidate = Number(data.attemptedWeight || 0) || 0;
                    if (candidate > best) best = candidate;
                });
            } catch (err) {
                console.warn("Approved max lookup skipped:", athleteId, key, err);
            }
        }

        officialMaxCache.set(cacheKey, best);
        return best;
    }

    function clearAthleteOfficialMaxCache(athleteId) {
        const prefix = `${athleteId}__`;
        for (const key of officialMaxCache.keys()) {
            if (key.startsWith(prefix)) {
                officialMaxCache.delete(key);
            }
        }
    }

    function renderParentRequestCards(requestDocs) {
        if (!queueContainer) return;

        queueContainer.innerHTML = "";

        if (!requestDocs.length) {
            queueContainer.innerHTML = `
                <div class="rounded-2xl border border-white/10 bg-[#111113] p-8 text-center">
                    <p class="text-xs font-black uppercase tracking-widest text-gray-500">
                        No parent access requests found.
                    </p>
                </div>
            `;
            return;
        }

        requestDocs.forEach((requestDoc) => {
            const request = requestDoc.data();
            const status = String(request.status || "pending").toLowerCase();

            const statusClass =
                status === "approved"
                    ? "bg-green-500/10 text-green-300 border-green-500/20"
                    : status === "rejected"
                        ? "bg-red-500/10 text-red-300 border-red-500/20"
                        : "bg-yellow-500/10 text-yellow-300 border-yellow-500/20";

            const card = document.createElement("div");
            card.className = "rounded-2xl border border-white/10 bg-[#111113] p-5 shadow-xl";

            card.innerHTML = `
                <div class="flex justify-between items-start gap-4 flex-wrap">
                    <div>
                        <p class="text-[10px] font-black uppercase tracking-widest text-gray-500">
                            Parent Request
                        </p>
                        <h3 class="text-xl font-black uppercase italic text-white mt-1">
                            ${request.parentName || "Parent / Guardian"}
                        </h3>
                        <p class="text-xs font-bold text-gray-400 mt-1">
                            ${request.relationship || "Parent/Guardian"} requesting access to
                            <span class="text-white">${request.athleteName || "Unknown Athlete"}</span>
                        </p>
                    </div>

                    <span class="${statusClass} border rounded-full px-3 py-1 text-[9px] font-black uppercase tracking-widest">
                        ${status}
                    </span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-5">
                    <div class="rounded-xl bg-black/30 border border-white/5 p-4">
                        <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest">Parent Email</p>
                        <p class="text-sm text-white font-bold break-all">${request.parentEmail || "-"}</p>
                    </div>

                    <div class="rounded-xl bg-black/30 border border-white/5 p-4">
                        <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest">Parent Phone</p>
                        <p class="text-sm text-white font-bold">${request.parentPhone || "-"}</p>
                    </div>

                    <div class="rounded-xl bg-black/30 border border-white/5 p-4">
                        <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest">Athlete Email</p>
                        <p class="text-sm text-white font-bold break-all">${request.athleteEmail || "-"}</p>
                    </div>

                    <div class="rounded-xl bg-black/30 border border-white/5 p-4">
                        <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest">School ID</p>
                        <p class="text-sm text-white font-bold">${request.schoolId || request.school_id || "-"}</p>
                    </div>
                </div>

                ${request.registrationCode ? `
                    <div class="mt-5 rounded-xl border border-green-500/20 bg-green-500/10 p-4">
                        <p class="text-[9px] font-black uppercase tracking-widest text-green-300">
                            Parent Registration Code
                        </p>
                        <p class="text-3xl font-black tracking-widest text-white mt-2 select-all">
                            ${request.registrationCode}
                        </p>
                        <p class="text-[10px] text-green-200/70 font-bold uppercase tracking-widest mt-2">
                            Parent uses this code on signup as a Parent account.
                        </p>
                    </div>
                ` : ""}

                <div class="flex gap-2 flex-wrap mt-5">
                    ${status === "pending" ? `
                        <button
                            onclick="window.approveParentAccessRequest('${requestDoc.id}', this)"
                            class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest">
                            Approve Access
                        </button>

                        <button
                            onclick="window.rejectParentAccessRequest('${requestDoc.id}', this)"
                            class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest">
                            Reject
                        </button>
                    ` : ""}

                    ${status === "approved" ? `
                        <button
                            onclick="window.hideParentAccessRequest('${requestDoc.id}', this)"
                            class="bg-white/5 hover:bg-white/10 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest">
                            Remove From Screen
                        </button>
                    ` : ""}
                </div>
            `;

            queueContainer.appendChild(card);
        });
    }

    function renderQueueButtons(
        workouts,
        pendingCount,
        parentRequestCount = 0,
        workoutReviewCounts = new Map()
    ) {
        workoutList.innerHTML = '';

        const rackBtn = document.createElement('button');
        rackBtn.className = `w-full text-left p-4 rounded-xl border transition-all mb-2 ${
            currentViewMode === 'rack'
                ? 'bg-[var(--school-primary)]/10 border-[var(--school-primary)]'
                : 'bg-[#1a1a1c] border-transparent hover:border-[var(--school-primary)]'
        }`;
        rackBtn.onclick = () => window.loadPendingRackReviews();
        rackBtn.innerHTML = `
            <p class="text-[10px] font-black uppercase mb-1" style="color: var(--school-primary)">Standalone PR Queue</p>
            <p class="text-white font-black uppercase text-sm italic">The Rack Submissions</p>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-1">${pendingCount} Pending</p>
        `;
        workoutList.appendChild(rackBtn);

        const parentBtn = document.createElement('button');
        parentBtn.className = `w-full text-left p-4 rounded-xl border transition-all mb-2 ${
            currentViewMode === 'parents'
                ? 'bg-[var(--school-primary)]/10 border-[var(--school-primary)]'
                : 'bg-[#1a1a1c] border-transparent hover:border-[var(--school-primary)]'
        }`;
        parentBtn.onclick = () => window.loadParentAccessRequests();
        parentBtn.innerHTML = `
            <p class="text-[10px] font-black uppercase mb-1" style="color: var(--school-primary)">Parent Access</p>
            <p class="text-white font-black uppercase text-sm italic">Parent Requests</p>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-1">${parentRequestCount} Pending</p>
        `;
        workoutList.appendChild(parentBtn);

        if (!workouts.length) {
            const empty = document.createElement('p');
            empty.className = 'text-[10px] uppercase p-4 font-bold tracking-widest text-gray-600';
            empty.innerText = 'No workouts found.';
            workoutList.appendChild(empty);
            return;
        }

        workouts.forEach(({ id, data }) => {
            const reviewCount = workoutReviewCounts.get(id) || 0;

            const btn = document.createElement('button');
            btn.className = `w-full text-left p-4 rounded-xl border transition-all group mb-2 ${
                reviewCount > 0
                    ? 'bg-red-500/10 border-red-500/40'
                    : currentViewMode === 'workout' && currentWorkoutId === id
                        ? 'bg-[var(--school-primary)]/10 border-[var(--school-primary)]'
                        : 'bg-[#1a1a1c] border-transparent hover:border-[var(--school-primary)]'
            }`;

            btn.onclick = () => window.loadPerformance(id, data.name || "Workout");

            btn.innerHTML = `
                <div class="flex justify-between items-start gap-3">
                    <div>
                        <p class="text-[10px] font-black uppercase mb-1" style="color: var(--school-primary)">
                            ${data.date || 'No Date'}
                        </p>
                        <p class="text-white font-black uppercase text-sm italic group-hover:translate-x-1 transition-transform">
                            ${data.name || 'UNTITLED WORKOUT'}
                        </p>
                    </div>

                    ${reviewCount > 0 ? `
                        <span class="bg-red-600 text-white text-[10px] font-black px-2 py-1 rounded-full">
                            ${reviewCount}
                        </span>
                    ` : ""}
                </div>
            `;

            workoutList.appendChild(btn);
        });
    }

    async function loadPendingRackCount() {
        try {
            const q = query(
                collection(db, "pending_max_reviews"),
                where("schoolId", "==", currentSchoolId),
                where("status", "==", "pending")
            );
            const snap = await getDocs(q);
            return snap.size;
        } catch (err) {
            console.warn("Unable to count pending rack reviews:", err);
            return 0;
        }
    }

    function setQueueSummary(elementId, count, label = "Pending") {
        const el = document.getElementById(elementId);
        if (!el) return;

        el.innerText = `${count} ${label}`;

        if (count > 0) {
            el.classList.remove("text-gray-500");
            el.classList.add("text-red-400");
        } else {
            el.classList.remove("text-red-400");
            el.classList.add("text-gray-500");
        }
    }

    async function loadWorkoutReviewCounts(workouts = []) {
        const countsByWorkoutId = new Map();
        let totalReviewCount = 0;

        for (const workout of workouts) {
            const workoutId = workout.id;
            let count = 0;

            try {
                const q = query(
                    collection(db, "completed_workouts"),
                    where("schoolId", "==", currentSchoolId),
                    where("workoutId", "==", workoutId),
                    limit(100)
                );

                const snap = await getDocs(q);

                for (const logDoc of snap.docs) {
                    const log = logDoc.data();
                    const athleteId = log.athleteId || log.uid;
                    if (!athleteId) continue;

                    const sourceData = Array.isArray(log.exercises || log.performance)
                        ? (log.exercises || log.performance)
                        : [];

                    for (const ex of sourceData) {
                        if (ex.isCircuit) continue;

                        const sets = Array.isArray(ex.sets) ? ex.sets : [];
                        const weights = sets.map(s => parseFloat(s.weight) || 0);
                        const topWeight = weights.length ? Math.max(...weights) : 0;

                        if (topWeight <= 0) continue;

                        const exerciseKey = getExerciseReviewKey(ex.name);
                        const previousMax = await getOfficialApprovedMax(
                            athleteId,
                            exerciseKey,
                            ex.name
                        );

                        if (topWeight <= previousMax) continue;

                        const priorDecision = await getReviewDecision(
                            athleteId,
                            workoutId,
                            exerciseKey,
                            topWeight
                        );

                        if (!priorDecision) {
                            count += 1;
                        }
                    }
                }
            } catch (err) {
                console.warn("Workout review count skipped:", workoutId, err);
            }

            countsByWorkoutId.set(workoutId, count);
            totalReviewCount += count;
        }

        return {
            countsByWorkoutId,
            totalReviewCount
        };
    }

    async function loadWorkouts() {

                where("schoolId", "==", currentSchoolId),
                orderBy("date", "desc"),
                limit(50)
            );

                );

            }

            }));

    window.loadParentAccessRequests = async function() {
        currentViewMode = "parents";
        currentWorkoutId = null;
        currentWorkoutName = "Parent Requests";

        hidePageMessage();
        setReviewStatus("Loading Parent Requests...");
        setStatsVisible(false);

        if (queueContainer) {
            queueContainer.innerHTML = `
                <div class="text-center py-10 animate-pulse uppercase text-xs font-black text-gray-500 tracking-widest">
                    Retrieving parent requests...
                </div>
            `;
        }

        try {
            const q = query(
                collection(db, "parent_access_requests"),
                where("schoolId", "==", currentSchoolId),
                limit(100)
            );

            const snap = await getDocs(q);

            const requestDocs = snap.docs
                .filter((docSnap) => {
                    const request = docSnap.data();
                    return request.hiddenFromCoach !== true;
                })
                .sort((a, b) => {
                    const order = {
                        pending: 0,
                        approved: 1,
                        rejected: 2
                    };

                    const dataA = a.data();
                    const dataB = b.data();

                    const statusA = String(dataA.status || "pending").toLowerCase();
                    const statusB = String(dataB.status || "pending").toLowerCase();

                    if (statusA !== statusB) {
                        return (order[statusA] ?? 99) - (order[statusB] ?? 99);
                    }

                    const timeA = dataA.requestedAt?.seconds || 0;
                    const timeB = dataB.requestedAt?.seconds || 0;

                    return timeB - timeA; // newest first
                });

            if (statCount) {
                statCount.innerText = `${requestDocs.length} Request${requestDocs.length === 1 ? "" : "s"}`;
            }

            setStatsVisible(true);
            renderParentRequestCards(requestDocs);

            setReviewStatus("Parent Requests Loaded", "success");
        } catch (err) {
            console.error("Parent request load error:", err);

            if (queueContainer) {
                queueContainer.innerHTML = `
                    <div class="rounded-2xl border border-red-500/20 bg-red-500/10 p-8 text-center">
                        <p class="text-xs font-black uppercase tracking-widest text-red-300">
                            Unable to load parent access requests.
                        </p>
                    </div>
                `;
            }

            setReviewStatus("Parent Request Load Failed", "error");
        }
    };

    window.loadAthleteAlerts = async function() {
        currentViewMode = "alerts";
        currentWorkoutId = null;

        hidePageMessage();
        setReviewStatus("Loading Athlete Alerts...");
        setStatsVisible(false);
        showQueueView("rack");

        performanceFeed.innerHTML = `
            <div class="text-center py-10 animate-pulse uppercase text-xs font-black text-gray-500 tracking-widest">
                Scanning athlete activity...
            </div>
        `;

        try {
            const athleteSnap = await getDocs(query(
                collection(db, "recruiting_profiles"),
                where("schoolId", "==", currentSchoolId),
                limit(250)
            ));

            const workoutSnap = await getDocs(query(
                collection(db, "completed_workouts"),
                where("schoolId", "==", currentSchoolId),
                limit(500)
            ));

            const latestWorkoutByAthlete = new Map();

            workoutSnap.docs.forEach(docSnap => {
                const workout = docSnap.data();
                const athleteId = workout.athleteId || workout.uid;
                if (!athleteId) return;

                const rawDate = workout.timestamp || workout.createdAt || workout.completedAt;
                const workoutDate = rawDate?.toDate ? rawDate.toDate() : new Date(rawDate);

                if (Number.isNaN(workoutDate.getTime())) return;

                const currentLatest = latestWorkoutByAthlete.get(athleteId);
                if (!currentLatest || workoutDate > currentLatest) {
                    latestWorkoutByAthlete.set(athleteId, workoutDate);
                }
            });

            const alerts = [];
            const now = new Date();

            athleteSnap.docs.forEach(athleteDoc => {
                const athleteId = athleteDoc.id;
                const athleteData = athleteDoc.data();

                if (athleteData.active === false) return;

                const lastWorkoutDate = latestWorkoutByAthlete.get(athleteId) || null;
                let daysInactive = null;

                if (lastWorkoutDate) {
                    daysInactive = Math.floor(
                        (now.getTime() - lastWorkoutDate.getTime()) / (1000 * 60 * 60 * 24)
                    );
                }

                if (!lastWorkoutDate || daysInactive >= 5) {
                    alerts.push({
                        athleteId,
                        athleteName: getDisplayName(athleteData),
                        daysInactive,
                        lastWorkoutDate
                    });
                }
            });

            alerts.sort((a, b) => {
                if (a.daysInactive === null) return -1;
                if (b.daysInactive === null) return 1;
                return b.daysInactive - a.daysInactive;
            });

            const countText = `${alerts.length} Alert${alerts.length === 1 ? "" : "s"}`;

            const alertCountEl = document.getElementById("athlete-alert-count");
            if (alertCountEl) alertCountEl.innerText = countText;
            if (statCount) statCount.innerText = countText;

            setStatsVisible(true);

            if (!alerts.length) {
                renderFeedMessage("No inactive athlete alerts found.", "success");
                setReviewStatus("No Athlete Alerts", "success");
                return;
            }

            performanceFeed.innerHTML = alerts.map(alert => `
                <div class="bg-[#111113] border border-red-500/20 rounded-2xl p-5 shadow-xl">
                    <div class="flex justify-between items-start gap-4 flex-wrap">
                        <div>

    window.approveParentAccessRequest = async function(requestId, btnElement) {
        const originalText = btnElement.innerText;
        btnElement.innerText = "APPROVING...";
        btnElement.disabled = true;

        hidePageMessage();
        setReviewStatus("Approving Parent Access...");

        try {
            const requestRef = doc(db, "parent_access_requests", requestId);
            const requestSnap = await getDoc(requestRef);

            if (!requestSnap.exists()) {
                throw new Error("Parent request could not be found.");
            }

            const request = requestSnap.data();

            const registrationCode = `PARENT-${Math.random().toString(36).substring(2, 8).toUpperCase()}`;

            await addDoc(collection(db, "parent_links"), {
                athleteId: request.athleteId,
                athleteName: request.athleteName || "Unknown Athlete",
                parentName: request.parentName || "",
                parentEmail: String(request.parentEmail || "").toLowerCase().trim(),
                parentPhone: request.parentPhone || "",
                relationship: request.relationship || "",
                schoolId: request.schoolId || request.school_id || currentSchoolId,
                school_id: request.schoolId || request.school_id || currentSchoolId,
                approvedBy: auth.currentUser?.uid || null,
                approvedAt: serverTimestamp(),
                status: "active",
                registrationCode,
                registrationCodeUsed: false
            });

            await updateDoc(requestRef, {
                status: "approved",
                reviewedAt: serverTimestamp(),
                reviewedBy: auth.currentUser?.uid || null,
                registrationCode
            });

            showPageMessage(`Parent access approved. Code: ${registrationCode}`, "success");
            setReviewStatus("Parent Access Approved", "success");

            await window.loadParentAccessRequests();
            await loadWorkouts();

        } catch (err) {
            console.error("Parent approval error:", err);
            btnElement.innerText = originalText;
            btnElement.disabled = false;
            showPageMessage(err.message || "Parent access could not be approved.", "error");
            setReviewStatus("Approval Failed", "error");
        }
    };

    window.approvePR = async function(
        athleteId,
        athleteName,
        exerciseKey,
        exerciseName,
        newWeight,
        workoutId,
        workoutName,
        weighInWeight,
        weightClass,
        btnElement
    ) {
        const originalText = btnElement.innerText;
        btnElement.innerText = "SAVING...";
        btnElement.disabled = true;

        const siblingReject = btnElement.parentElement?.querySelector('button:nth-of-type(2)');
        if (siblingReject) siblingReject.disabled = true;

        hidePageMessage();
        setReviewStatus("Saving Approval...");

        try {
            await appCheckReady;

            const numericWeighInWeight = Number(weighInWeight) || 0;
            const resolvedWeightClass = weightClass || getWeightClass(numericWeighInWeight);

            const maxRef = doc(db, "recruiting_profiles", athleteId, "maxes", "latest");
            const writebacks = buildLiftWritebacks(exerciseKey, newWeight);

            await Promise.all([
                setDoc(maxRef, {
                    ...writebacks,
                    lastUpdated: serverTimestamp()
                }, { merge: true }),
                addDoc(collection(db, "approved_max_reviews"), {
                    athleteId,
                    athleteName: athleteName || "Unknown Athlete",
                    schoolId: currentSchoolId,
                    workoutId: workoutId || null,
                    workoutName: workoutName || null,
                    exerciseKey,
                    exerciseName,
                    attemptedWeight: Number(newWeight) || 0,
                    weighInWeight: numericWeighInWeight,
                    weightClass: resolvedWeightClass,
                    reviewedAt: serverTimestamp(),
                    reviewedBy: auth.currentUser?.uid || null,
                    decision: "approved"
                })
            ]);

            clearAthleteOfficialMaxCache(athleteId);

            btnElement.innerText = "VERIFIED ✓";
            btnElement.classList.remove('hover:bg-green-700', 'bg-white/5');
            btnElement.classList.add('bg-green-600');

            if (siblingReject) {
                siblingReject.innerText = "LOCKED";
                siblingReject.classList.remove('hover:bg-red-700');
                siblingReject.classList.add('opacity-50');
            }

            showPageMessage(`${exerciseName} verified successfully.`, "success");
            setReviewStatus("Lift Verified", "success");
        } catch (err) {
            console.error("Error approving PR:", err);
            alert("Failed to verify lift. Check console for details.");
            showPageMessage("Failed to verify lift. Check Firestore permissions and console details.", "error");
            setReviewStatus("Approval Failed", "error");
            btnElement.innerText = originalText;
            btnElement.disabled = false;
            if (siblingReject) siblingReject.disabled = false;
        }
    };

    const tabParent = document.getElementById('tab-parent-requests');

    const queueContainer = document.getElementById('review-queue-container'); // you already have this or similar

    function setActiveTab(activeTab) {
        document.querySelectorAll('.review-tab').forEach(tab => {
            tab.classList.remove('border-red-600');
            tab.classList.add('border-[#2a2a2c]');
        });

        activeTab.classList.add('border-red-600');
    }

    tabParent.onclick = () => {

        showQueueView("parents");
        window.loadParentAccessRequests();
    };

        showQueueView("rack");
        window.loadPendingRackReviews();

    tabWorkout.onclick = () => {
