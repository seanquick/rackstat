<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RackStat | Session Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0b; color: white; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#0a0a0b] text-white antialiased min-h-screen">

    <div class="max-w-5xl mx-auto p-6">
        <div class="flex justify-between items-end border-b border-[#2a2a2c] pb-6 mb-8">
            <div>
                <h2 class="text-[10px] font-black text-[#b91c1c] uppercase tracking-[0.2em] mb-1">Intelligence</h2>
                <h1 class="text-4xl font-black uppercase tracking-tighter italic">Session Review</h1>
            </div>
            <button onclick="location.href='coach-lobby.html'" class="text-xs font-bold text-gray-500 hover:text-white transition-colors uppercase tracking-widest">
                ← Coach Lobby
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-4">
                <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-4">Select Workout</h3>
                <div id="workout-list" class="space-y-2 max-h-[70vh] overflow-y-auto hide-scroll">
                    <div class="animate-pulse bg-[#1a1a1c] h-12 rounded-lg w-full"></div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div id="stats-header" class="hidden grid grid-cols-3 gap-4 mb-6">
                    <div class="bg-[#1a1a1c] p-4 rounded-xl border border-[#2a2a2c]">
                        <span class="block text-[9px] font-black text-gray-500 uppercase">Completion</span>
                        <span id="stat-count" class="text-2xl font-black italic">--</span>
                    </div>
                </div>

                <div id="performance-feed" class="space-y-4">
                    <div class="text-center py-20 border-2 border-dashed border-[#2a2a2c] rounded-3xl">
                        <p class="text-gray-600 uppercase text-xs font-bold tracking-widest">Select a workout on the left to see results</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { firebaseConfig } from "./firebase-config.js"; 
    import { getFirestore, collection, query, where, orderBy, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentSchoolId = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userSnap = await getDoc(doc(db, "users", user.uid));
            if (userSnap.exists()) {
                currentSchoolId = userSnap.data().school_id;
                loadWorkouts();
            }
        } else {
            location.href = 'index.html';
        }
    });

    async function loadWorkouts() {
        const q = query(collection(db, "workouts"), where("school_id", "==", currentSchoolId), orderBy("date", "desc"));
        const snap = await getDocs(q);
        const list = document.getElementById('workout-list');
        list.innerHTML = '';

        snap.forEach(doc => {
            const data = doc.data();
            const btn = document.createElement('button');
            btn.className = "w-full text-left p-4 rounded-xl bg-[#1a1a1c] border border-transparent hover:border-[#b91c1c] transition-all group";
            btn.onclick = () => window.loadPerformance(doc.id, data.name);
            btn.innerHTML = `
                <p class="text-[10px] text-[#b91c1c] font-black uppercase mb-1">${data.date}</p>
                <p class="text-white font-black uppercase text-sm italic group-hover:translate-x-1 transition-transform">${data.name}</p>
            `;
            list.appendChild(btn);
        });
    }

    // --- UPDATED LOAD PERFORMANCE WITH PR LOGIC ---
    window.loadPerformance = async function(workoutId, workoutName) {
        const feed = document.getElementById('performance-feed');
        feed.innerHTML = '<div class="text-center py-10 animate-pulse uppercase text-xs font-black text-gray-500 tracking-widest">Retrieving Athlete Logs...</div>';

        const q = query(collection(db, "completed_workouts"), where("workoutId", "==", workoutId), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);
        
        document.getElementById('stat-count').innerText = `${snap.size} Athletes`;
        document.getElementById('stats-header').classList.remove('hidden');

        if (snap.empty) {
            feed.innerHTML = `<div class="text-center py-20 bg-[#1a1a1c] rounded-3xl border border-[#2a2a2c]">
                                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">No athletes have logged this session yet.</p>
                              </div>`;
            return;
        }

        feed.innerHTML = '';
        
        for (const logDoc of snap.docs) {
            const log = logDoc.data();
            
            // Get Athlete Name and their current maxes for comparison
            const [athleteSnap, maxSnap] = await Promise.all([
                getDoc(doc(db, "recruiting_profiles", log.athleteId)),
                getDoc(doc(db, "recruiting_profiles", log.athleteId, "maxes", "latest"))
            ]);
            
            const athleteName = athleteSnap.exists() ? `${athleteSnap.data().firstName} ${athleteSnap.data().lastName}` : "Unknown Athlete";
            const currentMaxes = maxSnap.exists() ? maxSnap.data() : {};

            const card = document.createElement('div');
            card.className = "bg-[#111113] border border-[#2a2a2c] rounded-2xl overflow-hidden mb-6 shadow-2xl";
            
            let exerciseRows = log.performance.map(ex => {
                const completedSets = ex.sets.filter(s => s.completed).length;
                const totalSets = ex.sets.length;
                
                // Find the heaviest weight they lifted in this session
                const topWeight = Math.max(...ex.sets.map(s => parseFloat(s.weight) || 0));

                // PR LOGIC: Match the exercise name to the maxes database
                const cleanName = ex.name.toLowerCase().trim();
                const potentialKeys = [
                    cleanName, 
                    cleanName.replace(/\s+/g, '_'), 
                    cleanName.replace(/\s+/g, ''), 
                    cleanName.split(" ")[0]
                ];

                let previousMax = 0;
                let matchedKey = cleanName; // Default to the clean name

                for (let key of potentialKeys) {
                    if (currentMaxes[key] !== undefined && currentMaxes[key] !== null) {
                        previousMax = parseFloat(currentMaxes[key]);
                        matchedKey = key; // Capture the exact spelling the database uses
                        break; 
                    }
                }

                const isPR = topWeight > previousMax && previousMax > 0;

                return `
                    <div class="flex justify-between items-center py-3 border-b border-white/5 last:border-0">
                        <div class="flex items-center gap-3">
                            <div class="flex flex-col">
                                <span class="text-white font-bold text-xs uppercase tracking-wider">${ex.name}</span>
                                <span class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">${completedSets}/${totalSets} Sets</span>
                            </div>
                            ${isPR ? `
                                <div class="flex items-center gap-2 ml-2">
                                    <span class="bg-[#b91c1c] text-white text-[8px] font-black px-2 py-0.5 rounded-full animate-pulse shadow-[0_0_10px_rgba(185,28,28,0.5)]">NEW PR</span>
                                    <button onclick="window.approvePR('${log.athleteId}', '${matchedKey}', ${topWeight}, this)" class="bg-white/10 hover:bg-green-600 border border-white/10 text-[8px] font-black px-2 py-0.5 rounded-md text-white transition-colors uppercase">
                                        Approve
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                        <div class="text-right">
                            <span class="text-white font-black italic text-lg">${topWeight > 0 ? topWeight : 'BW'}</span>
                            <span class="text-[9px] text-gray-600 font-bold uppercase ml-1">${topWeight > 0 ? 'LBS' : ''}</span>
                            ${isPR ? `<p class="text-[8px] text-gray-500 font-bold uppercase mt-[-4px]">Prev: ${previousMax}</p>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            card.innerHTML = `
                <div class="bg-[#1a1a1c] p-4 flex justify-between items-center border-b border-[#2a2a2c]">
                    <h4 class="font-black text-white uppercase italic tracking-tighter text-lg">${athleteName}</h4>
                    <div class="text-right">
                        <span class="text-[9px] font-black text-gray-500 uppercase block leading-none mb-1">Logged At</span>
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">${new Date(log.timestamp?.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>
                </div>
                <div class="p-4 bg-black/20">
                    ${exerciseRows}
                </div>
            `;
            feed.appendChild(card);
        }
    }

    window.approvePR = async (athleteId, exerciseKey, newWeight, btnElement) => {
        try {
            btnElement.innerText = "SAVING...";
            
            const maxRef = doc(db, "recruiting_profiles", athleteId, "maxes", "latest");
            
            await updateDoc(maxRef, {
                [exerciseKey]: newWeight
            });

            // UI Success Feedback
            btnElement.innerText = "APPROVED ✓";
            btnElement.classList.remove('bg-white/10', 'hover:bg-green-600', 'border-white/10');
            btnElement.classList.add('bg-green-600', 'border-green-500');
            btnElement.disabled = true;

        } catch (error) {
            console.error("Error approving PR:", error);
            alert("Failed to update max. Check console.");
            btnElement.innerText = "ERROR";
        }
    };
</script>
</body>
</html>
