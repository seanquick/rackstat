<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RackStat | Session Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #0a0a0b; color: white; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .pr-badge {
            background-color: var(--school-primary);
            box-shadow: 0 0 12px var(--school-primary);
        }
    </style>
</head>
<body class="bg-[#0a0a0b] text-white antialiased min-h-screen">

    <div class="max-w-5xl mx-auto p-6">
        <div class="flex justify-between items-end border-b border-[#2a2a2c] pb-6 mb-8 gap-4 flex-wrap">
            <div class="flex items-center gap-6 min-w-0">
                <div class="logo-container-fixed">
                    <img src="" id="coach-school-logo" class="school-logo-primary" alt="Logo" style="display: none;" onerror="this.style.display='none'">
                </div>
                <div>
                    <h2 class="text-[10px] font-black text-[var(--school-primary)] uppercase tracking-[0.2em] mb-1">Intelligence</h2>
                    <h1 class="text-4xl font-black uppercase tracking-tighter italic">Session Review</h1>
                    <p id="review-status" class="text-[9px] font-bold text-gray-500 uppercase tracking-widest mt-2">Initializing</p>
                </div>
            </div>
            <button onclick="location.href='coach-lobby.html'" class="text-xs font-bold text-gray-500 hover:text-white transition-colors uppercase tracking-widest">
                ← Coach Lobby
            </button>
        </div>

        <div id="review-page-message" class="hidden mb-6">
            <div id="review-page-message-box" class="rounded-xl border p-4 text-xs font-bold uppercase tracking-wider"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-4">
                <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-4">Select Workout</h3>
                <div id="workout-list" class="space-y-2 max-h-[70vh] overflow-y-auto hide-scroll">
                    <div class="animate-pulse bg-[#1a1a1c] h-12 rounded-lg w-full"></div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div id="stats-header" class="hidden grid grid-cols-3 gap-4 mb-6">
                    <div class="bg-[#1a1a1c] p-4 rounded-xl border border-[#2a2a2c]">
                        <span class="block text-[9px] font-black text-gray-500 uppercase">Completion</span>
                        <span id="stat-count" class="text-2xl font-black italic">--</span>
                    </div>
                </div>

                <div id="performance-feed" class="space-y-4">
                    <div class="text-center py-20 border-2 border-dashed border-[#2a2a2c] rounded-3xl">
                        <p class="text-gray-600 uppercase text-xs font-bold tracking-widest">Select a workout on the left to see results</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { db, auth } from "./js/firebase-config.js";
    import {
        doc,
        getDoc,
        collection,
        query,
        where,
        getDocs,
        orderBy,
        setDoc,
        addDoc,
        serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { applyTheme } from './js/theme.js';
    import { getLiftValue, buildLiftWritebacks, slugify } from "./js/board-score.js";

    let currentSchoolId = null;
    let currentWorkoutId = null;
    let currentWorkoutName = "";

    const workoutList = document.getElementById('workout-list');
    const performanceFeed = document.getElementById('performance-feed');
    const statCount = document.getElementById('stat-count');
    const statsHeader = document.getElementById('stats-header');
    const reviewStatus = document.getElementById('review-status');
    const pageMessageWrap = document.getElementById('review-page-message');
    const pageMessageBox = document.getElementById('review-page-message-box');

    function getSchoolIdFromData(data = {}) {
        return data.schoolId || data.school_id || "";
    }

    function getDisplayName(data = {}) {
        if (data.fullName && String(data.fullName).trim()) {
            return String(data.fullName).trim();
        }

        const first = String(data.firstName || "").trim();
        const last = String(data.lastName || "").trim();
        const combined = `${first} ${last}`.trim();

        return combined || "Unknown Athlete";
    }

    function buildExerciseKeyVariations(name = "") {
        const normalized = slugify(name);
        const compact = normalized.replace(/_/g, "");
        const spaced = String(name).toLowerCase().trim();

        return [...new Set([
            normalized,
            spaced,
            compact
        ].filter(Boolean))];
    }

    function getExerciseReviewKey(name = "") {
        return slugify(name);
    }

    function escapeAttr(value = "") {
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }

    function setReviewStatus(text, tone = "default") {
        if (!reviewStatus) return;

        reviewStatus.innerText = text;
        reviewStatus.className = "text-[9px] font-bold uppercase tracking-widest mt-2";

        if (tone === "error") reviewStatus.classList.add("text-red-400");
        else if (tone === "success") reviewStatus.classList.add("text-green-400");
        else if (tone === "warn") reviewStatus.classList.add("text-yellow-300");
        else reviewStatus.classList.add("text-gray-500");
    }

    function showPageMessage(message, tone = "warn") {
        if (!pageMessageWrap || !pageMessageBox) return;

        pageMessageWrap.classList.remove('hidden');
        pageMessageBox.innerText = message;
        pageMessageBox.className = "rounded-xl border p-4 text-xs font-bold uppercase tracking-wider";

        if (tone === "error") {
            pageMessageBox.classList.add("bg-red-500/10", "border-red-500/20", "text-red-300");
        } else if (tone === "success") {
            pageMessageBox.classList.add("bg-green-500/10", "border-green-500/20", "text-green-300");
        } else {
            pageMessageBox.classList.add("bg-yellow-500/10", "border-yellow-500/20", "text-yellow-300");
        }
    }

    function hidePageMessage() {
        if (!pageMessageWrap || !pageMessageBox) return;
        pageMessageWrap.classList.add('hidden');
        pageMessageBox.innerText = '';
    }

    function renderWorkoutListMessage(message, tone = "muted") {
        if (!workoutList) return;

        const toneClass = tone === "error"
            ? "text-red-500"
            : tone === "warn"
                ? "text-yellow-300"
                : "text-gray-600";

        workoutList.innerHTML = `<p class="${toneClass} text-[10px] uppercase p-4 font-bold tracking-widest">${message}</p>`;
    }

    function renderFeedMessage(message, tone = "muted") {
        if (!performanceFeed) return;

        const toneClass = tone === "error"
            ? "text-red-400 border-red-500/20"
            : tone === "warn"
                ? "text-yellow-300 border-yellow-500/20"
                : "text-gray-600 border-[#2a2a2c]";

        performanceFeed.innerHTML = `
            <div class="text-center py-20 border-2 border-dashed rounded-3xl ${toneClass}">
                <p class="uppercase text-xs font-bold tracking-widest">${message}</p>
            </div>
        `;
    }

    function setStatsVisible(show) {
        if (!statsHeader) return;
        statsHeader.classList.toggle('hidden', !show);
    }

    async function getReviewDecision(athleteId, workoutId, exerciseKey, attemptedWeight) {
        const normalizedWeight = Number(attemptedWeight) || 0;

        const approvedQ = query(
            collection(db, "approved_max_reviews"),
            where("athleteId", "==", athleteId),
            where("workoutId", "==", workoutId || null),
            where("exerciseKey", "==", exerciseKey),
            where("attemptedWeight", "==", normalizedWeight)
        );

        const approvedSnap = await getDocs(approvedQ);
        if (!approvedSnap.empty) {
            return "approved";
        }

        const rejectedQ = query(
            collection(db, "rejected_max_reviews"),
            where("athleteId", "==", athleteId),
            where("workoutId", "==", workoutId || null),
            where("exerciseKey", "==", exerciseKey),
            where("attemptedWeight", "==", normalizedWeight)
        );

        const rejectedSnap = await getDocs(rejectedQ);
        if (!rejectedSnap.empty) {
            return "rejected";
        }

        return null;
    }

    onAuthStateChanged(auth, async (user) => {
        setReviewStatus("Checking Access");
        hidePageMessage();
        setStatsVisible(false);
        renderWorkoutListMessage("Loading workouts...");
        renderFeedMessage("Select a workout on the left to see results");

        if (!user) {
            location.href = 'index.html';
            return;
        }

        try {
            const userSnap = await getDoc(doc(db, "users", user.uid));

            if (!userSnap.exists()) {
                location.href = 'index.html';
                return;
            }

            const userData = userSnap.data();

            if ((userData.role || "").toLowerCase() !== "coach") {
                location.href = 'index.html';
                return;
            }

            currentSchoolId = getSchoolIdFromData(userData);

            if (!currentSchoolId) {
                console.error("Coach is missing school ID.");
                showPageMessage("Coach profile is missing a school ID, so Session Review cannot be loaded.", "error");
                renderWorkoutListMessage("No School Assigned", "error");
                renderFeedMessage("Session Review Unavailable", "error");
                setReviewStatus("Missing School", "error");
                return;
            }

            try {
                await applyTheme(db, currentSchoolId);

                const primaryLogo = document.getElementById('school-logo');
                const coachLogo = document.getElementById('coach-school-logo');
                if (primaryLogo && coachLogo && primaryLogo.src) {
                    coachLogo.src = primaryLogo.src;
                    coachLogo.style.display = 'block';
                }
            } catch (themeErr) {
                console.error("Theme load error:", themeErr);
            }

            await loadWorkouts();
            setReviewStatus("Ready", "success");
        } catch (err) {
            console.error("Auth/Theme Error:", err);
            showPageMessage("Session Review could not be initialized. Please refresh and try again.", "error");
            renderWorkoutListMessage("Unable To Load Workouts", "error");
            renderFeedMessage("Unable To Load Review Feed", "error");
            setReviewStatus("Load Failed", "error");
        }
    });

    async function loadWorkouts() {
        try {
            let q = query(
                collection(db, "workouts"),
                where("schoolId", "==", currentSchoolId),
                orderBy("date", "desc")
            );

            let snap = await getDocs(q);

            if (snap.empty) {
                q = query(
                    collection(db, "workouts"),
                    where("school_id", "==", currentSchoolId),
                    orderBy("date", "desc")
                );
                snap = await getDocs(q);
            }

            workoutList.innerHTML = '';

            if (snap.empty) {
                renderWorkoutListMessage("No workouts found.");
                setReviewStatus("No Workouts", "warn");
                return;
            }

            snap.forEach(docSnap => {
                const data = docSnap.data();
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl bg-[#1a1a1c] border border-transparent transition-all group hover:border-[var(--school-primary)] mb-2";
                btn.onclick = () => window.loadPerformance(docSnap.id, data.name || "Workout");
                btn.innerHTML = `
                    <p class="text-[10px] font-black uppercase mb-1" style="color: var(--school-primary)">${data.date || 'No Date'}</p>
                    <p class="text-white font-black uppercase text-sm italic group-hover:translate-x-1 transition-transform">${data.name || 'UNTITLED WORKOUT'}</p>
                `;
                workoutList.appendChild(btn);
            });
        } catch (err) {
            console.error("LoadWorkouts Error:", err);
            renderWorkoutListMessage("Unable To Load Workouts", "error");
            setReviewStatus("Workout Load Failed", "error");
        }
    }

    window.loadPerformance = async function(workoutId, workoutName) {
        currentWorkoutId = workoutId;
        currentWorkoutName = workoutName || "Workout";

        hidePageMessage();
        setReviewStatus("Loading Session...");
        setStatsVisible(false);
        performanceFeed.innerHTML = '<div class="text-center py-10 animate-pulse uppercase text-xs font-black text-gray-500 tracking-widest">Retrieving Athlete Logs...</div>';

        try {
            const q = query(
                collection(db, "completed_workouts"),
                where("workoutId", "==", workoutId),
                orderBy("timestamp", "desc")
            );

            const snap = await getDocs(q);

            statCount.innerText = `${snap.size} Athletes`;
            setStatsVisible(true);

            if (snap.empty) {
                renderFeedMessage("No athletes have logged this session yet.");
                setReviewStatus("No Logged Sessions", "warn");
                return;
            }

            performanceFeed.innerHTML = '';

            for (const logDoc of snap.docs) {
                const log = logDoc.data();

                try {
                    const athleteId = log.athleteId || log.uid;

                    if (!athleteId) {
                        console.warn("Completed workout log missing athlete ID:", logDoc.id, log);
                        continue;
                    }

                    const [athleteSnap, maxSnap] = await Promise.all([
                        getDoc(doc(db, "recruiting_profiles", athleteId)),
                        getDoc(doc(db, "recruiting_profiles", athleteId, "maxes", "latest"))
                    ]);

                    const aData = athleteSnap.exists() ? athleteSnap.data() : {};

                    const athleteName =
                        log.athleteName ||
                        getDisplayName(aData) ||
                        "Unknown Athlete";

                    const currentMaxes = maxSnap.exists() ? maxSnap.data() : {};

                    let timeString = "Recently";
                    if (log.timestamp) {
                        const dateObj = log.timestamp.toDate ? log.timestamp.toDate() : new Date(log.timestamp);
                        if (!Number.isNaN(dateObj.getTime())) {
                            timeString = dateObj.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
                        }
                    }

                    const sourceData = Array.isArray(log.exercises || log.performance) ? (log.exercises || log.performance) : [];

                    const exerciseRows = await Promise.all(sourceData.map(async (ex) => {
                        if (ex.isCircuit) {
                            const movements = Array.isArray(ex.completedMovements) ? ex.completedMovements : [];
                            const completedCount = movements.filter(m => m.completed).length;
                            const totalCount = movements.length;

                            return `
                                <div class="py-3 border-b border-white/5 last:border-0">
                                    <div class="flex justify-between items-center">
                                        <div class="flex flex-col">
                                            <span class="text-white font-bold text-xs uppercase tracking-wider">${ex.name || 'Circuit'}</span>
                                            <span class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">${completedCount}/${totalCount} Movements Complete</span>
                                        </div>
                                        <div class="text-right">
                                            <span class="text-[9px] text-red-500 font-black uppercase">Circuit</span>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }

                        const sets = Array.isArray(ex.sets) ? ex.sets : [];
                        const completedSets = sets.filter(s => s.completed).length;
                        const totalSets = sets.length;
                        const weights = sets.map(s => parseFloat(s.weight) || 0);
                        const topWeight = weights.length > 0 ? Math.max(...weights) : 0;

                        const variations = buildExerciseKeyVariations(ex.name);
                        let previousMax = 0;

                        for (const key of variations) {
                            const found = getLiftValue(currentMaxes, key);
                            if (found > 0) {
                                previousMax = found;
                                break;
                            }
                        }

                        const exerciseKey = getExerciseReviewKey(ex.name);
                        const needsReview = topWeight > previousMax && topWeight > 0;
                        const priorDecision = needsReview
                            ? await getReviewDecision(athleteId, currentWorkoutId || null, exerciseKey, topWeight)
                            : null;

                        const encodedAthleteId = escapeAttr(athleteId);
                        const encodedExerciseKey = escapeAttr(exerciseKey);
                        const encodedWorkoutId = escapeAttr(currentWorkoutId || "");
                        const encodedWorkoutName = escapeAttr(currentWorkoutName || "");
                        const encodedExerciseName = escapeAttr(ex.name || "Exercise");

                        let reviewActions = `
                            <span class="bg-white/5 border border-white/10 text-[8px] font-black px-3 py-1 rounded-md text-gray-400 uppercase tracking-tighter">
                                No Review Needed
                            </span>
                        `;

                        if (needsReview && priorDecision === "approved") {
                            reviewActions = `
                                <span class="bg-green-600/20 border border-green-500/30 text-[8px] font-black px-3 py-1 rounded-md text-green-300 uppercase tracking-tighter">
                                    Verified
                                </span>
                            `;
                        } else if (needsReview && priorDecision === "rejected") {
                            reviewActions = `
                                <span class="bg-red-600/20 border border-red-500/30 text-[8px] font-black px-3 py-1 rounded-md text-red-300 uppercase tracking-tighter">
                                    Rejected
                                </span>
                            `;
                        } else if (needsReview) {
                            reviewActions = `
                                <span class="bg-red-600 text-white text-[8px] font-black px-2 py-0.5 rounded-full animate-pulse uppercase">Needs Review</span>
                                <button
                                    onclick="window.approvePR('${encodedAthleteId}', '${encodedExerciseKey}', '${encodedExerciseName}', ${topWeight}, '${encodedWorkoutId}', '${encodedWorkoutName}', this)"
                                    class="bg-white/5 hover:bg-green-700 border border-white/10 text-[8px] font-black px-3 py-1 rounded-md text-white transition-all uppercase tracking-tighter">
                                    Verify Lift
                                </button>
                                <button
                                    onclick="window.rejectPR('${encodedAthleteId}', '${encodedExerciseKey}', '${encodedExerciseName}', ${topWeight}, '${encodedWorkoutId}', '${encodedWorkoutName}', this)"
                                    class="bg-white/5 hover:bg-red-700 border border-white/10 text-[8px] font-black px-3 py-1 rounded-md text-white transition-all uppercase tracking-tighter">
                                    Reject
                                </button>
                            `;
                        }

                        return `
                            <div class="flex justify-between items-center py-3 border-b border-white/5 last:border-0 gap-4">
                                <div class="flex items-center gap-3 flex-wrap">
                                    <div class="flex flex-col">
                                        <span class="text-white font-bold text-xs uppercase tracking-wider">${ex.name || 'Exercise'}</span>
                                        <span class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">${completedSets}/${totalSets} Sets</span>
                                    </div>

                                    <div class="flex items-center gap-2 ml-4 flex-wrap">
                                        ${reviewActions}
                                    </div>
                                </div>
                                <div class="text-right shrink-0">
                                    <span class="text-white font-black italic text-lg">${topWeight > 0 ? topWeight : 'BW'}</span>
                                    <span class="text-[9px] text-gray-600 font-bold uppercase ml-1">${topWeight > 0 ? 'LBS' : ''}</span>
                                    <p class="text-[8px] text-gray-500 font-bold uppercase mt-[-4px]">Current: ${previousMax}</p>
                                </div>
                            </div>
                        `;
                    }));

                    const card = document.createElement('div');
                    card.className = "bg-[#111113] border border-[#2a2a2c] rounded-2xl overflow-hidden mb-6 shadow-2xl";
                    card.innerHTML = `
                        <div class="bg-[#1a1a1c] p-4 flex justify-between items-center border-b border-[#2a2a2c] gap-4 flex-wrap">
                            <h4 class="font-black text-white uppercase italic tracking-tighter text-lg">${athleteName}</h4>
                            <div class="text-right">
                                <span class="text-[9px] font-black text-gray-500 uppercase block leading-none mb-1">Logged At</span>
                                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">${timeString}</span>
                            </div>
                        </div>
                        <div class="p-4 bg-black/20">${exerciseRows.join('')}</div>
                    `;
                    performanceFeed.appendChild(card);
                } catch (cardErr) {
                    console.error("Failed loading athlete review card:", logDoc.id, cardErr);
                }
            }

            if (!performanceFeed.children.length) {
                renderFeedMessage("No reviewable athlete logs could be loaded for this workout.", "warn");
                setReviewStatus("Partial Load", "warn");
                return;
            }

            setReviewStatus("Session Loaded", "success");
        } catch (err) {
            console.error("LoadPerformance Error:", err);
            renderFeedMessage("Something went wrong while loading workout review data.", "error");
            showPageMessage("Workout review data could not be loaded. Check console for details.", "error");
            setReviewStatus("Review Load Failed", "error");
        }
    };

    window.approvePR = async function(athleteId, exerciseKey, exerciseName, newWeight, workoutId, workoutName, btnElement) {
        const originalText = btnElement.innerText;
        btnElement.innerText = "SAVING...";
        btnElement.disabled = true;

        const siblingReject = btnElement.parentElement?.querySelector('button:nth-of-type(2)');
        if (siblingReject) siblingReject.disabled = true;

        hidePageMessage();
        setReviewStatus("Saving Approval...");

        try {
            const maxRef = doc(db, "recruiting_profiles", athleteId, "maxes", "latest");
            const writebacks = buildLiftWritebacks(exerciseKey, newWeight);

            await Promise.all([
                setDoc(maxRef, {
                    ...writebacks,
                    lastUpdated: serverTimestamp()
                }, { merge: true }),
                addDoc(collection(db, "approved_max_reviews"), {
                    athleteId,
                    schoolId: currentSchoolId,
                    workoutId: workoutId || null,
                    workoutName: workoutName || null,
                    exerciseKey,
                    exerciseName,
                    attemptedWeight: Number(newWeight) || 0,
                    reviewedAt: serverTimestamp(),
                    reviewedBy: auth.currentUser?.uid || null,
                    decision: "approved"
                })
            ]);

            btnElement.innerText = "VERIFIED ✓";
            btnElement.classList.remove('hover:bg-green-700', 'bg-white/5');
            btnElement.classList.add('bg-green-600');

            if (siblingReject) {
                siblingReject.innerText = "LOCKED";
                siblingReject.classList.remove('hover:bg-red-700');
                siblingReject.classList.add('opacity-50');
            }

            showPageMessage(`${exerciseName} verified successfully.`, "success");
            setReviewStatus("Lift Verified", "success");
        } catch (err) {
            console.error("Error approving PR:", err);
            alert("Failed to verify lift. Check console for details.");
            showPageMessage("Failed to verify lift. Check Firestore permissions and console details.", "error");
            setReviewStatus("Approval Failed", "error");
            btnElement.innerText = originalText;
            btnElement.disabled = false;
            if (siblingReject) siblingReject.disabled = false;
        }
    };

    window.rejectPR = async function(athleteId, exerciseKey, exerciseName, attemptedWeight, workoutId, workoutName, btnElement) {
        const originalText = btnElement.innerText;
        btnElement.innerText = "REJECTING...";
        btnElement.disabled = true;

        const siblingApprove = btnElement.parentElement?.querySelector('button:nth-of-type(1)');
        if (siblingApprove) siblingApprove.disabled = true;

        hidePageMessage();
        setReviewStatus("Saving Rejection...");

        try {
            await addDoc(collection(db, "rejected_max_reviews"), {
                athleteId,
                schoolId: currentSchoolId,
                workoutId: workoutId || null,
                workoutName: workoutName || null,
                exerciseKey,
                exerciseName,
                attemptedWeight: Number(attemptedWeight) || 0,
                reviewedAt: serverTimestamp(),
                reviewedBy: auth.currentUser?.uid || null,
                decision: "rejected"
            });

            btnElement.innerText = "REJECTED ✓";
            btnElement.classList.remove('hover:bg-red-700', 'bg-white/5');
            btnElement.classList.add('bg-red-600');

            if (siblingApprove) {
                siblingApprove.innerText = "DECLINED";
                siblingApprove.classList.remove('hover:bg-green-700');
                siblingApprove.classList.add('opacity-50');
            }

            showPageMessage(`${exerciseName} was rejected successfully.`, "success");
            setReviewStatus("Lift Rejected", "success");
        } catch (err) {
            console.error("Error rejecting PR:", err);
            alert("Failed to reject lift. Check console for details.");
            showPageMessage("Failed to reject lift. Check Firestore permissions and console details.", "error");
            setReviewStatus("Rejection Failed", "error");
            btnElement.innerText = originalText;
            btnElement.disabled = false;
            if (siblingApprove) siblingApprove.disabled = false;
        }
    };
</script>
</body>
</html>
