<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scouting Report | RACKSTAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none; } }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .card-container { 
            background: linear-gradient(145deg, #0f0f0f, #050505);
            border: 2px solid #333;
            position: relative;
            overflow: hidden;
        }
        .stat-box { background: rgba(255,255,255,0.05); border-left: 3px solid #ef4444; }
        .label { font-size: 0.65rem; text-transform: uppercase; color: #888; font-weight: 800; letter-spacing: 0.1em; }
        .value { font-size: 1.1rem; font-weight: 900; font-style: italic; text-transform: uppercase; }
        .red-accent { color: #ef4444; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-2xl mx-auto mb-6 flex justify-between no-print">
        <button onclick="window.print()" class="bg-white text-black px-6 py-2 rounded-full font-bold uppercase text-xs">Print PDF</button>
        <button onclick="location.href='index.html'" class="bg-gray-800 text-white px-6 py-2 rounded-full font-bold uppercase text-xs">Back to Lobby</button>
    </div>

    <div id="capture-area" class="max-w-2xl mx-auto card-container rounded-3xl p-8 shadow-2xl border-red-600/20">
        
        <div class="flex justify-between items-start border-b-2 border-red-600 pb-6 mb-6">
            <div>
                <h1 id="disp-name" class="text-4xl font-black italic uppercase leading-none">LOADING...</h1>
                <div class="flex gap-4 mt-2">
                    <span id="disp-class" class="text-red-600 font-bold uppercase text-sm">CLASS OF --</span>
                    <span id="disp-pos" class="text-white font-bold uppercase text-sm">POS: --</span>
                    <span id="disp-number" class="text-gray-500 font-bold uppercase text-sm">#--</span>
                    <span id="disp-weight" class="text-white font-bold uppercase text-sm border-l border-gray-700 pl-4">-- LBS</span>
                    <span id="disp-height" class="text-white font-bold uppercase text-sm">--</span>
                </div>
            </div>
            <img src="images/panther-logo1.png" class="h-16 w-auto opacity-80">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
                <h3 class="label mb-4 text-red-500 text-sm">Verified Metrics</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="stat-box p-3">
                        <span class="label">Bench Press</span>
                        <div id="stat-bench" class="value">--</div>
                    </div>
                    <div class="stat-box p-3">
                        <span class="label">Squat</span>
                        <div id="stat-squat" class="value">--</div>
                    </div>
                    <div class="stat-box p-3">
                        <span class="label">Clean</span>
                        <div id="stat-clean" class="value">--</div>
                    </div>
                    <div class="stat-box p-3">
                        <span class="label">Deadlift</span>
                        <div id="stat-dead" class="value">--</div>
                    </div>
                </div>

                <h3 class="label mt-8 mb-4 text-red-500 text-sm">Academic Profile</h3>
                <div class="space-y-2">
                    <div class="flex justify-between border-b border-white/10 pb-1">
                        <span class="label">Current GPA</span>
                        <span id="disp-gpa" class="font-bold italic">--</span>
                    </div>
                    <div class="flex justify-between border-b border-white/10 pb-1">
                        <span class="label">ACT / SAT</span>
                        <span id="disp-test" class="font-bold italic">--</span>
                    </div>
                    <div class="flex justify-between border-b border-white/10 pb-1">
                        <span class="label">NCAA ID</span>
                        <span id="disp-ncaa" class="font-bold italic">--</span>
                    </div>
                </div>
            </div>

            <div>
                <h3 class="label mb-4 text-red-500 text-sm">Player Character</h3>
                <div class="bg-white/5 p-4 rounded-xl italic text-sm text-gray-300 mb-6">
                    <p class="label mb-1 text-white/40">TDL Definition:</p>
                    "<span id="disp-tdl">...</span>"
                </div>

                <h3 class="label mb-4 text-red-500 text-sm">Contact & Links</h3>
                <div class="space-y-4">
                    <div class="flex items-center gap-3">
                        <div class="h-8 w-8 bg-blue-600 rounded flex items-center justify-center font-black">X</div>
                        <div><span class="label block">Twitter</span><span id="disp-tw" class="text-xs font-bold italic">@--</span></div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="h-8 w-8 bg-gradient-to-tr from-yellow-500 to-purple-600 rounded flex items-center justify-center font-black italic">IG</div>
                        <div><span class="label block">Instagram</span><span id="disp-ig" class="text-xs font-bold italic">@--</span></div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button id="film-btn" class="bg-red-600 hover:bg-red-700 w-full py-2 rounded font-black italic uppercase text-xs">View Hudl / Film</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-12 pt-6 border-t border-white/10 flex justify-between items-center opacity-50">
            <span class="text-[8px] font-black uppercase tracking-widest">Powered by RACKSTAT Elite Recruiting</span>
            <img src="images/rackstat-logo.png" class="h-4 w-auto">
        </div>
    </div>

    <script type="module">
            import { firebaseConfig } from './firebase-config.js';
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
            import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
            import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    // 1. FETCH DATA
                    // Fetch the public profile first.
                    const recSnap = await getDoc(doc(db, "recruiting_profiles", user.uid));
                    
                    // Fetch the private master record in a separate sub-try to prevent 
                    // permission errors from crashing the entire card render.
                    let masterSnap = { exists: () => false };
                    try {
                        masterSnap = await getDoc(doc(db, "users", user.uid));
                    } catch (pErr) {
                        console.warn("Private master record inaccessible; falling back to profile data.");
                    }

                    // Helper function to safely set text without crashing the whole script
                    const safeSet = (id, text) => {
                        const el = document.getElementById(id);
                        if (el) el.innerText = text;
                    };

                    if (recSnap.exists()) {
                        const d = recSnap.data();
                        const m = masterSnap.exists() ? masterSnap.data() : {};

                        // 2. RENDER BASIC INFO
                        safeSet('disp-name', d.fullName || "Athlete Name");
                        safeSet('disp-class', "CLASS OF " + (d.gradYear || "--"));
                        safeSet('disp-pos', "POS: " + (d.primaryPos || "--"));
                        safeSet('disp-number', "#" + (d.jerseyNum || "--"));

                        // HEIGHT FORMATTING
                        const rawHeight = m.height || d.height;
                        const heightElement = document.getElementById('disp-height');
                        if (heightElement) {
                            heightElement.innerText = rawHeight ? `${Math.floor(rawHeight/12)}'${rawHeight%12}"` : "--";
                        }

                        // WEIGHT
                        const weight = m.weight || d.weight || "--";
                        safeSet('disp-weight', weight + (weight !== "--" ? " lbs" : ""));

                        // 3. UI STATE MANAGEMENT (Loader & Card)
                        const loader = document.getElementById('loader');
                        if (loader) loader.classList.add('hidden');
                        
                        const card = document.getElementById('main-card-container');
                        if (card) card.classList.remove('hidden');

                    } else {
                        console.warn("No profile found for this user.");
                        const loaderEl = document.getElementById('loader');
                        if (loaderEl) loaderEl.innerText = "Profile not found.";
                    }
                } catch (err) {
                    console.error("Card Render Error:", err);
                    // Emergency: hide loader anyway so you can see the console errors
                    document.getElementById('loader')?.classList.add('hidden');
                }
            } else {
                // Only redirect if we aren't already on the login page to avoid loops
                if (!window.location.pathname.includes('login.html')) {
                    location.href = 'login.html';
                }
            }
        });
        </script>
</body>
</html>
