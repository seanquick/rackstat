<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Vault | RACKSTAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
</head>

<body class="bg-[#0d1117] text-white font-sans antialiased pb-24">

<header class="bg-black border-b-2 border-red-700 p-4 sticky top-0 z-40">
    <div class="flex justify-between items-center max-w-7xl mx-auto gap-4">
        <div class="flex items-center gap-4 min-w-0">
            <a href="coach-lobby.html" class="text-[10px] font-black uppercase bg-gray-800 px-3 py-1 rounded text-gray-300 hover:text-white transition-colors shrink-0">← Back to Office</a>
            <div class="min-w-0">
                <h1 class="text-xl font-black italic uppercase tracking-tighter text-red-500">Analytics Vault</h1>
                <p id="vault-subtitle" class="text-[10px] font-bold uppercase tracking-widest text-gray-500">Awaiting Program Data...</p>
            </div>
        </div>

        <button id="export-btn" onclick="window.downloadCSV()" class="bg-green-600 hover:bg-green-700 disabled:bg-gray-800 disabled:text-gray-500 disabled:cursor-not-allowed text-white px-4 py-2 rounded font-bold text-sm transition shadow-lg uppercase">
            Export CSV
        </button>
    </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-12">
    <div id="page-message" class="hidden mb-6 rounded-xl border px-4 py-3 text-xs font-bold uppercase tracking-wider"></div>

    <div class="mb-8">
        <h2 class="text-3xl font-bold">Team Performance Data</h2>
        <p class="text-gray-400">View weight room maxes and individual meal entries for your school.</p>
    </div>

    <div class="flex gap-2">
        <button id="btn-rack" onclick="window.switchTable('rack')" class="px-6 py-3 rounded-t-lg bg-red-600 text-white font-bold transition-all duration-200">
            THE RACK (Lifts)
        </button>

        <button id="btn-kitchen" onclick="window.switchTable('kitchen')" class="px-6 py-3 rounded-t-lg bg-gray-800 text-gray-400 hover:bg-gray-700 font-bold transition-all duration-200">
            THE KITCHEN (Meals)
        </button>
    </div>

    <div class="bg-gray-900 rounded-b-xl rounded-tr-xl border border-gray-800 overflow-x-auto shadow-2xl">
        <div id="table-state" class="px-6 py-8 text-center text-xs font-black uppercase tracking-widest text-gray-500">
            Initializing analytics vault...
        </div>
        <div id="stats-table" class="min-w-[1100px]"></div>
    </div>
</main>

<script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { collection, getDocs, doc, getDoc, query, where, addDoc, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let currentTab = 'rack';
    let coachSchoolId = null;
    let currentTableData = [];
    let isReady = false;
    let table = null;

    const pageMessage = document.getElementById('page-message');
    const tableState = document.getElementById('table-state');
    const exportBtn = document.getElementById('export-btn');
    const vaultSubtitle = document.getElementById('vault-subtitle');
    const rackBtn = document.getElementById('btn-rack');
    const kitchenBtn = document.getElementById('btn-kitchen');

    const rackColumns = [
        { title: "Athlete", field: "name", widthGrow: 2, headerFilter: "input" },
        { title: "Lift Date", field: "dateGroup", width: 150, headerFilter: "input" },
        { title: "Body Weight", field: "bodyWeight" },
        { title: "Off.", field: "offPos", width: 80, headerFilter: "input" },
        { title: "Def.", field: "defPos", width: 80, headerFilter: "input" },
        { title: "Grad", field: "grad", width: 90, hozAlign: "center", headerFilter: "list", headerFilterParams: { valuesLookup: "data", clearable: true } },
        { title: "Bench", field: "bench", hozAlign: "right", sorter: "number", formatter: (c) => c.getValue() || "--" },
        { title: "Squat", field: "squat", hozAlign: "right", sorter: "number", formatter: (c) => c.getValue() || "--" },
        { title: "Clean", field: "clean", hozAlign: "right", sorter: "number", formatter: (c) => c.getValue() || "--" },
        { title: "Deadlift", field: "deadlift", hozAlign: "right", sorter: "number", formatter: (c) => c.getValue() || "--" },
        { title: "Push Press", field: "pushPress", hozAlign: "right", sorter: "number", formatter: (c) => c.getValue() || "--" }
    ];

    const kitchenColumns = [
        { title: "Athlete", field: "name", widthGrow: 2, headerFilter: "input" },
        { title: "Date", field: "dateGroup", width: 180, headerFilter: "input" },
        { title: "Body Weight", field: "bodyWeight" },
        { title: "Grad", field: "grad", width: 80, headerFilter: "input" },
        {
            title: "Meal",
            field: "mealType",
            width: 120,
            headerFilter: "list",
            headerFilterParams: {
                values: ["Breakfast", "Lunch", "Dinner", "Snack", "Snack / Shake", "Water", "Meal"],
                clearable: true
            }
        },
        { title: "Cals", field: "calories", hozAlign: "right", sorter: "number" },
        { title: "Protein", field: "protein", hozAlign: "right", sorter: "number" },
        { title: "Carbs", field: "carbs", hozAlign: "right", sorter: "number" },
        { title: "Fats", field: "fats", hozAlign: "right", sorter: "number" }
    ];

    table = new Tabulator("#stats-table", {
        layout: "fitDataStretch",
        responsiveLayout: "collapse",
        pagination: "local",
        paginationSize: 20,
        placeholder: "No records found for this view.",
        columns: rackColumns
    });

    updateExportState();

    function getSchoolIdFromData(data = {}) {
        return data.schoolId || data.school_id || "";
    }

    function getDisplayName(data = {}) {
        if (data.fullName && String(data.fullName).trim()) return String(data.fullName).trim();

        const first = String(data.firstName || "").trim();
        const last = String(data.lastName || "").trim();
        const combined = `${first} ${last}`.trim();

        return combined || "Unnamed Athlete";
    }

    function getBodyWeight(data = {}) {
        return data.bodyWeight ?? data.body_weight ?? data.weight ?? "--";
    }

    function normalizeMealType(data = {}) {
        return data.type || data.mealType || data.mealName || "Meal";
    }

    function formatFirebaseDate(timestamp) {
        if (!timestamp) return "--";

        try {
            const date = typeof timestamp.toDate === 'function' ? timestamp.toDate() : new Date(timestamp);
            if (Number.isNaN(date.getTime())) return "--";

            return date.toLocaleDateString('default', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
        } catch {
            return "--";
        }
    }

    function formatDateKey(dateKey) {
        if (!dateKey || typeof dateKey !== "string") return "--";

        const parts = dateKey.split("-");
        if (parts.length !== 3) return dateKey;

        const [year, month, day] = parts.map(Number);
        const date = new Date(year, (month || 1) - 1, day || 1);

        if (Number.isNaN(date.getTime())) return dateKey;

        return date.toLocaleDateString('default', {
            month: 'short',
            day: 'numeric',
            year: 'numeric'
        });
    }

    function showPageMessage(message, tone = 'warn') {
        if (!pageMessage) return;

        pageMessage.classList.remove('hidden');
        pageMessage.innerText = message;
        pageMessage.className = 'mb-6 rounded-xl border px-4 py-3 text-xs font-bold uppercase tracking-wider';

        if (tone === 'error') {
            pageMessage.classList.add('bg-red-500/10', 'border-red-500/20', 'text-red-300');
        } else if (tone === 'success') {
            pageMessage.classList.add('bg-green-500/10', 'border-green-500/20', 'text-green-300');
        } else {
            pageMessage.classList.add('bg-yellow-500/10', 'border-yellow-500/20', 'text-yellow-300');
        }
    }

    function hidePageMessage() {
        if (!pageMessage) return;
        pageMessage.classList.add('hidden');
        pageMessage.innerText = '';
    }

    function setTableState(message, tone = 'muted') {
        if (!tableState) return;

        tableState.classList.remove('hidden');
        tableState.innerText = message;
        tableState.className = 'px-6 py-8 text-center text-xs font-black uppercase tracking-widest';

        if (tone === 'error') tableState.classList.add('text-red-400');
        else if (tone === 'warn') tableState.classList.add('text-yellow-300');
        else tableState.classList.add('text-gray-500');
    }

    function hideTableState() {
        if (!tableState) return;
        tableState.classList.add('hidden');
    }

    function updateExportState() {
        if (!exportBtn) return;
        exportBtn.disabled = currentTableData.length === 0;
    }

    function setTabButtons(type) {
        if (type === 'rack') {
            rackBtn.className = "px-6 py-3 rounded-t-lg bg-red-600 text-white font-bold transition-all duration-200";
            kitchenBtn.className = "px-6 py-3 rounded-t-lg bg-gray-800 text-gray-400 hover:bg-gray-700 font-bold transition-all duration-200";
        } else {
            kitchenBtn.className = "px-6 py-3 rounded-t-lg bg-red-600 text-white font-bold transition-all duration-200";
            rackBtn.className = "px-6 py-3 rounded-t-lg bg-gray-800 text-gray-400 hover:bg-gray-700 font-bold transition-all duration-200";
        }
    }

    async function logDataAccess({ action, athleteId = null, reason = "analytics_view" }) {
        try {
            const user = auth.currentUser;
            if (!user) return;

            const userSnap = await getDoc(doc(db, "users", user.uid));
            const userData = userSnap.exists() ? userSnap.data() : {};
            const schoolId = userData.schoolId || userData.school_id || "";

            await addDoc(collection(db, "data_access_logs"), {
                actorId: user.uid,
                actorRole: userData.role || "unknown",
                schoolId,
                athleteId,
                action,
                reason,
                page: "analytics-vault.html",
                createdAt: serverTimestamp()
            });
        } catch (err) {
            console.warn("Audit log failed:", err);
        }
    }

    async function loadData(type) {
        if (!coachSchoolId || !table) return;

        await logDataAccess({
            action: type === 'rack' ? "view_team_lift_analytics" : "view_team_meal_analytics",
            reason: "coach_loaded_analytics_tab"
        });

        currentTableData = [];
        updateExportState();
        table.clearData();
        setTableState(type === 'rack' ? "Loading lift data..." : "Loading meal data...");

        try {
            let athletesQuery = query(
                collection(db, "recruiting_profiles"),
                where("schoolId", "==", coachSchoolId),
                limit(250)
            );

            let athletesSnap = await getDocs(athletesQuery);

            if (athletesSnap.empty) {
                athletesQuery = query(
                    collection(db, "recruiting_profiles"),
                    where("school_id", "==", coachSchoolId),
                    limit(250)
                );
                athletesSnap = await getDocs(athletesQuery);
            }

            if (athletesSnap.empty) {
                await table.setData([]);
                updateExportState();
                setTableState("No athlete profiles found for this school.", "warn");
                showPageMessage("No athlete profiles are currently linked to this school.", "warn");
                return;
            }

            const tableData = [];

            await Promise.all(athletesSnap.docs.map(async (athleteDoc) => {
                const profileData = athleteDoc.data();
                const uid = athleteDoc.id;

                try {
                    const userSnap = await getDoc(doc(db, "users", uid));
                    const userData = userSnap.exists() ? userSnap.data() : {};
                    const mergedAthlete = { ...userData, ...profileData };

                    if (type === 'rack') {
                        const latestSnap = await getDoc(doc(db, "recruiting_profiles", uid, "maxes", "latest"));

                        if (latestSnap.exists()) {
                            const s = latestSnap.data();

                            tableData.push({
                                name: getDisplayName(mergedAthlete),
                                grad: mergedAthlete.gradYear || "--",
                                offPos: mergedAthlete.offPrimary || mergedAthlete.primaryPos || "--",
                                defPos: mergedAthlete.defPrimary || mergedAthlete.primaryDefPos || "--",
                                bodyWeight: getBodyWeight(s),
                                dateGroup: formatFirebaseDate(s.timestamp || s.updatedAt || s.createdAt || s.lastUpdated),
                                bench: s.bench ?? s.bench_press ?? s.benchMax ?? 0,
                                squat: s.squat ?? s.back_squat ?? 0,
                                clean: s.clean ?? s.power_clean ?? 0,
                                deadlift: s.deadlift ?? 0,
                                pushPress: s.push_press ?? s.pushPress ?? 0
                            });

                            return;
                        }

                        const subSnap = await getDocs(query(
                            collection(db, "recruiting_profiles", uid, "maxes"),
                            limit(25)
                        ));

                        subSnap.forEach((subDoc) => {
                            const s = subDoc.data();

                            tableData.push({
                                name: getDisplayName(mergedAthlete),
                                grad: mergedAthlete.gradYear || "--",
                                offPos: mergedAthlete.offPrimary || mergedAthlete.primaryPos || "--",
                                defPos: mergedAthlete.defPrimary || mergedAthlete.primaryDefPos || "--",
                                bodyWeight: getBodyWeight(s),
                                dateGroup: formatFirebaseDate(s.timestamp || s.updatedAt || s.createdAt || s.lastUpdated),
                                bench: s.bench ?? s.bench_press ?? s.benchMax ?? 0,
                                squat: s.squat ?? s.back_squat ?? 0,
                                clean: s.clean ?? s.power_clean ?? 0,
                                deadlift: s.deadlift ?? 0,
                                pushPress: s.push_press ?? s.pushPress ?? 0
                            });
                        });
                    } else {
                        const mealsSnap = await getDocs(query(
                            collection(db, "recruiting_profiles", uid, "meals"),
                            limit(100)
                        ));

                        mealsSnap.forEach((mealDoc) => {
                            const s = mealDoc.data();

                            tableData.push({
                                name: getDisplayName(mergedAthlete),
                                grad: mergedAthlete.gradYear || "--",
                                bodyWeight: mergedAthlete.weight || mergedAthlete.bodyWeight || getBodyWeight(s),
                                dateGroup: s.dateKey ? formatDateKey(s.dateKey) : formatFirebaseDate(s.timestamp || s.updatedAt || s.createdAt || s.date),
                                mealType: normalizeMealType(s),
                                calories: Number(s.calories || 0),
                                protein: Number(s.protein || 0),
                                carbs: Number(s.carbs || 0),
                                fats: Number(s.fats || 0)
                            });
                        });
                    }
                } catch (athleteErr) {
                    console.warn(`Analytics load skipped athlete ${uid}:`, athleteErr);
                }
            }));

            tableData.sort((a, b) => String(b.dateGroup || "").localeCompare(String(a.dateGroup || "")));

            currentTableData = tableData;
            await table.setData(tableData);
            table.refreshFilter();
            updateExportState();

            if (!tableData.length) {
                setTableState(
                    type === 'rack' ? "No lift records found for this school." : "No meal records found for this school.",
                    "warn"
                );

                showPageMessage(
                    type === 'rack' ? "No approved max records are available yet." : "No kitchen entries are available yet.",
                    "warn"
                );

                return;
            }

            hideTableState();

            if (vaultSubtitle) {
                const label = type === 'rack' ? 'Lift Analytics Active' : 'Kitchen Analytics Active';
                vaultSubtitle.innerText = `${label} • ${tableData.length} Record${tableData.length === 1 ? '' : 's'}`;
            }
        } catch (err) {
            console.error("Data Load Error:", err);
            currentTableData = [];
            updateExportState();
            await table.setData([]);
            setTableState("Unable to load analytics data.", "error");
            showPageMessage("This data could not be loaded right now. Please refresh and try again.", "error");
        }
    }

    window.switchTable = async function(type) {
        if (!isReady) return;

        currentTab = type;
        hidePageMessage();
        setTabButtons(type);

        if (type === 'rack') {
            table.setColumns(rackColumns);
        } else {
            table.setColumns(kitchenColumns);
        }

        await loadData(type);
    };

    window.downloadCSV = async function() {
        if (!currentTableData.length) {
            alert("There is no data to export for this tab.");
            return;
        }

        await logDataAccess({
            action: currentTab === 'rack' ? "export_team_lift_analytics" : "export_team_meal_analytics",
            reason: "coach_exported_csv"
        });

        const fileName = currentTab === 'rack' ? "Team_Maxes" : "Team_Meals";
        table.download("csv", `${fileName}_${new Date().getFullYear()}.csv`);
    };

    onAuthStateChanged(auth, async (user) => {
        setTableState("Checking coach access...");
        hidePageMessage();

        if (!user) {
            window.location.href = 'index.html';
            return;
        }

        try {
            const userDoc = await getDoc(doc(db, "users", user.uid));

            if (!userDoc.exists()) {
                window.location.href = 'index.html';
                return;
            }

            const userData = userDoc.data();

            if ((userData.role || "").toLowerCase() !== 'coach') {
                window.location.href = 'index.html';
                return;
            }

            coachSchoolId = getSchoolIdFromData(userData);

            if (!coachSchoolId) {
                showPageMessage("Coach profile is missing a school link. Analytics Vault cannot load.", "error");
                setTableState("Missing school link.", "error");
                if (vaultSubtitle) vaultSubtitle.innerText = "School Connection Missing";
                return;
            }

            if (vaultSubtitle) {
                vaultSubtitle.innerText = `School ID: ${coachSchoolId}`;
            }

            isReady = true;

            await logDataAccess({
                action: "view_team_analytics",
                reason: "coach_dashboard_access"
            });

            await loadData('rack');
        } catch (error) {
            console.error("Analytics vault init error:", error);
            showPageMessage("Analytics Vault could not be loaded right now. Please refresh and try again.", "error");
            setTableState("Analytics load failed.", "error");
        }
    });
</script>
</body>
</html>
